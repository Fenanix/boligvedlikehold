  { id:9,  interval:365, title:'Tøm vannvarmerens sediment',          cat:'ror',        icon:'ti-droplet',  due:addDays(60),  freq:'Én gang i året',         types:['rekkehus','enebolig'],              fagfolk:{ ma:'rørlegger varmtvannsbereder', g:'tømme varmtvannsbereder sediment'   }, yt:'tømme varmtvannsbereder sediment selv', desc:'Kalk samler seg i bunnen av berederen og senker effektiviteten. Jevnlig tømming forlenger levetiden.',                                                     steps:['Slå av strøm til berederen på sikringsskapet.','Koble hageslange til dreneringsventilen i bunnen.','La tanken tømmes (20–40 min) til et avløp.','Skyll med kaldt vann til det renner klart, fyll opp igjen.']},
  { id:10, interval:365, title:'Sjekk drensgrøft og kummer',          cat:'ror',        icon:'ti-droplet',  due:addDays(40),  freq:'Én gang i året',         types:['rekkehus','enebolig'],              fagfolk:{ ma:'drenering grøft rens',        g:'drenering rundt hus vedlikehold'     }, yt:'drenering rundt hus vedlikehold',      desc:'Tett drenering presser vann mot grunnmuren. En rask sjekk om høsten kan spare store utgifter.',                                                           steps:['Finn alle kumlokkene rundt huset.','Løft lokket – se etter løv og jord som blokkerer.','Rens med hanske og skyll med hageslange.','Stadig gjenstetting? Kontakt dreneringsfirma.']},
  { id:11, interval:90,  title:'Bytt luftfilter i ventilasjon',       cat:'apparater',  icon:'ti-tool',     due:addDays(7),   freq:'Hver 3. måned',          types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'bytte luftfilter ventilasjon bolig',   desc:'Skitne filtre reduserer luftkvaliteten og kan øke strømforbruket betraktelig.',                                                                            steps:['Finn ventilasjonsaggregatet – ofte i bod, vaskerom eller kjeller.','Åpne frontlokket og ta ut gammelt filter.','Merk filterstørrelsen (står på kanten).','Sett inn nytt filter med luftpilen riktig vei. Skriv bytedato.']},
  { id:12, interval:90,  title:'Rens tørketrommelens lo og kanal',    cat:'apparater',  icon:'ti-tool',     due:addDays(20),  freq:'Hver 3. måned',          types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'rense tørketrommel lo kanal',          desc:'Loopphopning er svært brennbart og er en av de vanligste årsakene til hvitevare-branner.',                                                                 steps:['Tøm lofilter-skuffen etter hvert tørk.','Støvsug inne i filterhylsen med smalt munnstykke.','Løsne utluftsslangen bak og rens hele kanalen innvendig.','Sjekk at utluftsgitteret utvendig ikke er tett.']},
  { id:13, interval:180, title:'Rengjør kjøleskapsspoler',            cat:'apparater',  icon:'ti-tool',     due:addDays(35),  freq:'Hver 6. måned',          types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'rengjøre kjøleskap spoler bak',        desc:'Støvbelagte spoler kan bruke opptil 30 % mer strøm og holder ikke riktig temperatur.',                                                                     steps:['Trekk kjøleskapet ut fra veggen og koble fra strøm.','Finn kondensatorspolene – svart gitter bak eller under frontpanelet.','Støvsug forsiktig med myk børste.','Skyv tilbake og sett inn strøm igjen.']},
  { id:14, interval:365, title:'Service på varmeanlegg/varmepumpe',   cat:'apparater',  icon:'ti-tool',     due:addDays(30),  freq:'Én gang i året',         types:['rekkehus','enebolig'],              fagfolk:{ ma:'varmepumpe service',          g:'varmepumpe service godkjent fagperson'}, yt:'varmepumpe service hva skjer',         desc:'Service er påkrevd for å opprettholde garanti og sikrer effektiv drift gjennom vinteren.',                                                                  steps:['Bestill tid hos godkjent VVS- eller varmepumpe-tekniker.','Rens filteret i innedelen månedlig i varme-sesongen.','Hold utedelen fri for snø, is og vegetasjon.','Notér servicedato i loggen.']},
  { id:15, interval:180, title:'Rens takrenner og nedløp',            cat:'utvendig',   icon:'ti-building', due:addDays(-5),  freq:'To ganger i året',       types:['rekkehus','enebolig','sommerhytte','vinterhytte'],              fagfolk:{ ma:'taktekker takrenne rens',     g:'rense takrenner fagfolk'             }, yt:'rense takrenner selv guide',           desc:'Fulle takrenner leder vann ned langs veggen og kan forårsake fuktskader i fasade og grunnmur.',                                                            steps:['Sett opp stige sikkert på fast underlag.','Fjern løv og smuss med renneskrape eller hanske.','Skyll med hageslange fra enden mot nedløpet.','Tregflyt: bruk plastslange for å frigjøre nedløpspipa.']},
  { id:16, interval:365, title:'Inspiser tak og beslag',              cat:'utvendig',   icon:'ti-building', due:addDays(14),  freq:'Én gang i året',         types:['rekkehus','enebolig','sommerhytte','vinterhytte'],              fagfolk:{ ma:'taktekker inspeksjon',        g:'taktekker taksjekk pris'             }, yt:'inspiser tak beslag selv',            desc:'Tidlig oppdagelse av takskader sparer store beløp. En liten sprekk kan slippe inn nok vann til å ødelegge loftsbjelker.',                                   steps:['Bruk kikkert fra bakken for en første vurdering.','Se etter løse, knekte eller manglende takstein.','Sjekk beslag rundt pipe, takvindu og gavler.','Oppdager du skader: tilkall godkjent taktekker.']},
  { id:17, interval:1825,title:'Mal og vedlikehold av fasade',        cat:'utvendig',   icon:'ti-building', due:addDays(90),  freq:'Hvert 5.–8. år',        types:['rekkehus','enebolig','sommerhytte','vinterhytte'],              fagfolk:{ ma:'maler fasade husvegg',        g:'male fasade hus pris fagfolk'        }, yt:'male fasade hus guide',               desc:'Malingen er det primære værvernet for trevirket. Slitt maling fører til råte – langt dyrere enn et nytt strøk i tide.',                                     steps:['Gå rundt og se etter avskalling og bobler.','Skrap løs maling og grunner der treet er bart.','Velg ytterkledningmaling tilpasset norsk klima.','Mal i tørt vær – idealtemperatur 10–25 °C.']},
  { id:18, interval:365, title:'Beskjær trær og busker nær huset',   cat:'utvendig',   icon:'ti-building', due:addDays(45),  freq:'Én gang i året',         types:['enebolig','sommerhytte','vinterhytte'],                          fagfolk:{ ma:'hagearbeider treskjæring',    g:'treskjæring nær hus fagfolk'         }, yt:'beskjære trær busker hage',           desc:'Grener mot taket holder det fuktig og kan løfte takstein i storm. Røtter kan skade grunnmur og drenering.',                                                steps:['Identifiser grener nærmere enn 2 m fra tak og vegger.','Skjær rent tilbake til stamme eller sidegrein – aldri klyp.','Trær over 5 m: tilkall sertifisert arborist.','Kvister og grener leveres til returpunkt eller flises.']},
  { id:19, interval:365, title:'Sjekk grunnmur for sprekker',        cat:'utvendig',   icon:'ti-building', due:addDays(55),  freq:'Én gang i året',         types:['enebolig','vinterhytte'],                                        fagfolk:{ ma:'fuktsperre grunnmur',         g:'sprekker grunnmur hva gjøre fagfolk' }, yt:'sprekker grunnmur årsak løsning',     desc:'Sprekker kan skyldes setninger eller frost og gi vanninntrengning og strukturelle skader over tid.',                                                        steps:['Inspiser hele grunnmurens synlige del rundt huset.','Se etter riss bredere enn 1–2 mm.','Fotografér og merk med kritt – sjekk om de vokser.','Voksende sprekker: kontakt byggingeniør.']},
  { id:20, interval:365, title:'Rens pipa og inspiser ildsted',      cat:'utvendig',   icon:'ti-building', due:addDays(-15), freq:'Én gang i året',         types:['enebolig','vinterhytte'],                                        fagfolk:{ ma:'feier pipe peis',             g:'pipe feier lovpålagt bestille'       }, yt:'pipe feier peis vedlikehold',         desc:'Sotoppbygging i pipa er en vanlig brannårsak. Feiing er lovpålagt for alle med fast ildsted.',                                                             steps:['Bestill feiing hos kommunens feievesen.','Rydd rundt ovnen for lett tilkomst.','Sjekk at glasspakningen tetter – bytt om det slipper røyk.','Se etter sprekker i ildstedet.']},
  { id:21, interval:365, title:'Tett sprekker rundt vinduer og dører',cat:'sesong',    icon:'ti-sun',      due:addDays(50),  freq:'Én gang i året før vinter',types:['rekkehus','enebolig','sommerhytte','vinterhytte'],             fagfolk:{ ma:'vinduer tetning isolasjon',   g:'tette vinduer trekk fugemasse'       }, yt:'tette vinduer dører trekk fugemasse', desc:'Trekk rundt vinduer kan stå for 20–30 % av boligens varmetap. Riktig tetting gir lavere strømregning.',                                                    steps:['Hold en brennende fyrstikk langs kanten – bevegelse avslører trekk.','Sprukket tetningsliste? Bytt den.','Rens bort gammel fugemasse med fugekniv.','Fyll med siliconfugemasse for utendørs bruk og glatt med fuktet finger.']},
  { id:22, interval:365, title:'Steng og tøm utvendige vannuttak',   cat:'sesong',     icon:'ti-sun',      due:addDays(10),  freq:'Hver høst',              types:['rekkehus','enebolig','sommerhytte','vinterhytte'],              fagfolk:null,                                             yt:'stenge utvendige vannuttak vinter',    desc:'Frysing i utvendige rør kan sprenge dem. En enkel stenging om høsten hindrer lekkasjer til våren.',                                                        steps:['Finn innvendig stoppekran – vanligvis i kjeller.','Steng stoppekranen.','Åpne den utvendige krana for å tømme restvann.','La krana stå åpen gjennom vinteren.']},
  { id:23, interval:365, title:'Sjekk balkong for fukt og rust',     cat:'sesong',     icon:'ti-sun',      due:addDays(18),  freq:'Én gang i året',         types:['leilighet'],                        fagfolk:{ ma:'balkong rehabilitering',      g:'rust rekkverk balkong hva gjøre'     }, yt:'rust rekkverk balkong behandle',      desc:'Balkonger utsettes for fryse-tine-sykluser. Ubehandlet rust kan svekke selve konstruksjonen.',                                                            steps:['Se etter oransje rustflekker på rekkverk og fester.','Kjenn etter om rekkverket sitter løst.','Sjekk gulvbelegget for sprekker og fuktige områder.','Overflaterust: slip og rustkonverter. Gjennomgående rust: meld styret.']},

  // ── MALING & VASK ──
  { id:30, interval:365, title:'Vask husets fasade og vegger',        cat:'maling',     icon:'ti-paint',    due:addDays(20),  freq:'Én gang i året (vår)',    types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:{ ma:'husvask fasadereinsing',  g:'vaske fasade hus selv'               }, yt:'vaske fasade hus høytrykksspyler',    desc:'Alger, sopp og smuss setter seg i trevirket og bryter ned overflatebehandlingen. Vask forlenger malingens levetid med mange år.',                          steps:['Bruk hagehose eller høytrykkspyler på lavt trykk (maks 100 bar) – for høyt trykk skader treverket.','Start ovenfra og arbeid nedover.','Bruk husvask-middel (f.eks. klorheksidin) ved alger og mose – la virke 10–15 min.','Skyll grundig med rent vann og la tørke minst 48 t før eventuell maling.']},
  { id:31, interval:1095,title:'Mal vinduer, dørkarmer og belistning', cat:'maling',    icon:'ti-paint',    due:addDays(60),  freq:'Hvert 3.–5. år',         types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:{ ma:'maler vinduer dørkarmer',  g:'male vinduer karm utvendig'          }, yt:'male vinduer og karmer utvendig',     desc:'Vinduer og dørkarmer er spesielt utsatt for vær og vind. Malte og vedlikeholdte karmer hindrer råte og trekkproblemer.',                                   steps:['Rens og sandpapir gammel maling der den flasser.','Fyll sprekker med elastisk fugepasta.','Grunne med uteprimer der treverket er bart.','Påfør 2 strøk yttermaling – pensle alltid med treverkets retning.']},
  { id:32, interval:730, title:'Behandle terrasse og uteplass',        cat:'maling',    icon:'ti-paint',    due:addDays(30),  freq:'Hvert 2.–3. år',         types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'behandle terrasse tre beis',          desc:'Ubehandlet treverk grårner og sprekker raskt. Beising eller oljebehandling beskytter og gir terrassen lang levetid.',                                       steps:['Vask terrassen grundig og la tørke i minst 2–3 dager.','Slip med grovt papir (80-korn) langs treverkets retning.','Støvsug og tørk av alt trevirk.','Påfør terrasse-olje eller beis med bred pensel – arbeide med treets retning.']},
  { id:33, interval:180, title:'Vask og rens vinduer utvendig',        cat:'maling',    icon:'ti-paint',    due:addDays(-8),  freq:'To ganger i året',       types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                  yt:'vaske vinduer utvendig uten striper', desc:'Rene vinduer slipper inn mer lys og gjør det lettere å se tidlige tegn på råte i karmene.',                                                               steps:['Rens karmene med en myk klut og såpevann.','Bruk vindusrenser eller eddikoppløsning (1:10) og skrubbesvamp.','Bruk gummiskrape ovenfra og ned i ett drag.','Tørk kanter med mikrofiberklut – hindrer striper.']},
  { id:34, interval:365, title:'Rengjør og vask garasje/carport',      cat:'maling',    icon:'ti-paint',    due:addDays(45),  freq:'Én gang i året',         types:['rekkehus','enebolig'],                              fagfolk:null,                                             yt:'rengjøre garasje gulv vegger',        desc:'Olje, salt og smuss bygger seg opp og skader gulv og konstruksjon over tid. Et rent garasjerom er dessuten tryggere.',                                     steps:['Kjør ut alle biler og rydd gulvet.','Fei og støvsug gulv og hjørner grundig.','Vask gulvet med avfettingsmiddel og skrubb.','Inspiser vegger og tak for fukt, sprekker og skadedyr.']},

  // ── HAGE & PLEN ──
  { id:40, interval:7,   title:'Klipp plenen',                         cat:'hage',       icon:'ti-plant-2',  due:addDays(-3),  freq:'Ukentlig (mai–sept)',     types:['rekkehus','enebolig','sommerhytte'],               fagfolk:null,                                             yt:'klippe plen tips teknikk',            desc:'Regelmessig klipping holder plenen tett og sunn. For langt gress svekker gressets røtter og inviterer ugress.',                                            steps:['Still klippehøyden til 4–6 cm (aldri klipp mer enn 1/3 av lengden av gangen).','Klipp i tørt vær – vått gress klistrer seg og skader maskinen.','Varier kjøreretningen hver gang for jevnere slitasje.','Tøm gressoppsamleren regelmessig og legg på kompost.']},
  { id:41, interval:180, title:'Gjødsle og rake plenen',               cat:'hage',       icon:'ti-plant-2',  due:addDays(25),  freq:'Vår og høst',            types:['rekkehus','enebolig','sommerhytte'],               fagfolk:null,                                             yt:'gjødsle og rake plen vår',            desc:'Raking fjerner dødt gress (filtlag) som kveler plenen. Gjødsling om våren gir tett, grønn og sunn plen hele sesongen.',                                   steps:['Rake filtstykkene med en greip-rake om våren – dette lufter plenen.','Luft tette partier med aerator eller greip.','Strø jevnt med pelletgjødsel beregnet på plen.','Vann godt inn etter gjødsling – gjødselen skal løses opp i jorda.']},
  { id:42, interval:30,  title:'Bekjemp ugress i bed og plener',       cat:'hage',       icon:'ti-plant-2',  due:addDays(10),  freq:'Månedlig (mai–sept)',     types:['rekkehus','enebolig','sommerhytte'],               fagfolk:null,                                             yt:'luke ugress hage effektivt',          desc:'Ugress stjeler næring og vann fra planter og plen. Tidlig og jevnlig luking er langt enklere enn å ta det store ryddejabbe om høsten.',                    steps:['Luke ugress med rot – ikke bare toppen, det vokser raskt tilbake.','Bruk lukefjær eller huk til rotsystemet.','Legg flis eller barkflis i bed for å hindre nytt ugress.','Kompostér ugress uten frø – frø overlever i komposten.']},
  { id:43, interval:365, title:'Rydd og klargjør hagen til vinteren',  cat:'hage',       icon:'ti-plant-2',  due:addDays(55),  freq:'Én gang i året (høst)',   types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'klargjøre hagen til vinter',          desc:'En grundig høstrydding beskytter planter, hindrer sopp og gjør vårarbeidet langt lettere.',                                                               steps:['Klipp plenen siste gang – hold den på 5–6 cm for vinteren.','Rake løvfall og legg på kompost eller brukes som mulch.','Ta inn potteplanter og sommerblomster som tåler frost dårlig.','Dekk sårbare flerårige planter med fiberduk eller granbar.']},
  { id:44, interval:365, title:'Beskjær hekk og busker',               cat:'hage',       icon:'ti-plant-2',  due:addDays(35),  freq:'Én gang i året (sommer)', types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'beskjære hekk og busker',             desc:'Regelmessig beskjæring holder hekker tette og pene, og fremmer blomstring og ny vekst.',                                                                  steps:['Beskjær hekk etter blomstring – de fleste hekker tåler dette best i juni–august.','Bruk skarpe hekksaks eller motorsag for store jobber.','Sikt mot en svakt V-formet form – bredere i bunnen enn toppen, slik slipper lyset til.','Rydde bort kvister og kompostere.']},
  { id:45, interval:7,   title:'Vann og fôr planter og bed',           cat:'hage',       icon:'ti-plant-2',  due:addDays(5),   freq:'Ukentlig (mai–aug)',      types:['rekkehus','enebolig','sommerhytte'],               fagfolk:null,                                             yt:'vanne og gjødsle hageplanter',        desc:'Tørke er den vanligste årsaken til at planter mislykkes. Jevn og riktig vanning er viktigere enn sporadisk overdrenking.',                                steps:['Vann tidlig om morgenen – minsker fordamping og sopp.','Sjekk jordfuktigheten med fingeren – jorda skal kjennes fuktig 3–5 cm ned.','Bruk flytende gjødsel 1 gang i uka i vekstsesongen.','Unngå å vanne bladene – vann direkte i roten.']},

  // ── REDSKAPER ──
  { id:50, interval:365, title:'Slipe og vedlikeholde gressklipper',   cat:'redskaper',  icon:'ti-tool-2',   due:addDays(20),  freq:'Én gang i året (vår)',    types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:{ ma:'gressklipper service reparasjon', g:'service gressklipper slipe kniver' }, yt:'service gressklipper vår',            desc:'En skarp og velstelt klipper bruker mindre drivstoff, klipper jevnere og varer lengre. Sløv kniv river gresset istedenfor å kutte.',                       steps:['Tøm bensintanken eller koble fra batteriet før arbeid.','Slipe kniven med en vinkelsliper eller fil – følg eksisterende vinkel.','Bytt tennplugg og luftfilter én gang i året.','Sjekk oljenivå og fyll opp etter fabrikkens anbefaling.','Rens under klippe-dekket med skrape og hageslange.']},
  { id:51, interval:365, title:'Vedlikehold motorsag',                 cat:'redskaper',  icon:'ti-tool-2',   due:addDays(45),  freq:'Én gang i året eller ved bruk', types:['enebolig','vinterhytte'],               fagfolk:null,                                             yt:'vedlikeholde motorsag slipe kjede',   desc:'En godt vedlikeholdt motorsag er tryggere og mer effektiv. Sløv eller feil strammet kjede er den vanligste årsaken til ulykker.',                          steps:['Sjekk og juster kjærespenning – skal ha 3–4 mm spenn midt på svinget.','Slipe kjeden med rund fil etter antall kutt eller ved tegn på sløvhet.','Sjekk oljenivå for kjedeolje og bensintank.','Rens luftfilter og kontroller at bremsen fungerer.','Sjekk at kjedefanger og verneutstyr er intakt.']},
  { id:52, interval:365, title:'Skjerp og vedlikehold hageverktøy',    cat:'redskaper',  icon:'ti-tool-2',   due:addDays(30),  freq:'Én gang i året (vår)',    types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'vedlikeholde hageverktøy slipe',      desc:'Skarpt og rent hageverktøy er langt enklere å bruke og beskytter planter bedre enn sløve kniver som river og kvaser.',                                    steps:['Rens jord og rust med en stålbørste og evt. oljebehandling.','Slipe spader, hakker og greinknipper med slipefil eller -stein.','Gni inn metalldelene med linolje for å hindre rust.','Sandpapir skaftene og behandle tresparter med linfrøolje.','Heng verktøy på kroker – aldri la de ligge i jord.']},
  { id:53, interval:365, title:'Kontroller og service snøfreser',      cat:'redskaper',  icon:'ti-tool-2',   due:addDays(-10), freq:'Én gang i året (høst)',   types:['enebolig','vinterhytte'],                           fagfolk:{ ma:'snøfreser service reparasjon', g:'service snøfreser høst'           }, yt:'klargjøre snøfreser høst',            desc:'En snøfreser som svikter i minus 20 grader er et reelt problem. Høstservice sikrer at maskinen er klar når du trenger den.',                                steps:['Bytt olje og tennplugg før vintersesongen.','Sjekk og stram alle skruer og bolter.','Kontroller at skrapelistene er hele og ikke for slitte.','Fyll på frisk bensin – gammel bensin fra sommeren kan gi startproblemer.','Test at kastemunningen og rørmekanismen beveger seg fritt.']},
  { id:54, interval:365, title:'Vedlikehold stiger og klatrestativer', cat:'redskaper',  icon:'ti-tool-2',   due:addDays(40),  freq:'Én gang i året',         types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'inspisere og vedlikeholde stige',     desc:'En stige med skader er et alvorlig sikkerhetsrisiko. Regelmessig sjekk tar under 5 minutter.',                                                             steps:['Kontroller alle trinn for sprekker, løse skruer eller korrosjon.','Sjekk at føttene (gummiklosser) er hele og ikke glatte.','Inspiser låsemekanismer og låsehaker – skal klikke fast.','Treverk-stiger: behandle med linolje. Aluminium: lett sandpapir på skurte partier.','Oppbevar liggende eller heng på kroker – ikke stående mot vegg.']},
  { id:55, interval:365, title:'Sjekk og fyll opp beredskapslageret',  cat:'redskaper',  icon:'ti-tool-2',   due:addDays(50),  freq:'Én gang i året',         types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'beredskapslager hjemme hva trenger du', desc:'Et lite beredskapslager gjør deg selvstendig ved strømbrudd, storm eller andre uforutsette hendelser.',                                                   steps:['Sjekk at lommelykter og pannelykter har fungerende batterier.','Fyll opp med stearinlys, fyrstikker og tennbriketter.','Kontroller at du har førstehjelpsskrin med nødvendige artikler.','Ha minst 20 liter drikkevann og noen dagers mat i reserve.','Sørg for at du vet hvor hoved-stoppekranen og sikringsskapet er.']},

  // ── HVITEVARER ──
  { id:60, interval:365, title:'Avrim og rens fryseboks/-skuff',       cat:'hvitevarer',  icon:'ti-washing-machine', due:addDays(30), freq:'Én gang i året',  types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'avrime fryseboks selv',               desc:'Is-opphopning reduserer kapasitet og effektivitet. En avrimet fryser bruker betydelig mindre strøm.',                                                      steps:['Ta ut all mat og sett i kjølebag eller naboens fryser.','Skru av strømmen og legg håndkle i bunnen.','La isen smelte naturlig – påskyndes med bolle varmt vann inne i fryseren.','Rens og tørk innvendig med lunket vann og natron.','Skru på igjen og la kjøle ned 2–3 timer før mat settes inn.']},
  { id:61, interval:30,  title:'Rens oppvaskmaskinens filter og armer', cat:'hvitevarer', icon:'ti-washing-machine', due:addDays(20), freq:'Månedlig',         types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'rense oppvaskmaskin filter',          desc:'Tilstoppet filter og spylearm gir dårlig vask og er den vanligste årsaken til dårlig lukt i oppvaskmaskinen.',                                             steps:['Ta ut de nedre kurvene og finn filteret i bunnen.','Drei filteret mot urviseren og løft opp – skyll under rennende vann.','Løsne spylearmene (vri eller klikk av) og rens hullene med tannpirker.','Kjør et tomt program på 60–65 °C med en dl eddik i bunnen.','Tørk pakningen rundt luken med en klut – mold samler seg her.']},
  { id:62, interval:30,  title:'Rens vaskemaskinens trommel og filter', cat:'hvitevarer', icon:'ti-washing-machine', due:addDays(25), freq:'Månedlig',         types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'rense vaskemaskin pakning filter',    desc:'Gummipakningen rundt luken er et arnested for mugg og dårlig lukt. Tøm pumpefilter hindrer gjenleving av pumpen.',                                        steps:['Tørk av gummipakningen rundt luken med klut fuktet med eddikoppløsning.','Finn pumpe-filteret (panel foran nede) – legg håndkle under og skru opp sakte.','Tøm vannet og rens filteret for lo og fremmedlegemer.','Skru igjen og kjør et tomt program på 60 °C med maskinfrisker eller eddik.','La luken stå åpen etter vask – dette hindrer muggvekst.']},
  { id:63, interval:30,  title:'Avkalk kaffemaskin og vannkoker',       cat:'hvitevarer',  icon:'ti-washing-machine', due:addDays(15), freq:'Månedlig',        types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'avkalke kaffemaskin vannkoker',       desc:'Kalk reduserer effektiviteten, gir dårligere smak og forkorter levetiden på varmeelementer.',                                                              steps:['Fyll tanken med 50/50 eddik og vann eller bruk avkalkingsmiddel.','Kjør et komplett avkalkingsprogram – eller la stå i 30 min for enkle maskiner.','Kjør minst 2 skyllesykluser med rent vann til smaken er borte.','For vannkoker: kok opp eddikblandingen, hell ut og skyll 2 ganger.','Gjenta månedlig i hardvannsområder, hvert kvartal ellers.']},
  { id:64, interval:730, title:'Rens kjøleskap og frysedel innvendig', cat:'hvitevarer',  icon:'ti-washing-machine', due:addDays(35), freq:'Annethvert år',    types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'rengjøre kjøleskap innvendig grundig', desc:'Kjøleskap trenger innvendig rengjøring for å fjerne bakterier, sopp og matrester som gir dårlig lukt og kortere holdbarhet.',                             steps:['Ta ut all mat og legg i kjølebag eller kjølig rom.','Skru av strømmen og ta ut alle hyller og skuffer.','Vask alle innvendige flater med lunket vann og natron-oppløsning.','Vask hyllene og skuffene separat, la tørke.','Skru på igjen, la temperere i 1 time, fyll inn mat igjen.']},
  { id:65, interval:90,  title:'Rens avtrekksviften og filteret',       cat:'hvitevarer',  icon:'ti-washing-machine', due:addDays(40), freq:'Hver 3. måned',    types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'rense kjøkkenvifte filter',           desc:'Fettfiltre i kjøkkenvifte samler opp fett og kan i verste fall ta fyr. Rene filtre gir bedre avtrekk og hindrer lukt.',                                   steps:['Ta ut fettfilteret – klikk eller skli ut avhengig av modell.','Legg i oppvaskmaskin (50–60 °C) eller vask i varmt vann med oppvaskmiddel.','La filteret tørke helt før det settes inn igjen.','Tørk av innsiden av viften med en fettoppløsende klut.','Sjekk at motorluften til viften ikke er blokkert.']},
  { id:66, interval:30,  title:'Rens tørketrommelens kondensatstasjon', cat:'hvitevarer', icon:'ti-washing-machine', due:addDays(10), freq:'Månedlig',         types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,          yt:'rense tørketrommel kondensator',      desc:'Kondensatoren i varmepumpe-tørketromler samler lo og støv. Skitne kondensatorer gjør at maskinen bruker mer strøm og tørker dårligere.',                  steps:['Tøm kondensatvannbeholderen etter hvert bruk.','Finn kondensatoren (vanligvis bak et panel nede) og ta den ut.','Skyll under rennende vann til vannet renner klart.','La tørke og sett inn igjen.','Rens lofilter-skuffen ved luken etter hvert bruk.']},

  // ── HYTTE-SPESIFIKKE ──
  { id:70, interval:365, title:'Åpne hytta om våren (sesongstart)',    cat:'hytte',      icon:'ti-trees',    due:addDays(-20), freq:'Én gang i året (vår)',    types:['sommerhytte'],                                      fagfolk:null,                                             yt:'åpne hytte vår sjekkliste',           desc:'En grundig åpningssjekk om våren sikrer at hytta er klar til bruk og at vinterskadene oppdages tidlig.',                                                  steps:['Åpne stoppekran og sjekk alle rør for lekkasjer etter frost.','Sjekk røykvarsler og brannslukkeren – bytt batteri.','Luft hytta grundig – åpne alle vinduer i minst 2 timer.','Inspiser tak, vegger og grunnmur for vinter- og fuktskader.','Sjekk at avløp og sluk ikke er tette etter vinteren.']},
  { id:71, interval:365, title:'Vinterstenging av hytta',              cat:'hytte',      icon:'ti-trees',    due:addDays(50),  freq:'Én gang i året (høst)',   types:['sommerhytte'],                                      fagfolk:null,                                             yt:'vinterstenge hytte sjekkliste',       desc:'Riktig vinterlukking beskytter mot frostskader på rør og vanninntrenging, og sikrer at hytta er hel til neste sesong.',                                   steps:['Steng og tøm vannledninger – åpne alle kraner og tøm varmtvannsbereder.','Hell frostvæske i toalett-sifon og sluk.','Slå av strøm på alle kurser unntatt ev. frostvakt.','Ryd bort mat som kan trekke skadedyr.','Rull opp og ta inn hageslanger, puter og løse gjenstander.']},
  { id:72, interval:14,  title:'Sjekk tak for snølast og isbelastning', cat:'hytte',     icon:'ti-trees',    due:addDays(5),   freq:'Etter kraftig snøfall',   types:['vinterhytte'],                                      fagfolk:null,                                             yt:'snølast tak hytte måle',              desc:'Snø på tak kan veie 100–300 kg/m². Hyttetak er sjelden dimensjonert for ekstremt snøfall – sjekk etter kraftige snøvær.',                                 steps:['Mål snødybden på taket med en målestav.','Er det over 50 cm snø: bruk et takspade-verktøy og fjern fra bakken.','Arbeid alltid fra bakken – gå aldri opp på snødekket tak.','Sjekk at takrenner og dreneringsrør ikke er islagte.','Sjekk innsiden for sprekkelyder, bøyde sperrebjelker eller sprekker i platene.']},
  { id:73, interval:30,  title:'Sjekk og ventiler hytta mot fukt',     cat:'hytte',      icon:'ti-trees',    due:addDays(25),  freq:'Jevnlig ved bruk',        types:['sommerhytte','vinterhytte'],                         fagfolk:null,                                             yt:'ventilere hytte fukt mugg',           desc:'Hytter er særlig utsatt for fuktproblemer, spesielt etter perioder uten bruk. Mugg setter seg raskt i kalde, fuktige rom.',                               steps:['Luft hytta grundig ved ankomst – åpne alle vinduer og dører.','Sjekk etter mugglukt og mørke flekker på vegger og i kott.','Se under tepper og bak møbler – mugg vokser i skjulte rom.','Sørg for at ventilasjonsåpninger ikke er tette eller blokkerte.','Bruk luftavfukter ved langvarig opphold i fuktig vær.']},
  { id:74, interval:365, title:'Vedlikehold brygge og naustfester',    cat:'hytte',      icon:'ti-trees',    due:addDays(30),  freq:'Én gang i året',         types:['sommerhytte'],                                      fagfolk:null,                                             yt:'vedlikeholde brygge impregnering',    desc:'Sjøvann, sol og is er svært ødeleggende for ubehandlet tre. Et oljet og inspektert bryggedekk varer mange år lenger.',                                   steps:['Inspiser alle planker for råte – press med skrutrekker, myk tre betyr råte.','Bytt råtne planker umiddelbart.','Skubb bryggegulvet med stiv børste og bryggerens.','Påfør tykk dekkbeis, oljeimpregnering eller bryggeolje.','Sjekk at bryggestøttene, ankere og festebånd er intakte og uten rust.']},
  { id:75, interval:365, title:'Fyll ved og klargjør vedlager',        cat:'hytte',      icon:'ti-trees',    due:addDays(-5),  freq:'Én gang i året (sommer)', types:['vinterhytte'],                                      fagfolk:null,                                             yt:'stable ved lagre riktig tørke',       desc:'God og tørr ved er forutsetningen for effektiv vedfyring og lite sot i pipa. Veden trenger minst ett år for å tørke skikkelig.',                           steps:['Bestill eller hent ved i god tid – helst tidligere på sommeren.','Kløyv ved til riktig størrelse for ovnen din (typisk 25–33 cm).','Stable med luftgap mellom vedene – unngå tett stabling.','Dekk toppen med takpapp eller presenning, men la sidene stå åpne.','Sjekk at vedlageret ikke er i kontakt med husveggen (trekker fukt og skadedyr).']},
  { id:76, interval:365, title:'Sjekk og service vannpumpe på hytta',  cat:'hytte',      icon:'ti-trees',    due:addDays(20),  freq:'Én gang i året',         types:['sommerhytte','vinterhytte'],                         fagfolk:{ ma:'rørlegger pumpe vann hytte', g:'service brønnpumpe hytte'           }, yt:'sjekke vannpumpe hytte',              desc:'En pumpefeil på hytta kan bety ingen tilgang på vann. En enkel sjekk om våren forebygger overraskelser i høysesongen.',                                   steps:['Sett strøm til pumpen og sjekk at den starter og gir trykk.','Sjekk trykkbeholder – aktiveres pumpen mer enn hvert 5. minutt tyder det på feil.','Inspiser sugesiden for luft-lekkasjer og løse koblinger.','Sjekk at ekspansjonstanken er ladet til korrekt fortrykk (vanligvis 1,5–2 bar).','Merker du unormale lyder eller trykkfall: tilkall rørlegger.']},

  // ── FRUKT & BÆR ──
  { id:80, interval:365, title:'Vårklipp av bærbusker (rips, solbær, stikkelsbær)', cat:'frukt', icon:'ti-apple', due:addDays(20), freq:'Én gang i året (tidlig vår)', types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'beskjære solbær rips stikkelsbær vår', desc:'Riktig vårklipp fjerner gammel, utslitt ved og stimulerer buskene til å sette rikelig med bær. Gammel ved gir lite og dårlig frukt.', steps:['Klipp ut alle greiner eldre enn 3–4 år (mørkere bark, lite knopper).','Fjern svake, syke eller innovervendte greiner.','Behold 6–8 sterke, unge greiner per busk.','Klipp rent rett over en knopp som peker utover.','Bær leveres til kompost – aldri la syk plantedeler ligge under buskene.']},
  { id:81, interval:365, title:'Gjødsel og vanning av bærbusker',                   cat:'frukt', icon:'ti-apple', due:addDays(10), freq:'Vår og forsommer',            types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'gjødsle bærbusker riktig', desc:'Bærbusker er storforbrukere av næring. Riktig gjødsling på riktig tidspunkt gir dobbelt så stor avling.', steps:['Gjødsel tidlig vår (april/mai) med allround- eller bærgjødsel – strø jevnt under buskene.','Bland ned med lett harving eller vanning – gjødselen skal ikke ligge på tørr jord.','Gi en ny dose i juni etter at blomstringen er over.','Vann grundig i tørre perioder, særlig når bærene sveller.','Legg et lag kompost eller barkflis rundt buskene for å holde på fuktighet.']},
  { id:82, interval:365, title:'Høst bær til rett tid og rens buskene etterpå',    cat:'frukt', icon:'ti-apple', due:addDays(75), freq:'Én gang i året (sommer)',     types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'høste bær riktig tidspunkt', desc:'Bær plukket på rett tidspunkt smaker best og holder lengst. Grundig rydding etter høst reduserer sopp og skadedyr neste sesong.', steps:['Solbær og rips: plukk når hele druene er mørke/røde og faller lett av.','Stikkelsbær: plukk til frisk spising litt umodne, til syltetøy fullt modne.','Fjern råtne og mugne bær – aldri la de bli liggende.','Rens under buskene for blad og gammelt bæravfall etter høst.','Legg et nytt lag kompost rundt rotsonen etter høst.']},
  { id:83, interval:365, title:'Vårklipp og forming av eple- og pæretre',           cat:'frukt', icon:'ti-apple', due:addDays(25), freq:'Én gang i året (tidlig vår)', types:['rekkehus','enebolig','sommerhytte'], fagfolk:{ ma:'hagearbeider frukttreklipper arborist', g:'beskjære epletre pæretre vår' }, yt:'beskjære epletre vår guide', desc:'Frukttrær som ikke klippes blir tette, mister lys inn i kronen og gir lite og dårlig frukt. Riktig klipp gir åpen krone, god luftsirkulasjon og stor avling.', steps:['Klipp bare i tørt vær, helst i frost – reduserer sjansen for soppinfeksjon.','Fjern greiner som krysser hverandre, vokser innover eller henger rett ned.','Klipp ut vannris (kraftige, loddrette skudd) – de stjeler næring uten å gi frukt.','La lyset slippe inn i kronen – du skal kunne kaste en hatt gjennom et velklippet tre.','Store greiner (over 5 cm): tilkall arborist. Bruk alltid sag, aldri klyp.']},
  { id:84, interval:365, title:'Gjødsel og kalkbehandling av frukttrær',            cat:'frukt', icon:'ti-apple', due:addDays(15), freq:'Én gang i året (vår)',        types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'gjødsle epletre pæretre', desc:'Frukttrær har høye næringsbehov, særlig kalium og kalsium. Riktig gjødsling gir fastere og sunnere frukt med lengre holdbarhet.', steps:['Strø kalk (kalkstein eller dolomittkalk) rundt rotsonen i april – hever pH og styrker celleveggene.','Tilsett fruktgjødsel med god kaliumbalanse etter blomstring.','Vann inn etter gjødsling – ikke la gjødsel ligge tørt på jord.','Legg kompost rundt treet ut til dryppsonen (der kronekanten er) som jordforbedring.','Gjenta gjødsling lett i juni, men avslutt innen 1. juli – sen gjødsling gir mykt, svakt trevirke.']},
  { id:85, interval:365, title:'Sjekk frukttrær for skadedyr og soppsjukdommer',   cat:'frukt', icon:'ti-apple', due:addDays(40), freq:'Vår og forsommer',            types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'sjukdommer epletre skurv bladlus', desc:'Epleskurv, bladlus og fruktvikler er de vanligste problemene. Tidlig oppdagelse og forebygging er langt enklere enn å bekjempe etablerte angrep.', steps:['Sjekk blad for brune/gule flekker (skurv) eller sammenrullede blad (bladlus) fra mai.','Heng opp lim- eller feromonfeller mot fruktvikler (larven som lager ormehuller).','Gro opp ugress og gammelt blad under treet – sopp overvintrer i planteavfall.','Spray med kobbermiddel (tillatt for hobbybruk) om skurv er kjent problem på stedet.','Vask stammer for mose og lav om høsten – reduserer overvintring av skadedyr.']},
  { id:86, interval:365, title:'Støttestake og fastbinding av unge frukttrær',      cat:'frukt', icon:'ti-apple', due:addDays(30), freq:'Sjekkes hvert år',            types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'støttestake frukttree riktig binding', desc:'Unge trær som beveger seg i vinden utvikler dårlige røtter. Men for stram binding kan skade barken og gi innsnevringsmerker.', steps:['Sjekk at staken ikke er råtten eller løs i jorda.','Bind skal sitte løst nok til at stammen kan bevege seg litt – 2–3 cm spill.','Bruk et bredt, mykt bindebånd, ikke ståltråd eller snor som kan skade barken.','For trær eldre enn 3–4 år: ta bort staken – treet skal nå klare seg selv.','Sjekk om rota av stammen er fri og ikke tildekket av jord (rotdrukningsrisiko).']},
  { id:87, interval:1825,title:'Forynge og dele opp gamle bærbusker',               cat:'frukt', icon:'ti-apple', due:addDays(180),freq:'Hvert 5.–7. år',             types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'fornye bærbusker formering stiklinger', desc:'Bærbusker er produktive i 10–15 år. Eldre busker kan forynges ved deling eller stiklinger, og du får nye, kraftige planter gratis.', steps:['Grav opp hele busken tidlig vår mens jorda er fuktig.','Del rotsystemet i 3–4 deler med spade – hver del skal ha røtter og minst 3 sterke skudd.','Plant delene med god avstand (minst 1 m mellom rips/solbær, 1,5 m mellom stikkelsbær).','Vann grundig inn etter planting og hold fuktig de første 4 ukene.','Alternativt: ta stiklinger (20 cm greinstykker) i september og plant direkte i jord.']},

  // ── UTEAREAL (asfalt, grus, belegningsstein) ──
  { id:90, interval:365, title:'Inspiser og fyll sprekker i asfalt',                cat:'uteareal', icon:'ti-road', due:addDays(30),  freq:'Én gang i året (vår)',    types:['rekkehus','enebolig'], fagfolk:{ ma:'asfalt reparasjon innkjørsel', g:'tette sprekker asfalt selv' }, yt:'reparere sprekker asfalt innkjørsel', desc:'Vann i asfaltkrekker fryser og utvider seg om vinteren og lager større skader år for år. Tidlig tetting er billig – å vente er dyrt.', steps:['Rens sprekkene grundig med trykkluft, børste eller høytrykksvasker – fjern all løs asfalt og ugress.','La tørke helt – minst 24 timer etter vask.','Fyll med asfalt-fugepasta (kald asfalt) fra spraybokse eller spann – bruk for sprekker under 2 cm.','Komprimer med en flatt stykke tre eller kjevle.','For store hull (over 5 cm): bruk kald asfaltmasse og trampe godt ned, eller tilkall fagfolk.']},
  { id:91, interval:365, title:'Ugress i asfalt og langs kanter',                   cat:'uteareal', icon:'ti-road', due:addDays(15),  freq:'Vår og sommer',           types:['rekkehus','enebolig'], fagfolk:null, yt:'fjerne ugress asfalt kantstein', desc:'Røttene fra ugress i asfaltkrekker løfter og sprenger asfalten over tid. Tidlig fjerning sparer mye penger og arbeid.', steps:['Fjern ugress med rot ved å bruke en smal fugekniv eller ugressjern.','Bruk kokende vann langs kanter og sprekker – dreper røtter uten kjemi.','Spray med eddik (15 %-konsentrasjon) på ugress som vokser spredt.','Fyll rensede sprekker med fugemasse etterpå – hindrer gjenvekst.','Legg ukrudtsduk under kantstein ved større renoveringer.']},
  { id:92, interval:365, title:'Vask og høytrykkspyl innkjørsel og gårdsplass',    cat:'uteareal', icon:'ti-road', due:addDays(20),  freq:'Én gang i året (vår)',    types:['rekkehus','enebolig'], fagfolk:null, yt:'høytrykkvask innkjørsel betong asfalt', desc:'En gang i året med høytrykkvasker fjerner oljeflekkene, alger og vintergrus som bryter ned overflaten og gjør den glatt og farlig.', steps:['Fei bort løst grus og blader med kosebørste først.','Bruk høytrykkvasker med vifte-munnstykke (40°) – ikke punktstråle rett ned, det skader fuger.','Start fra høyeste punkt og arbeid nedover mot avrenning.','Bruk terrasse- eller fasaderens på alger og grønne flekker – la virke 10 min.','Oljeflekkene: strø på asfaltavfetting eller kattesand, la trekke inn, skrubb og vask.']},
  { id:93, interval:730, title:'Etterfyll og jevne ut grusdekke',                   cat:'uteareal', icon:'ti-road', due:addDays(25),  freq:'Hvert 2. år',             types:['rekkehus','enebolig'], fagfolk:{ ma:'grus innkjørsel levering', g:'grustype innkjørsel pukk singel' }, yt:'legge grus innkjørsel jevne ut', desc:'Grus flyttes og komprimeres over tid, særlig av biler og nedbør. Jevn og riktig dybde (minst 5–8 cm) gir god drening og unngår søleproblemer.', steps:['Jevn ut eksisterende grus med en rive – fyll forsenkninger og spor etter biler.','Bestill ny grus (knust pukk 8–16 mm er vanligst for innkjørsler – god drening og lite søl).','Jevn ut nye masser til jevn tykkelse, start fra midten og arbeid utover.','Kjør over med bil eller trampe godt – grus må komprimeres for å ligge stabilt.','Sjekk at gruset heller svakt bort fra huset (dreneringsgradient på minst 2 %).']},
  { id:94, interval:365, title:'Rens fuger i belegningsstein og naturstein',        cat:'uteareal', icon:'ti-road', due:addDays(35),  freq:'Én gang i året',          types:['rekkehus','enebolig'], fagfolk:null, yt:'rense fuger belegningsstein naturstein', desc:'Ugress i fuger løfter og vrikker steinen over tid. Rene fuger med god fugepasta holder plassen stabil og ser pen ut i mange år.', steps:['Fjern ugress i fugene med et smalt fugejern eller ugress-stikker.','Høytrykkspyl fugene på lavt trykk (maks 80 bar) – høyere trykk blåser ut fugesanden.','La tørke helt i minst 24 timer (helst 48 timer).','Fyll fugene med ny kvartssand eller polymersand – strø over hele flaten og fei ned i fugene.','Vann lett over flaten til polymersanden stivner – den binder seg og hindrer ugress og maur.']},
  { id:95, interval:1825,title:'Kontroller fall og drening på utearealer',          cat:'uteareal', icon:'ti-road', due:addDays(50),  freq:'Hvert 5. år',             types:['rekkehus','enebolig'], fagfolk:{ ma:'gravearbeider drenering uteareal', g:'dreneringsfall innkjørsel gårdsplass sjekke' }, yt:'dreneringsfall kontrollere innkjørsel', desc:'Feil fall på innkjørsel og gårdsplass leder vann mot huset istedenfor bort fra det. Over år kan dette gi fuktskader i grunnmur og kjeller.', steps:['Legg en lang rettholt (2–3 m) på flaten og mål fallet med et vater eller nivellerstav.','Riktig fall: minst 2 % (2 cm per meter) bort fra husveggen.','Kartlegg hvor vann blir stående etter regn – det er alltid lavereliggende enn det burde.','Lav flekker i asfalt: fyll med kald asfaltmasse. I grus: skjær drenering eller legg rørgrøft.','Større problemer med dreneringen: tilkall graveentreprenør.']},
  { id:96, interval:365, title:'Sjekk og rens sluk og rister på gårdsplass',        cat:'uteareal', icon:'ti-road', due:addDays(10),  freq:'Vår og høst',             types:['rekkehus','enebolig'], fagfolk:null, yt:'rense avløpssluk gårdsplass rist', desc:'Tette sluk på gårdsplass gir vannansamling og vintersprekker i belegget. Enkelt å rense – tar 10 minutter.', steps:['Løft risten og fjern blader, grus og smuss fra kurven under.','Skyll med hageslange eller bøtte vann – vannet skal renne fritt.','Sjekk at selve rørforbindelsen ikke er tett (bruk en pinne for å kjenne etter).','Tett ledning: bruk avløpsåpner eller ringleder med trykkspyling.','Legg risten tilbake og sjekk at den sitter stødig og ikke vagger.']},
  { id:97, interval:730, title:'Oljebehandle eller forsegle ny asfalt',             cat:'uteareal', icon:'ti-road', due:addDays(90),  freq:'Hvert 2.–3. år',          types:['rekkehus','enebolig'], fagfolk:{ ma:'asfaltering forseglingssystem innkjørsel', g:'forsegle asfalt innkjørsel sealcoat' }, yt:'forsegle asfalt innkjørsel sealcoat', desc:'Asfaltolje (sealcoating) beskytter mot UV-stråling, vann og salt som bryter ned bindemiddelet i asfalten. Livstidsforlenger for innkjørselen.', steps:['Rens asfalten grundig – høytrykkspyl og la tørke minst 48 timer.','Reparer alle sprekker og hull først – forseglingen dekker over, men fikser ikke strukturproblemer.','Påfør asfaltolje med rulle eller sprøyte i 2 strøk – følg produsentens tørketid mellom strøkene.','Sperr av området i minst 24 timer etter siste strøk.','Utfør ikke behandlingen under 10 °C eller ved fare for regn – bindemiddelet trenger varme for å herde.']},

    80: { title:'Vårklipp av bärbuskar',freq:'En gång per år (tidig vår)',desc:'Rätt vårklipp stimulerar buskarna att sätta rikligt med bär.',steps:['Klipp ut grenar äldre än 3–4 år.','Ta bort svaga och sjuka grenar.','Behåll 6–8 starka unga grenar per buske.','Klipp rent ovanför en utåtvänd knopp.','Kompostera klippet.'] },
    81: { title:'Gödsla och vattna bärbuskar',freq:'Vår och försommar',desc:'Bärbuskar är storkonsumenter av näring.',steps:['Gödsla tidig vår med bärgödning.','Blanda ned med lätt hackning eller vattning.','Ge en ny dos i juni.','Vattna rikligt i torra perioder.','Lägg kompost runt buskarna.'] },
    82: { title:'Skörda bär och rensa buskarna',freq:'En gång per år (sommar)',desc:'Bär plockade i rätt tid smakar bäst.',steps:['Svarta vinbär och röda: plocka när hela klasar är mogna.','Krusbär: plocka lite omogna för kokning.','Ta bort ruttna bär.','Rensa under buskarna efter skörd.','Lägg ny kompost runt rotzonen.'] },
    83: { title:'Vårklipp och formning av äppel- och päronträd',freq:'En gång per år (tidig vår)',desc:'Fruktträd som inte beskärs ger lite och dålig frukt.',steps:['Klipp bara i torrt väder, gärna vid frost.','Ta bort korsande och inåtväxande grenar.','Klipp ut vattenskott.','Kronan ska vara öppen – ljuset ska komma in.','Stora grenar: anlita arborist.'] },
    84: { title:'Gödsla och kalka fruktträd',freq:'En gång per år (vår)',desc:'Fruktträd behöver mycket näring.',steps:['Strö kalk runt rotzonen i april.','Tillsätt fruktgödsel efter blomning.','Vattna in.','Lägg kompost till drippsonen.','Avsluta gödsling senast 1 juli.'] },
    85: { title:'Kontrollera fruktträd för skadedjur och sjukdomar',freq:'Vår och försommar',desc:'Äppelskurv, bladlöss och fruktmott är de vanligaste problemen.',steps:['Kontrollera blad för bruna fläckar från maj.','Sätt upp lim- eller feromonfällor.','Rensa ogräs och gammalt blad under trädet.','Spraya med kopparmedel vid känt skurvproblem.','Tvätta stammar för mossa och lav på hösten.'] },
    86: { title:'Stödpåle och fastsättning av unga fruktträd',freq:'Kontrolleras varje år',desc:'Unga träd som rör sig i vinden utvecklar dåliga rötter.',steps:['Kontrollera att pålen inte är rutten.','Bindningen ska sitta löst nog för lite rörelse.','Använd brett mjukt band.','Träd äldre än 3–4 år: ta bort pålen.','Kontrollera att stammens rot inte är täckt av jord.'] },
    87: { title:'Förnya och dela gamla bärbuskar',freq:'Vart 5–7 år',desc:'Bärbuskar är produktiva i 10–15 år.',steps:['Gräv upp hela busken.','Dela rotsystemet i 3–4 delar.','Plantera med god avstånd.','Vattna rikligt och håll fuktig 4 veckor.','Alternativt: ta sticklingar i september.'] },
    90: { title:'Inspektera och fyll sprickor i asfalt',freq:'En gång per år (vår)',desc:'Vatten i asfalssprickor fryser och skapar större skador.',steps:['Rensa sprickorna noga.','Låt torka minst 24 h.','Fyll med asfaltspackningsmedel.','Komprimera med trä eller rulle.','Stora hål: kall asfaltmassa eller entreprenör.'] },
    91: { title:'Ogräs i asfalt och längs kanter',freq:'Vår och sommar',desc:'Rötterna spricker sönder asfalten.',steps:['Ta bort ogräs med rot.','Använd kokande vatten längs kanter.','Spraya med ättika.','Fyll rensade sprickor.','Lägg ogräsmatta vid renovering.'] },
    92: { title:'Tvätta och högtrycksspola uppfart',freq:'En gång per år (vår)',desc:'Högtryckstvätt tar bort alger och vintergrus.',steps:['Sopa bort löst grus och löv.','Använd högtryckstvätt med viftmunstycke (40°).','Börja uppifrån och arbeta nedåt.','Använd algrengöringsmedel om det behövs.','Oljefläckar: strö på avfettningsmedel.'] },
    93: { title:'Fyll på och jämna ut gruset',freq:'Vartannat år',desc:'Grus förflyttas med tiden av bilar och regn.',steps:['Jämna befintligt grus med kratta.','Beställ nytt grus (8–16 mm krossad sten).','Jämna ut till jämn tjocklek.','Kör över med bil för komprimering.','Kontrollera att gruset lutar från huset.'] },
    94: { title:'Rengör fogar i marktegel och natursten',freq:'En gång per år',desc:'Ogräs i fogar lyfter och vrider stenen.',steps:['Ta bort ogräs med fogverktyg.','Högtrycksspola fogarna vid lågt tryck (max 80 bar).','Låt torka minst 24 h.','Fyll med ny kvartsand eller polymersand.','Vattna lätt tills polymersanden stelnar.'] },
    95: { title:'Kontrollera fall och dränering',freq:'Vart 5 år',desc:'Fel fall leder vatten mot huset.',steps:['Lägg en rätskiva och mät fallet.','Rätt fall: minst 2 % bort från husväggen.','Kartlägg var vatten bli stående.','Låga fläckar: fyll med kall asfaltmassa.','Större problem: anlita markentreprenör.'] },
    96: { title:'Kontrollera och rensa golvbrunnar på uppfarten',freq:'Vår och höst',desc:'Igensatta brunnar ger vattensamlingar och vinterssprickor.',steps:['Lyft gallret och ta bort löv och grus.','Spola med slang.','Kontrollera att röret inte är igensatt.','Täppt ledning: använd avloppsöppnare.','Sätt tillbaka gallret.'] },
    97: { title:'Oljebehandla eller försegla ny asfalt',freq:'Vart 2–3 år',desc:'Asfaltsolja skyddar mot UV, vatten och salt.',steps:['Rengör asfalten – högtryckstvätt och torka 48 h.','Reparera sprickor och hål.','Påför asfaltolja med rulle i 2 lager.','Spärra av i minst 24 h.','Utför inte under 10°C eller vid regn.'] },
  },
  da: {
    1:  { title:'Skift batterier i røgalarm',freq:'Hver 6. måned',desc:'En røgalarm med svagt batteri kan holde op uden varsel.',steps:['Tag alarmen ned (drej mod uret).','Åbn og skift batteri – 9V eller AA.','Hold testknap inde 5 s.','Notér skiftedato på bagsiden.'] },
    2:  { title:'Test kuldioxiddetektor',freq:'Månedligt',desc:'CO er lugtfri og dødelig.',steps:['Find detektoren i hall eller soveværelse.','Hold testknap inde 5–10 s til alarm høres.','Ingen lyd? Skift batteri eller enhed.','Enheder bør skiftes hvert 5–7 år.'] },
    3:  { title:'Ryst og inspicér brandslukker',freq:'Månedligt',desc:'Pulver kan klumpe. Rysten holder det løst.',steps:['Vend om og ryst forsigtigt 10–15 s.','Kontrollér manometeret – grønt.','Kontrollér sikringsstift og plombering.','Ældre end 10 år: service.'] },
    4:  { title:'Test HPFI-relæ/jordfejlsafbryder',freq:'Månedligt',desc:'Jordfejlsafbryderen beskytter mod elulykker nær vand.',steps:['Find "Test"/"Reset"-stik i køkken og badeværelse.','Tryk "Test" – strøm skal afbrydes.','Tryk "Reset" for at gendanne.','Virker det ikke: ring elektriker.'] },
    5:  { title:'Ryd og vask fællesgangen',freq:'Ifølge vagtplan',desc:'Rene fællesarealer er brandsikre og hyggelige.',steps:['Fej og vask gulv i entré og trapperum.','Tør brevkasser og håndtag af.','Fjern genstande der blokerer flugtveje.','Meld udbrændte pærer.'] },
    8:  { title:'Kontrollér rør under vaske for lækager',freq:'Hver 6. måned',desc:'Små lækager kan gå måneder ubemærket.',steps:['Åbn skabet under vasken.','Føl langs alle samlinger.','Se efter kalk, rust eller mørke pletter.','Fugtig klud næste dag? Ring VVS.'] },
    11: { title:'Skift luftfilter i ventilation',freq:'Hver 3. måned',desc:'Snavsede filtre reducerer luftkvaliteten.',steps:['Find ventilationsaggregatet.','Åbn og tag det gamle filter ud.','Notér filterstørrelse.','Sæt nyt filter i med luftpilen korrekt.'] },
    15: { title:'Rens tagrender og nedløb',freq:'To gange om året',desc:'Fyldte tagrender leder vand ned ad væggen.',steps:['Opstil stige sikkert.','Fjern blade med renseskraber.','Skyl mod nedløb.','Langsom afledning: frigør stop med plastikpind.'] },
    40: { title:'Klip plænen',freq:'Ugentligt (maj–sept)',desc:'Regelmæssig klipning holder plænen tæt og sund.',steps:['Indstil klippehøjde 4–6 cm.','Klip i tørt vejr.','Skift køreretning hver gang.','Tøm opsamler og kompostér.'] },
    41: { title:'Gødsk og rake plænen',freq:'Forår og efterår',desc:'Rivning fjerner dødgræs der kvæler plænen.',steps:['Rive filtlag med rive.','Luft tætte partier.','Strø pille-gødning jævnt.','Vand godt ind.'] },
    50: { title:'Slib og vedligehold plæneklipper',freq:'En gang om året (forår)',desc:'En skarp klipper bruger mindre brændstof.',steps:['Tøm benzin eller frakobl batteri.','Slib kniven med vinkelsliber.','Udskift tændrør og luftfilter.','Kontrollér olie.','Rens under klippedækket.'] },
    60: { title:'Afrim og rens fryseren',freq:'En gang om året',desc:'Isophobning reducerer kapacitet og effektivitet.',steps:['Tag al mad ud.','Sluk og læg håndklæde i bunden.','Lad is smelte naturligt.','Rens med lunkent vand og natron.','Tænd og køl ned 2–3 t.'] },
    61: { title:'Rens opvaskemaskinefilter og spylearm',freq:'Månedligt',desc:'Tilstoppet filter giver dårlig vask.',steps:['Tag kurvene ud og find filteret.','Drej mod uret og løft – skyl.','Løsn spylearm og rens huller.','Kør tomt program 60°C med eddike.','Tør pakning rundt om lugen.'] },
    80: { title:'Forårsbeskær bærbuske',freq:'En gang om året (tidlig forår)',desc:'Korrekt forårsbeskæring stimulerer bærbuske.',steps:['Klip grene ældre end 3–4 år ud.','Fjern svage og syge grene.','Behold 6–8 stærke unge grene.','Klip rent over en udadpegende knop.','Kompostér klippet.'] },
    90: { title:'Inspicér og fyld revner i asfalt',freq:'En gang om året (forår)',desc:'Vand i asfaltrevner fryser og skaber større skader.',steps:['Rens revnerne grundigt.','Lad tørre mindst 24 t.','Fyld med asfaltfugepasta.','Komprimer med flad træklods.','Store huller: kold asfaltmasse.'] },
    93: { title:'Fyld på og jævn grusdækket',freq:'Hvert 2. år',desc:'Grus flyttes og komprimeres med tiden.',steps:['Jævn med rive.','Bestil nyt grus (8–16 mm knust).','Jævn til jævn tykkelse.','Kør bil over for komprimering.','Kontrollér at gruset hælder fra huset.'] },
  },
  en: {
    1:  { title:'Change smoke alarm batteries',freq:'Every 6 months',desc:'A smoke alarm with a weak battery can stop working without warning.',steps:['Remove the alarm (twist anticlockwise).','Replace battery – usually 9V or AA.','Hold test button 5 s.','Note the date on the back.'] },
    2:  { title:'Test carbon monoxide detector',freq:'Monthly',desc:'CO is odourless and deadly.',steps:['Locate detector in hallway or bedroom.','Hold test button 5–10 s until alarm sounds.','No sound? Replace battery or unit.','Replace units every 5–7 years.'] },
    3:  { title:'Shake and inspect fire extinguisher',freq:'Monthly',desc:'Powder can clump. Shaking keeps it ready.',steps:['Turn upside down and shake 10–15 s.','Check gauge – green zone.','Check safety pin and seal are intact.','Over 10 years old: send for service.'] },
    4:  { title:'Test GFCI outlets',freq:'Monthly',desc:'GFCI breakers protect against electric shock near water.',steps:['Find "Test"/"Reset" outlets in kitchen and bathroom.','Press "Test" – power should cut.','Press "Reset" to restore.','Not working: call an electrician.'] },
    5:  { title:'Clean communal hallway',freq:'According to rota',desc:'Clean communal areas are fire-safe and pleasant.',steps:['Sweep and mop entrance and stairwell.','Wipe letterboxes and handles.','Remove items blocking escape routes.','Report burnt-out bulbs.'] },
    6:  { title:'Report faults to the building manager',freq:'As needed',desc:'Reporting faults early prevents small damage from becoming large.',steps:['Take a photo as documentation.','Send via the board\'s channel.','Give exact location and contact info.','Follow up if you hear nothing.'] },
    7:  { title:'Check basement storage for damp',freq:'Every 3 months',desc:'Basements are prone to damp. Early detection prevents mould.',steps:['Smell for mould when opening storage.','Look for dark patches on walls and floor.','Feel for moisture.','Damp found? Report to building manager immediately.'] },
    8:  { title:'Check pipes under sinks for leaks',freq:'Every 6 months',desc:'Small leaks can go undetected for months.',steps:['Open the cupboard under the sink.','Feel along all joints.','Look for limescale, rust or dark patches.','Damp cloth next day? Call a plumber.'] },
    9:  { title:'Flush water heater sediment',freq:'Once a year',desc:'Limescale reduces efficiency. Regular flushing extends lifespan.',steps:['Switch off power at the fuse box.','Connect a hose to the drain valve.','Drain 20–40 min.','Flush with cold water until clear.'] },
    10: { title:'Check drainage channels and gullies',freq:'Once a year',desc:'Blocked drainage pushes water against foundations.',steps:['Find all gully covers around the house.','Lift lid – look for leaves and soil.','Clear with gloves and flush with hose.','Persistent blockage: contact drainage contractor.'] },
    11: { title:'Replace ventilation air filter',freq:'Every 3 months',desc:'Dirty filters reduce air quality and increase energy use.',steps:['Locate the ventilation unit.','Open and remove old filter.','Note filter size.','Insert new filter with airflow arrow correct.'] },
    12: { title:'Clean tumble dryer lint trap and duct',freq:'Every 3 months',desc:'Lint build-up is a fire hazard.',steps:['Empty lint trap after every load.','Vacuum inside filter housing.','Disconnect and clean exhaust duct.','Check external vent grille is not blocked.'] },
    13: { title:'Clean fridge condenser coils',freq:'Every 6 months',desc:'Dusty coils can use up to 30% more electricity.',steps:['Pull fridge away from wall and unplug.','Find condenser coils at back or below.','Vacuum gently with soft brush.','Push back and plug in.'] },
    14: { title:'Service heating system / heat pump',freq:'Once a year',desc:'Servicing maintains warranty and winter efficiency.',steps:['Book a qualified engineer.','Clean indoor filter monthly in heating season.','Keep outdoor unit clear of snow and plants.','Record the service date.'] },
    15: { title:'Clean gutters and downpipes',freq:'Twice a year',desc:'Full gutters lead water down the wall and cause damp damage.',steps:['Set up ladder safely.','Remove debris with gutter scoop or gloves.','Flush with hose towards downpipe.','Slow drainage: clear with drain rod.'] },
    16: { title:'Inspect roof and flashings',freq:'Once a year',desc:'Early detection saves significant repair costs.',steps:['Use binoculars from the ground.','Look for loose, cracked or missing tiles.','Check flashings around chimney and roof windows.','Damage found: call a qualified roofer.'] },
    17: { title:'Paint and maintain facade',freq:'Every 5–8 years',desc:'Paint is the primary weather protection for the timber.',steps:['Walk around and look for flaking and bubbling.','Scrape loose paint and prime bare wood.','Choose exterior paint suited to local climate.','Paint in dry weather 10–25°C.'] },
    18: { title:'Prune trees and shrubs near the house',freq:'Once a year',desc:'Branches against the roof keep it damp and can lift tiles.',steps:['Identify branches within 2 m of the roof.','Cut back cleanly to trunk or side branch.','Trees over 5 m: use certified arborist.','Dispose of branches at recycling centre.'] },
    19: { title:'Check foundations for cracks',freq:'Once a year',desc:'Cracks can allow water ingress and structural damage.',steps:['Inspect the visible foundation all around.','Look for cracks wider than 1–2 mm.','Photograph and mark – check if they grow.','Growing cracks: contact a structural engineer.'] },
    20: { title:'Clean chimney and inspect fireplace',freq:'Once a year',desc:'Soot build-up is a common cause of house fires.',steps:['Book a chimney sweep.','Clear the area around the stove.','Check the glass gasket seals properly.','Look for cracks in the firebox.'] },
    21: { title:'Seal gaps around windows and doors',freq:'Once a year before winter',desc:'Draughts can account for 20–30% of heat loss.',steps:['Hold a lit match along the frame – movement reveals draught.','Cracked weather strip? Replace it.','Remove old sealant with a craft knife.','Fill with exterior silicone and smooth with wetted finger.'] },
    22: { title:'Shut off and drain outdoor taps',freq:'Every autumn',desc:'Freezing in outdoor pipes can burst them.',steps:['Find the indoor stop valve – usually in the basement.','Close the stop valve.','Open the outdoor tap to drain residual water.','Leave the tap open all winter.'] },
    23: { title:'Check balcony for damp and rust',freq:'Once a year',desc:'Balconies are subject to freeze-thaw cycles.',steps:['Look for orange rust patches on railings.','Check the railing is secure.','Check flooring for cracks and damp.','Surface rust: sand and treat. Deep rust: report to building manager.'] },
    30: { title:'Wash house facade',freq:'Once a year (spring)',desc:'Algae and dirt break down the surface finish.',steps:['Use hose or pressure washer max 100 bar.','Start at the top and work down.','Use house wash product for algae – leave 10–15 min.','Rinse thoroughly and allow 48 h before painting.'] },
    31: { title:'Paint windows, door frames and trim',freq:'Every 3–5 years',desc:'Windows and frames are particularly exposed to weather.',steps:['Sand flaking paint.','Fill cracks with elastic filler.','Prime bare wood.','Apply 2 coats of exterior wood paint.'] },
    32: { title:'Treat decking and patio',freq:'Every 2–3 years',desc:'Untreated wood goes grey and cracks.',steps:['Wash and allow 2–3 days to dry.','Sand with coarse paper (80-grit).','Vacuum and wipe down.','Apply deck oil or stain with a wide brush.'] },
    33: { title:'Wash windows externally',freq:'Twice a year',desc:'Clean windows let in more light.',steps:['Clean frames with a soft cloth and soapy water.','Use window cleaner and scrub pad.','Rubber squeegee from top to bottom.','Dry edges with microfibre cloth.'] },
    34: { title:'Clean and wash the garage',freq:'Once a year',desc:'Oil and salt damage the floor and structure.',steps:['Move cars out and clear the floor.','Sweep and vacuum.','Wash with degreaser and scrub.','Inspect walls for damp and pests.'] },
    40: { title:'Mow the lawn',freq:'Weekly (May–Sept)',desc:'Regular mowing keeps the lawn thick and healthy.',steps:['Set cutting height to 4–6 cm.','Mow in dry weather.','Change direction each time.','Empty catcher and compost.'] },
    41: { title:'Fertilise and rake the lawn',freq:'Spring and autumn',desc:'Raking removes dead thatch.',steps:['Rake out thatch in spring.','Aerate compacted areas.','Spread lawn fertiliser evenly.','Water in well.'] },
    42: { title:'Control weeds in beds and lawn',freq:'Monthly (May–Sept)',desc:'Weeds steal nutrients and water.',steps:['Pull weeds out by the root.','Use a weeding tool.','Lay bark chippings in beds.','Compost weed-free material.'] },
    43: { title:'Prepare garden for winter',freq:'Once a year (autumn)',desc:'Autumn tidying protects plants and makes spring easier.',steps:['Mow lawn one last time – 5–6 cm.','Rake leaves and compost.','Bring in frost-sensitive plants.','Cover vulnerable perennials.'] },
    44: { title:'Trim hedges and shrubs',freq:'Once a year (summer)',desc:'Regular trimming keeps hedges dense and tidy.',steps:['Trim after flowering – June–Aug.','Use sharp hedge trimmers.','Aim for V-shape – wider at bottom.','Compost the clippings.'] },
    45: { title:'Water and feed plants',freq:'Weekly (May–Aug)',desc:'Drought is the most common reason plants fail.',steps:['Water early in the morning.','Soil should be moist 3–5 cm down.','Liquid feed once a week.','Water at the root, not on the leaves.'] },
    50: { title:'Sharpen and service lawn mower',freq:'Once a year (spring)',desc:'A sharp mower uses less fuel and cuts more evenly.',steps:['Drain fuel or disconnect battery.','Sharpen blade with angle grinder.','Replace spark plug and air filter.','Check oil level.','Clean under cutting deck.'] },
    51: { title:'Service chainsaw',freq:'Once a year or after use',desc:'A well-maintained chainsaw is safer and more effective.',steps:['Check and adjust chain tension.','Sharpen the chain.','Check chain oil and fuel.','Clean air filter.','Check chain guard and safety gear.'] },
    52: { title:'Sharpen and maintain garden tools',freq:'Once a year (spring)',desc:'Sharp tools are easier to use and protect plants better.',steps:['Clean soil and rust with wire brush.','Sharpen spades and hoes with file.','Rub metal parts with linseed oil.','Sand handles and treat with linseed oil.','Hang on hooks.'] },
    53: { title:'Service snow blower',freq:'Once a year (autumn)',desc:'A snow blower that fails in -20°C is a real problem.',steps:['Change oil and spark plug.','Check and tighten all bolts.','Check scraper blades are not worn.','Fill with fresh fuel.','Test the chute mechanism.'] },
    54: { title:'Inspect and maintain ladders',freq:'Once a year',desc:'A damaged ladder is a serious safety risk.',steps:['Check all rungs for cracks and rust.','Check rubber feet are intact.','Inspect locking mechanisms.','Wood: treat with linseed oil. Aluminium: light sand.','Store horizontally or on hooks.'] },
    55: { title:'Top up emergency supplies',freq:'Once a year',desc:'A small emergency supply makes you self-sufficient during power cuts.',steps:['Check torch batteries.','Top up candles and matches.','Check first aid kit.','Have 20 l water and a few days food.','Know where the main stopcock and fuse box are.'] },
    60: { title:'Defrost and clean freezer',freq:'Once a year',desc:'Ice build-up reduces capacity and efficiency.',steps:['Remove all food.','Switch off and lay towel in bottom.','Let ice melt naturally.','Clean with lukewarm water and bicarbonate.','Switch on and cool 2–3 hours before restocking.'] },
    61: { title:'Clean dishwasher filter and spray arms',freq:'Monthly',desc:'A blocked filter causes poor washing and bad smells.',steps:['Remove baskets and find filter.','Twist anticlockwise and lift – rinse.','Remove spray arms and clean holes.','Run empty programme at 60°C with vinegar.','Wipe door seal.'] },
    62: { title:'Clean washing machine drum seal and filter',freq:'Monthly',desc:'The door seal is a source of mould and bad smells.',steps:['Wipe seal with vinegar solution.','Find and unscrew pump filter slowly.','Drain water and clean filter.','Run empty programme at 60°C.','Leave door ajar after washing.'] },
    63: { title:'Descale coffee machine and kettle',freq:'Monthly',desc:'Limescale reduces efficiency and worsens taste.',steps:['Fill with 50/50 vinegar and water.','Run descaling programme.','Run 2 rinse cycles with clean water.','Kettle: boil, pour out, rinse twice.','Repeat monthly in hard water areas.'] },
    64: { title:'Clean fridge interior',freq:'Every two years',desc:'Regular cleaning removes bacteria and mould.',steps:['Remove all food.','Switch off and remove all shelves.','Wash with bicarbonate solution.','Wash shelves separately.','Switch on and allow 1 hour before restocking.'] },
    65: { title:'Clean cooker hood and filter',freq:'Every 3 months',desc:'Grease filters can catch fire.',steps:['Remove grease filter.','Wash in dishwasher at 50–60°C.','Allow to dry completely.','Wipe inside of hood.','Check fan air inlet is not blocked.'] },
    66: { title:'Clean tumble dryer condensate station',freq:'Monthly',desc:'Dirty condensers increase energy use.',steps:['Empty condensate water tank after every use.','Remove and rinse condenser unit.','Allow to dry and replace.','Clean lint filter drawer.'] },
    70: { title:'Open the cabin for spring',freq:'Once a year (spring)',desc:'A thorough opening inspection ensures the cabin is ready.',steps:['Turn on water and check pipes for leaks.','Check smoke alarm and extinguisher.','Air thoroughly – open all windows 2 hours.','Inspect roof, walls and foundations.','Check drains are not blocked.'] },
    71: { title:'Close the cabin for winter',freq:'Once a year (autumn)',desc:'Proper winter closing protects against frost damage.',steps:['Shut off and drain water pipes.','Pour antifreeze into toilet siphon.','Switch off all circuits except frost guard.','Remove food that could attract pests.','Roll up hoses and bring in loose items.'] },
    72: { title:'Check roof for snow load',freq:'After heavy snowfall',desc:'Snow can weigh 100–300 kg/m². Check after heavy falls.',steps:['Measure snow depth with a stick.','Over 50 cm: use a roof rake from ground.','Always work from the ground.','Check gutters are not frozen.','Check inside for cracking or bowed rafters.'] },
    73: { title:'Ventilate cabin against damp',freq:'Regularly when in use',desc:'Cabins are particularly prone to damp problems.',steps:['Air thoroughly on arrival – all windows 2 h.','Check for musty smell and dark patches.','Look under rugs and behind furniture.','Check ventilation openings are clear.','Use dehumidifier in damp weather.'] },
    74: { title:'Maintain jetty and mooring fittings',freq:'Once a year',desc:'Seawater, sun and ice are very damaging to untreated wood.',steps:['Inspect all planks for rot.','Replace rotten planks immediately.','Scrub deck with stiff brush and jetty cleaner.','Apply thick deck stain or jetty oil.','Check supports, anchors and fittings.'] },
    75: { title:'Stack firewood and prepare woodshed',freq:'Once a year (summer)',desc:'Good dry firewood is essential for efficient heating.',steps:['Order or collect wood in good time.','Split to the right size for your stove.','Stack with air gaps.','Cover top but leave sides open.','Keep woodshed away from house wall.'] },
    76: { title:'Service water pump at cabin',freq:'Once a year',desc:'A pump failure means no water access.',steps:['Turn on power and check the pump starts.','Check pressure vessel.','Inspect suction side for air leaks.','Check expansion tank pressure.','Unusual sounds? Call a plumber.'] },
    80: { title:'Spring pruning of berry bushes',freq:'Once a year (early spring)',desc:'Correct pruning stimulates the bushes to produce plenty of fruit.',steps:['Cut out stems older than 3–4 years.','Remove weak, diseased or inward-growing stems.','Keep 6–8 strong young stems per bush.','Cut cleanly just above an outward-facing bud.','Compost prunings.'] },
    81: { title:'Fertilise and water berry bushes',freq:'Spring and early summer',desc:'Berry bushes are heavy feeders.',steps:['Apply berry fertiliser in early spring.','Mix in with light hoeing or watering.','Apply another dose in June.','Water deeply in dry periods.','Mulch around bushes with compost.'] },

TASK_I18N.fi = TASK_I18N.en;

function getTask(taskObj) {
  var lang = (APP.locale && APP.locale.lang) || 'no';
  if (lang === 'no') return taskObj;
  var langMap = TASK_I18N[lang];
  if (!langMap) return taskObj;
  var tr = langMap[taskObj.id];
  if (!tr) return taskObj;
  return Object.assign({}, taskObj, {
    title: tr.title || taskObj.title,
    freq:  tr.freq  || taskObj.freq,
    desc:  tr.desc  || taskObj.desc,
    steps: tr.steps || taskObj.steps,
  });
}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
function showToast(msg, ok = true) {
  const el = document.createElement('div');
  el.className = `toast ${ok ? 't-ok' : 't-err'}`;
  el.innerHTML = `<i class="ti ${ok ? 'ti-check' : 'ti-x'}"></i><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════ */
function navigate(page) {
  APP.page = page;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + page).classList.add('active');
  document.getElementById('scroll-area').scrollTop = 0;
  renderPage();
}

function renderPage() {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  const el = document.getElementById('page-' + APP.page);
  el.style.display = 'block';
  if (APP.page === 'hjem') renderHjem();
  else if (APP.page === 'juridisk') renderJuridisk();
  else if (APP.page === 'renovering') renderRenovering();
  else renderInnstillinger();
  updateOverdueDot();
  updateRenoveringDot();
}

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function urgency(t) {
  if (t.done) return 3;
  const d = Math.floor((t.due - TODAY) / 864e5);
  if (d < 0) return 0;
  if (d <= 14) return 1;
  return 2;
}
function getDueInfo(t) {
  const diff = Math.floor((t.due - TODAY) / 864e5);
  const isOv = !t.done && diff < 0;
  const isSn = !t.done && diff >= 0 && diff <= 14;
  let label = '', cls = '';
  if (isOv) { label = `${Math.abs(diff)} dager forfalt`; cls = 'overdue'; }
  else if (isSn) { label = diff === 0 ? 'Forfaller i dag' : `Om ${diff} dager`; cls = 'soon'; }
  else label = fmtDate(t.due);
  return { label, cls, isOv, isSn };
}
function updateOverdueDot() {
  const dot = document.getElementById('dot-hjem');
  const hasOverdue = APP.tasks.some(t => !t.done && t.due < TODAY);
  dot.classList.toggle('show', hasOverdue);
}
function setType(type) {
  APP.boligtype = type;
  APP.filter = 'all';
  APP.expandedId = null;
  const history = loadHistory();
  APP.tasks = ALL_TASKS
    .filter(t => t.types.includes(type))
    .map(t => {
      const h = history[t.id];
      if (h && h.lastDone) {
        const next = nextDueDate(t.interval, h.lastDone);
        return { ...t, due: next, done: false, lastDone: h.lastDone, doneCount: h.count || 1 };
      }
      return { ...t, done: false, lastDone: null, doneCount: 0 };
    });
  saveAppSettings();
}

  var taskCards = visible.length

  var weatherSetupMsg = { no:'Legg til stedsnavn for å få værvarsling og smarte tips om ute-oppgaver.', sv:'Lägg till ortnamn för att få väderprognoser och smarta tips om utomhusarbeten.', da:'Tilføj stednavn for at få vejrudsigt og smarte tips om udendørs opgaver.', en:'Add a location to get weather forecasts and smart tips about outdoor tasks.', de:'Ort hinzufügen für Wettervorhersagen und Tipps für Außenarbeiten.', nl:'Voeg een locatie toe voor weersvoorspellingen en slimme tips over buitenwerkzaamheden.' };

      '<div class="task-list">' + taskCards + '</div>' +
