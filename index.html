<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="description" content="Boligvedlikehold – hold oversikt over alt vedlikehold i hjemmet ditt"/>
<meta name="theme-color" content="#1C1A14"/>
<title>Boligvedlikehold</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.19.0/iconfont/tabler-icons.min.css"/>
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --ink:         #1C1A14;
  --ink2:        #4A4840;
  --ink3:        #8C8A82;
  --ink4:        #B8B6AE;
  --paper:       #F5F3ED;
  --paper2:      #ECEAE2;
  --paper3:      #E2DFD6;
  --paper4:      #D6D3C8;
  --warm-white:  #FDFCF8;

  --red:         #C0392B;
  --red-soft:    #FAE9E7;
  --orange:      #C96A00;
  --orange-soft: #FEF3E2;
  --green:       #2A6E3F;
  --green-soft:  #E8F5ED;
  --green-border:#A3D4B4;
  --blue:        #1A4F8A;
  --blue-soft:   #E8F0FA;
  --purple:      #5A3F9A;
  --purple-soft: #EEE9FB;
  --rose:        #8A2A4A;
  --rose-soft:   #FAE8EE;
  --ha:          #4A42A8;
  --ha-soft:     #EDEAFB;

  --serif:  'Lora', Georgia, serif;
  --sans:   'DM Sans', system-ui, sans-serif;

  --r-sm:  6px;
  --r:     10px;
  --r-lg:  16px;
  --r-xl:  22px;

  --shadow-sm: 0 1px 3px rgba(28,26,20,.07), 0 1px 2px rgba(28,26,20,.05);
  --shadow:    0 2px 8px rgba(28,26,20,.08), 0 1px 3px rgba(28,26,20,.06);
  --shadow-lg: 0 8px 24px rgba(28,26,20,.12), 0 3px 8px rgba(28,26,20,.08);

  --nav-h: 60px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ══ DARK MODE ══ */
[data-theme="dark"] {
  --ink:         #F0EDE6;
  --ink2:        #C4BFB5;
  --ink3:        #7A7870;
  --ink4:        #50504A;
  --paper:       #141210;
  --paper2:      #1E1C18;
  --paper3:      #28261F;
  --paper4:      #36332A;
  --warm-white:  #1A1814;

  --red-soft:    #2D1210;
  --orange-soft: #271800;
  --green-soft:  #0D1F14;
  --green-border:#1E4A2C;
  --blue-soft:   #0A1826;
  --purple-soft: #16102A;
  --rose-soft:   #220A14;
  --ha-soft:     #100E24;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
  --shadow:    0 2px 8px rgba(0,0,0,.4), 0 1px 3px rgba(0,0,0,.3);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.5), 0 3px 8px rgba(0,0,0,.4);
}

/* Theme toggle button */
.theme-btn {
  width: 34px;
  height: 34px;
  border-radius: var(--r-sm);
  border: 1px solid var(--paper3);
  background: var(--paper2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink2);
  font-size: 18px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  flex-shrink: 0;
}
.theme-btn:hover { background: var(--paper3); }

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: var(--sans);
  font-size: 15px;
  color: var(--ink);
  background: var(--paper);
  height: 100%;
  overflow: hidden;
}
a { color: inherit; text-decoration: none; }
button { font-family: var(--sans); cursor: pointer; }
input, select { font-family: var(--sans); }

/* ══════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 640px;
  margin: 0 auto;
  position: relative;
}

/* ── Scrollable content ── */
#scroll-area {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
}

/* ══════════════════════════════════════════
   TOP BAR
══════════════════════════════════════════ */
.topbar {
  background: var(--warm-white);
  border-bottom: 1px solid var(--paper3);
  padding: 14px 18px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 400;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -.01em;
}
.topbar-title .version-chip {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .06em;
  color: var(--ink3);
  background: var(--paper2);
  border: 1px solid var(--paper4);
  border-radius: 20px;
  padding: 2px 7px;
  vertical-align: middle;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 6px;
}
.icon-btn {
  width: 34px;
  height: 34px;
  border-radius: var(--r-sm);
  border: 1px solid var(--paper3);
  background: var(--paper2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink2);
  font-size: 18px;
  transition: background .15s, border-color .15s;
}
.icon-btn:hover { background: var(--paper3); }
.ha-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--paper4);
  margin-right: 2px;
  transition: background .3s;
  flex-shrink: 0;
}
.ha-indicator.connected { background: var(--green); box-shadow: 0 0 0 2px var(--green-soft); }

/* ══════════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════════ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 640px;
  height: calc(var(--nav-h) + var(--safe-bottom));
  background: var(--warm-white);
  border-top: 1px solid var(--paper3);
  display: flex;
  z-index: 100;
  padding-bottom: var(--safe-bottom);
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: transparent;
  color: var(--ink4);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: .03em;
  text-transform: uppercase;
  padding: 8px 0;
  position: relative;
  transition: color .15s;
}
.nav-tab i { font-size: 22px; transition: color .15s; }
.nav-tab.active { color: var(--ink); }
.nav-tab.active i { color: var(--ink); }
.nav-tab.active::after {
  content: '';
  position: absolute;
  top: 0;
  left: 20%;
  right: 20%;
  height: 2px;
  background: var(--ink);
  border-radius: 0 0 3px 3px;
}
.nav-tab .badge-dot {
  position: absolute;
  top: 8px;
  right: calc(50% - 14px);
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--red);
  border: 1.5px solid var(--warm-white);
  display: none;
}
.nav-tab .badge-dot.show { display: block; }

/* ══════════════════════════════════════════
   PAGE CONTENT
══════════════════════════════════════════ */
.page { padding: 18px 16px; }
.page-header {
  margin-bottom: 20px;
}
.page-header h2 {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -.02em;
}
.page-header p {
  font-size: 13px;
  color: var(--ink3);
  margin-top: 3px;
}

/* ══════════════════════════════════════════
   BOLIGTYPE PICKER
══════════════════════════════════════════ */
.bolig-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
@media (max-width: 400px) {
  .bolig-grid { grid-template-columns: repeat(2, 1fr); }
}
.bolig-kort {
  border: 1.5px solid var(--paper3);
  border-radius: var(--r-lg);
  padding: 14px 8px;
  text-align: center;
  cursor: pointer;
  background: var(--warm-white);
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.bolig-kort:hover { border-color: var(--paper4); box-shadow: var(--shadow-sm); }
.bolig-kort.active {
  border: 2px solid var(--ink);
  background: var(--ink);
}
.bolig-kort.active .bolig-ikon { color: var(--warm-white); }
.bolig-kort.active .bolig-navn { color: var(--warm-white); }
.bolig-kort.active .bolig-sub { color: var(--paper4); }
.bolig-ikon { font-size: 26px; display: block; margin-bottom: 5px; color: var(--ink3); }
.bolig-navn { font-size: 13px; font-weight: 600; color: var(--ink); }
.bolig-sub { font-size: 11px; color: var(--ink4); margin-top: 2px; }

/* ══════════════════════════════════════════
   STAT STRIP
══════════════════════════════════════════ */
.stat-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  border-radius: var(--r);
  padding: 12px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.stat-num {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 600;
  line-height: 1;
}
.stat-num.red { color: var(--red); }
.stat-num.orange { color: var(--orange); }
.stat-num.green { color: var(--green); }
.stat-lbl {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--ink3);
  margin-top: 4px;
}

/* ══════════════════════════════════════════
   FILTER PILLS
══════════════════════════════════════════ */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--paper3);
  background: var(--warm-white);
  color: var(--ink2);
  transition: all .12s;
  white-space: nowrap;
}
.pill:hover { border-color: var(--paper4); background: var(--paper2); }
.pill.active {
  background: var(--ink);
  color: var(--warm-white);
  border-color: var(--ink);
}
.pill i { font-size: 14px; }

/* ══════════════════════════════════════════
   TASK CARDS
══════════════════════════════════════════ */
.task-list { display: flex; flex-direction: column; gap: 8px; }

.task-card {
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .15s;
}
.task-card:hover { box-shadow: var(--shadow); }
.task-card.is-overdue { border-left: 3px solid var(--red); border-radius: 0 var(--r-lg) var(--r-lg) 0; }
.task-card.is-soon { border-left: 3px solid var(--orange); border-radius: 0 var(--r-lg) var(--r-lg) 0; }
.task-card.is-done { opacity: .5; }

.task-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 14px;
  cursor: pointer;
  transition: background .12s;
  user-select: none;
}
.task-row:hover { background: var(--paper2); }

.check-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--paper4);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
}
.check-btn:hover { border-color: var(--green); }
.check-btn.done { background: var(--green); border-color: var(--green); }
.check-btn i { font-size: 12px; color: white; display: none; }
.check-btn.done i { display: block; }

.task-info { flex: 1; min-width: 0; }
.task-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 4px;
  line-height: 1.4;
}
.is-done .task-title { text-decoration: line-through; color: var(--ink3); }
.task-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--ink3);
}
.cat-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: .02em;
}
.cat-sikkerhet  { background: var(--red-soft);    color: #7B1F1A; }
.cat-sesong     { background: var(--blue-soft);   color: #1A3D6B; }
.cat-apparater  { background: var(--green-soft);  color: #1C4D2C; }
.cat-utvendig   { background: var(--orange-soft); color: #7A4200; }
.cat-ror        { background: var(--purple-soft); color: #3A2870; }
.cat-fellesareal{ background: var(--rose-soft);   color: #5C1A32; }
.cat-frukt      { background: #FFF3E0;             color: #BF360C; }
.cat-uteareal   { background: #ECEFF1;             color: #263238; }

.fagfolk-chip {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  background: var(--orange-soft);
  color: #7A4200;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  letter-spacing: .02em;
}
.due-text { display: inline-flex; align-items: center; gap: 3px; }
.due-text.overdue { color: var(--red); font-weight: 600; }
.due-text.soon    { color: var(--orange); font-weight: 600; }

.task-chevron {
  font-size: 15px;
  color: var(--ink4);
  flex-shrink: 0;
  transition: transform .2s;
}
.task-chevron.open { transform: rotate(180deg); }

.snooze-btn {
  font-size: 16px;
  color: var(--ink4);
  background: transparent;
  border: none;
  padding: 4px;
  flex-shrink: 0;
  transition: color .12s;
}
.snooze-btn:hover { color: var(--ink2); }

/* ── Task detail panel ── */
.task-detail {
  display: none;
  border-top: 1px solid var(--paper3);
  background: var(--paper2);
  padding: 16px 16px 16px 46px;
  animation: slideIn .15s ease;
}
.task-detail.open { display: block; }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.detail-desc {
  font-family: var(--serif);
  font-size: 13.5px;
  line-height: 1.75;
  color: var(--ink2);
  margin-bottom: 14px;
  font-style: italic;
}
.steps-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}
.steps-list li {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.55;
}
.step-num {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--paper3);
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink2);
  flex-shrink: 0;
  margin-top: 1px;
}

/* ── Action buttons ── */
.action-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.act-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11.5px;
  font-weight: 500;
  padding: 6px 10px;
  border-radius: var(--r-sm);
  border: 1px solid var(--paper3);
  background: var(--warm-white);
  color: var(--ink2);
  cursor: pointer;
  text-decoration: none;
  transition: filter .12s, box-shadow .12s;
}
.act-btn:hover { filter: brightness(.95); box-shadow: var(--shadow-sm); }
.act-btn i { font-size: 13px; }
.act-ma  { background: var(--green-soft); border-color: #A3D4B4; color: #1C4D2C; }
.act-g   { background: var(--blue-soft);  border-color: #A3C0E8; color: #1A3D6B; }
.act-yt  { background: var(--red-soft);   border-color: #E8A8A0; color: #7B1F1A; }
.act-ha  { background: var(--ha-soft);    border-color: #B8B0E8; color: #3A2878; }
.act-sep { width: 1px; height: 18px; background: var(--paper3); margin: 0 1px; }

/* ══════════════════════════════════════════
   INFO BANNER
══════════════════════════════════════════ */
.info-banner {
  background: var(--blue-soft);
  border: 1px solid #B8D0EC;
  border-radius: var(--r);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--blue);
  margin-bottom: 16px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
  line-height: 1.55;
}
.info-banner i { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

/* ══════════════════════════════════════════
   SETTINGS PAGE
══════════════════════════════════════════ */
.settings-section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink3);
  margin: 22px 0 8px;
}
.settings-section-label:first-child { margin-top: 0; }

.settings-card {
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  margin-bottom: 10px;
}
.settings-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  transition: background .12s;
}
.settings-hdr:hover { background: var(--paper2); }
.settings-hdr-left { display: flex; flex-direction: column; gap: 2px; }
.settings-hdr-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}
.settings-hdr-title i { font-size: 18px; }
.settings-hdr-sub { font-size: 12px; color: var(--ink3); }
.settings-caret {
  font-size: 16px;
  color: var(--ink4);
  transition: transform .2s;
  flex-shrink: 0;
}
.settings-caret.open { transform: rotate(180deg); }
.settings-body {
  padding: 16px;
  border-top: 1px solid var(--paper3);
  background: var(--paper2);
}
.settings-body.hidden { display: none; }

/* ── Form ── */
.form-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.form-field label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--ink3);
}
.form-field input,
.form-field select {
  font-size: 13px;
  padding: 9px 11px;
  border-radius: var(--r-sm);
  border: 1px solid var(--paper4);
  background: var(--warm-white);
  color: var(--ink);
  width: 100%;
  transition: border-color .15s;
}
.form-field input:focus,
.form-field select:focus { outline: none; border-color: var(--ink2); }
.form-field input::placeholder { color: var(--ink4); }
.form-row { display: flex; gap: 8px; }
.form-row .form-field { flex: 1; }

/* ── Buttons ── */
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  padding: 9px 18px;
  border-radius: var(--r-sm);
  border: none;
  background: var(--ink);
  color: var(--warm-white);
  cursor: pointer;
  transition: background .15s;
}
.btn-primary:hover { background: var(--ink2); }
.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: var(--r-sm);
  border: 1px solid var(--paper4);
  background: var(--warm-white);
  color: var(--ink2);
  cursor: pointer;
  transition: background .15s;
}
.btn-secondary:hover { background: var(--paper2); }
.btn-danger {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 12px;
  border-radius: var(--r-sm);
  border: 1px solid #F0B8B4;
  background: var(--red-soft);
  color: var(--red);
  cursor: pointer;
}
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── HA status ── */
.ha-status-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--ink2);
  padding: 8px 0 4px;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sd-idle    { background: var(--ink4); }
.sd-ok      { background: var(--green); }
.sd-err     { background: var(--red); }
.sd-loading { background: var(--orange); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── Sensor grid ── */
.sensor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
  margin-top: 6px;
}
.sensor-tile {
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  border-radius: var(--r-sm);
  padding: 11px 13px;
}
.sensor-tile-label { font-size: 11px; color: var(--ink3); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
.sensor-tile-val { font-family: var(--serif); font-size: 20px; font-weight: 600; display: flex; align-items: baseline; gap: 3px; }
.sv-unit { font-size: 12px; font-weight: 400; font-family: var(--sans); color: var(--ink3); }
.sv-ok  { color: var(--green); }
.sv-err { color: var(--red); }

/* ── Automations ── */
.auto-list { display: flex; flex-direction: column; gap: 6px; }
.auto-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  border-radius: var(--r-sm);
  padding: 10px 12px;
}
.auto-item i { font-size: 18px; color: var(--ink3); flex-shrink: 0; }
.auto-texts { flex: 1; min-width: 0; }
.auto-name { font-size: 13px; font-weight: 500; color: var(--ink); }
.auto-sub  { font-size: 11px; color: var(--ink3); }
.toggle-btn {
  width: 40px;
  height: 22px;
  border-radius: 22px;
  border: none;
  cursor: pointer;
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
.toggle-btn.on  { background: var(--green); }
.toggle-btn.off { background: var(--paper4); }
.toggle-btn::after {
  content: '';
  position: absolute;
  top: 3px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: white;
  transition: left .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle-btn.on::after  { left: 21px; }
.toggle-btn.off::after { left: 3px;  }

/* ── Settings rows ── */
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--paper3);
}
.setting-row:last-child { border-bottom: none; padding-bottom: 0; }
.setting-row-left { display: flex; flex-direction: column; gap: 2px; }
.setting-row-label { font-size: 13px; font-weight: 500; color: var(--ink); }
.setting-row-sub   { font-size: 11px; color: var(--ink3); }

/* ── Calendar ── */
.cal-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.cal-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12.5px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: var(--r-sm);
  border: 1px solid var(--paper4);
  background: var(--warm-white);
  color: var(--ink2);
  cursor: pointer;
  transition: background .12s;
}
.cal-btn:hover { background: var(--paper2); }

/* ── Conn badge ── */
.conn-chip {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: .04em;
}
.conn-chip.ok   { background: var(--green-soft); color: var(--green); }
.conn-chip.idle { background: var(--paper2); color: var(--ink4); }

/* ══════════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--ink3);
}
.empty-state i { font-size: 40px; display: block; margin: 0 auto 10px; }
.empty-state p { font-size: 14px; }

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
#toast-container {
  position: fixed;
  bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column-reverse;
  gap: 6px;
  z-index: 999;
  pointer-events: none;
  width: min(360px, 92vw);
}
.toast {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 14px;
  border-radius: var(--r);
  font-size: 13px;
  font-weight: 500;
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  box-shadow: var(--shadow-lg);
  animation: toastIn .2s ease;
  pointer-events: auto;
  color: var(--ink);
}
.toast i { font-size: 16px; flex-shrink: 0; }
.toast.t-ok  { border-color: #A3D4B4; }
.toast.t-ok  i { color: var(--green); }
.toast.t-err { border-color: #E8A8A0; }
.toast.t-err i { color: var(--red); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════════
   DIVIDER
══════════════════════════════════════════ */
.divider { width: 1px; height: 16px; background: var(--paper3); margin: 0 1px; }

/* ══════════════════════════════════════════
   SURVEY OVERLAY
══════════════════════════════════════════ */
#survey-overlay {
  position: fixed;
  inset: 0;
  background: var(--paper);
  z-index: 999;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#survey-inner {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 0 100px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
#survey-progress-bar {
  height: 3px;
  background: var(--paper3);
  flex-shrink: 0;
}
#survey-progress-fill {
  height: 100%;
  background: var(--ink);
  transition: width .35s ease;
  width: 0%;
}
#survey-step-area {
  flex: 1;
  padding: 32px 20px 24px;
}
.survey-intro {
  text-align: center;
  padding: 40px 20px 32px;
}
.survey-intro-icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--warm-white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 20px;
}
.survey-intro h1 {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 12px;
  letter-spacing: -.02em;
}
.survey-intro p {
  font-size: 15px;
  color: var(--ink2);
  line-height: 1.65;
  max-width: 380px;
  margin: 0 auto 28px;
}
.survey-intro-meta {
  display: flex;
  justify-content: center;
  gap: 20px;
  font-size: 12px;
  color: var(--ink3);
  margin-bottom: 32px;
}
.survey-intro-meta span {
  display: flex;
  align-items: center;
  gap: 5px;
}
.survey-step-num {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink3);
  margin-bottom: 8px;
}
.survey-question {
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.4;
  margin-bottom: 6px;
  letter-spacing: -.01em;
}
.survey-hint {
  font-size: 13px;
  color: var(--ink3);
  margin-bottom: 24px;
  line-height: 1.5;
}
.survey-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.survey-option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--warm-white);
  border: 1.5px solid var(--paper3);
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: border-color .15s, background .15s, box-shadow .15s;
  text-align: left;
  width: 100%;
}
.survey-option:hover {
  border-color: var(--paper4);
  box-shadow: var(--shadow-sm);
}
.survey-option.selected {
  border-color: var(--ink);
  background: var(--ink);
}
.survey-option.selected .so-icon,
.survey-option.selected .so-label,
.survey-option.selected .so-sub { color: var(--warm-white); }
.survey-option.selected .so-check { background: rgba(255,255,255,.25); border-color: transparent; }
.survey-option.selected .so-check i { display: block; color: var(--warm-white); }
.so-icon {
  font-size: 24px;
  color: var(--ink2);
  flex-shrink: 0;
  width: 32px;
  text-align: center;
}
.so-text { flex: 1; min-width: 0; }
.so-label { font-size: 14px; font-weight: 600; color: var(--ink); }
.so-sub { font-size: 12px; color: var(--ink3); margin-top: 2px; line-height: 1.4; }
.so-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--paper4);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.so-check i { font-size: 12px; display: none; }

/* Multi-select grid */
.survey-options.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.survey-options.grid .survey-option {
  flex-direction: column;
  align-items: flex-start;
  padding: 14px;
  gap: 8px;
}
.survey-options.grid .so-check { margin-left: auto; margin-top: -4px; }

/* Name input */
.survey-name-input {
  width: 100%;
  font-size: 22px;
  font-family: var(--serif);
  padding: 12px 0;
  border: none;
  border-bottom: 2px solid var(--paper4);
  background: transparent;
  color: var(--ink);
  outline: none;
  transition: border-color .2s;
}
.survey-name-input:focus { border-bottom-color: var(--ink); }
.survey-name-input::placeholder { color: var(--ink4); }

/* Done screen */
.survey-done {
  text-align: center;
  padding: 48px 20px;
}
.survey-done-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--green-soft);
  border: 2px solid var(--green-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: var(--green);
  margin: 0 auto 24px;
}
.survey-done h2 {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 12px;
}
.survey-done p { font-size: 14px; color: var(--ink2); line-height: 1.65; margin-bottom: 8px; }
.profile-summary {
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  border-radius: var(--r-lg);
  padding: 16px;
  margin: 20px 0 28px;
  text-align: left;
}
.profile-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid var(--paper3);
  font-size: 13px;
  color: var(--ink2);
}
.profile-row:last-child { border-bottom: none; }
.profile-row i { font-size: 16px; color: var(--ink3); flex-shrink: 0; }
.profile-row strong { color: var(--ink); }
.task-count-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--ink);
  color: var(--warm-white);
  padding: 8px 20px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 28px;
}

/* Nav buttons */
#survey-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 560px;
  padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
  background: var(--paper);
  border-top: 1px solid var(--paper3);
  display: flex;
  gap: 10px;
  z-index: 10;
}
#survey-back {
  padding: 11px 18px;
  border-radius: var(--r-sm);
  border: 1px solid var(--paper3);
  background: var(--warm-white);
  color: var(--ink2);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background .12s;
}
#survey-back:hover { background: var(--paper2); }
#survey-next {
  flex: 1;
  padding: 11px 18px;
  border-radius: var(--r-sm);
  border: none;
  background: var(--ink);
  color: var(--warm-white);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background .12s;
}
#survey-next:hover { background: var(--ink2); }
#survey-next:disabled { opacity: .4; cursor: not-allowed; }

/* Validation shake */
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
.survey-shake { animation: shake .35s ease; }

/* ══════════════════════════════════════════
   ADDRESS DROPDOWN
══════════════════════════════════════════ */
.addr-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px 0;
}
.addr-select-wrap {
  flex: 1;
  position: relative;
}
.addr-select {
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  background: var(--warm-white);
  border: 1.5px solid var(--paper3);
  border-radius: var(--r);
  padding: 9px 36px 9px 12px;
  cursor: pointer;
  transition: border-color .15s;
}
.addr-select:focus { outline: none; border-color: var(--ink2); }
.addr-select-icon {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: var(--ink3);
  pointer-events: none;
}
.addr-add-btn {
  min-width: 36px;
  height: 36px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--paper3);
  background: var(--warm-white);
  color: var(--ink2);
  font-size: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .12s, border-color .12s;
  white-space: nowrap;
}
.addr-add-btn:hover { background: var(--paper2); border-color: var(--paper4); }
.addr-btn-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .01em;
}
@media (max-width: 340px) {
  .addr-btn-label { display: none !important; }
  .addr-add-btn   { min-width: 36px; padding: 0 !important; }
}

/* Address modal */
.addr-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 900;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.addr-modal {
  background: var(--warm-white);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 560px;
  box-shadow: var(--shadow-lg);
  animation: slideUp .2s ease;
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.addr-modal h3 {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 16px;
}
.addr-modal-input {
  width: 100%;
  font-family: var(--sans);
  font-size: 15px;
  padding: 10px 12px;
  border: 1.5px solid var(--paper3);
  border-radius: var(--r-sm);
  background: var(--paper2);
  color: var(--ink);
  margin-bottom: 12px;
}
.addr-modal-input:focus { outline: none; border-color: var(--ink2); }
.addr-type-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.addr-type-btn {
  border: 1.5px solid var(--paper3);
  border-radius: var(--r);
  padding: 10px 6px;
  text-align: center;
  cursor: pointer;
  background: var(--warm-white);
  transition: all .12s;
}
.addr-type-btn:hover { border-color: var(--paper4); }
.addr-type-btn.sel { border: 2px solid var(--ink); background: var(--ink); }
.addr-type-btn.sel .atb-icon,
.addr-type-btn.sel .atb-name { color: var(--warm-white); }
.atb-icon { font-size: 20px; display: block; margin-bottom: 4px; color: var(--ink3); }
.atb-name { font-size: 12px; font-weight: 600; color: var(--ink); }
.addr-modal-btns { display: flex; gap: 8px; }

/* Address list in settings */
.addr-list { display: flex; flex-direction: column; gap: 8px; }
.addr-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  border-radius: var(--r);
  padding: 12px 14px;
  box-shadow: var(--shadow-sm);
}
.addr-item.active-addr { border-color: var(--ink); }
.addr-item-icon { font-size: 20px; color: var(--ink3); flex-shrink: 0; }
.addr-item-text { flex: 1; min-width: 0; }
.addr-item-name { font-size: 14px; font-weight: 600; color: var(--ink); }
.addr-item-type { font-size: 12px; color: var(--ink3); margin-top: 2px; }
.addr-item-actions { display: flex; gap: 6px; }
.addr-del-btn {
  width: 30px; height: 30px;
  border-radius: var(--r-sm);
  border: 1px solid var(--paper3);
  background: transparent;
  color: var(--ink3);
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .12s, color .12s;
}
.addr-del-btn:hover { background: var(--red-soft); color: var(--red); border-color: var(--red); }

/* ══════════════════════════════════════════
   SHARING & MEMBERS
══════════════════════════════════════════ */
.room-code-box {
  background: var(--paper2);
  border: 1.5px dashed var(--paper4);
  border-radius: var(--r-lg);
  padding: 18px;
  text-align: center;
  margin-bottom: 14px;
}
.room-code-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink3);
  margin-bottom: 6px;
}
.room-code-value {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: .12em;
  cursor: pointer;
  user-select: all;
}
.room-code-hint { font-size: 12px; color: var(--ink3); margin-top: 6px; line-height: 1.5; }

.member-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.member-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  border-radius: var(--r);
  padding: 10px 12px;
  box-shadow: var(--shadow-sm);
}
.member-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: white;
  flex-shrink: 0;
}
.member-info { flex: 1; min-width: 0; }
.member-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.member-role { font-size: 11px; color: var(--ink3); }
.member-you { font-size: 10px; font-weight: 700; background: var(--ink); color: var(--warm-white); padding: 1px 6px; border-radius: 10px; margin-left: 4px; }
.member-del {
  width: 28px; height: 28px;
  border-radius: var(--r-sm);
  border: 1px solid var(--paper3);
  background: transparent; color: var(--ink3);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.member-del:hover { background: var(--red-soft); color: var(--red); border-color: var(--red); }

/* Assign chip on task card */
.assign-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 20px;
  color: white;
  cursor: pointer;
  border: none;
  transition: opacity .12s;
}
.assign-chip:hover { opacity: .85; }
.assign-chip.unassigned {
  background: var(--paper3);
  color: var(--ink3);
}

/* Assign picker dropdown */
.assign-picker {
  position: absolute;
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  z-index: 200;
  min-width: 180px;
  overflow: hidden;
}
.assign-picker-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px;
  cursor: pointer;
  font-size: 13px;
  color: var(--ink2);
  transition: background .1s;
  border: none; background: transparent; width: 100%; text-align: left;
}
.assign-picker-item:hover { background: var(--paper2); }
.assign-picker-item .ap-dot {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: white; flex-shrink: 0;
}

/* Sync status indicator */
.sync-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--ink3);
  padding: 6px 0;
}
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.sync-dot.ok     { background: var(--green); }
.sync-dot.err    { background: var(--red); }

.sync-dot.idle   { background: var(--ink4); }

/* Join room input */
.join-input {
  font-family: var(--serif);
  font-size: 22px;
  letter-spacing: .12em;
  text-transform: uppercase;
  text-align: center;
  width: 100%;
  padding: 12px;
  border: 1.5px solid var(--paper3);
  border-radius: var(--r-sm);
  background: var(--paper2);
  color: var(--ink);
  margin-bottom: 10px;
}
.join-input:focus { outline: none; border-color: var(--ink2); }

/* ══════════════════════════════════════════
   WEATHER WIDGET
══════════════════════════════════════════ */
.weather-bar {
  margin: 10px 16px 0;
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.weather-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  cursor: pointer;
  transition: background .12s;
}
.weather-header:hover { background: var(--paper2); }
.weather-location {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
}
.weather-location i { font-size: 15px; color: var(--ink3); }
.weather-temp-now {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.weather-symbol { font-size: 20px; line-height: 1; }
.weather-chevron { font-size: 14px; color: var(--ink4); transition: transform .2s; }
.weather-chevron.open { transform: rotate(180deg); }

.weather-body { border-top: 1px solid var(--paper3); }
.weather-days {
  display: flex;
  overflow-x: auto;
  gap: 0;
  padding: 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.weather-days::-webkit-scrollbar { display: none; }
.weather-day {
  flex: 0 0 auto;
  width: 72px;
  padding: 10px 6px;
  text-align: center;
  border-right: 1px solid var(--paper3);
  position: relative;
}
.weather-day:last-child { border-right: none; }
.weather-day.today { background: var(--paper2); }
.weather-day-name {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--ink3);
  margin-bottom: 4px;
}
.weather-day.today .weather-day-name { color: var(--ink); }
.weather-day-icon { font-size: 22px; margin-bottom: 4px; line-height: 1.2; }
.weather-day-temp {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
}
.weather-day-temp span { font-size: 11px; font-weight: 400; color: var(--ink3); }
.weather-day-rain {
  font-size: 10px;
  color: #1A4F8A;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.weather-day-rain i { font-size: 10px; }

.weather-tips {
  border-top: 1px solid var(--paper3);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.weather-tip {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12.5px;
  line-height: 1.5;
}
.weather-tip-icon {
  width: 24px;
  height: 24px;
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 1px;
}
.tip-good  .weather-tip-icon { background: var(--green-soft);  color: var(--green); }
.tip-warn  .weather-tip-icon { background: var(--orange-soft); color: var(--orange); }
.tip-bad   .weather-tip-icon { background: var(--red-soft);    color: var(--red); }
.tip-info  .weather-tip-icon { background: var(--blue-soft);   color: var(--blue); }
.weather-tip-text { color: var(--ink2); }
.weather-tip-text strong { color: var(--ink); }

.weather-setup {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.weather-setup p { font-size: 12px; color: var(--ink3); flex: 1; line-height: 1.4; }
.weather-loading {
  padding: 14px;
  text-align: center;
  font-size: 12px;
  color: var(--ink3);
}

/* Location input in addr modal */
.loc-row {
  display: flex;
  gap: 6px;
  align-items: flex-end;
}
.loc-row .addr-modal-input { flex: 1; }

/* ══════════════════════════════════════════
   RENOVATION / PROJECT TAB
══════════════════════════════════════════ */
.ren-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 8px;
}
.ren-header h2 {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  color: var(--ink);

}
.project-list {
  display: flex;

}
.project-card {

}

.project-header {

}
.project-icon {

}
.project-meta { flex: 1; min-width: 0; }
.project-name {

}
.project-chips {
  display: flex;

}
.project-chip {
  font-size: 11px;

  padding: 2px 7px;
  border-radius: 20px;
  background: var(--paper2);
  color: var(--ink3);

}
.project-chip.status-active   { background: var(--blue-soft);   color: var(--blue); }
.project-chip.status-planned  { background: var(--purple-soft); color: var(--purple); }
.project-chip.status-done     { background: var(--green-soft);  color: var(--green); }
.project-chip.status-paused   { background: var(--orange-soft); color: var(--orange); }
.project-chevron { font-size: 16px; color: var(--ink4); transition: transform .2s; }
.project-chevron.open { transform: rotate(180deg); }

.project-body {
  border-top: 1px solid var(--paper3);
  padding: 12px 14px 14px;
}
.project-desc {
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.65;
  margin-bottom: 10px;
}
.project-progress-wrap { margin-bottom: 12px; }
.project-progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--ink3);
  margin-bottom: 4px;
}
.project-progress-bar {
  height: 6px;
  background: var(--paper3);
  border-radius: 6px;
  overflow: hidden;
}
.project-progress-fill {
  height: 100%;
  border-radius: 6px;
  transition: width .4s ease;
}
.task-checklist {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}
.task-check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: var(--paper2);
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background .1s;
}
.task-check-item:hover { background: var(--paper3); }
.task-check-item.checked .tc-label {
  text-decoration: line-through;
  color: var(--ink3);
}
.tc-box {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--paper4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: transparent;
  flex-shrink: 0;
  transition: all .15s;
}
.task-check-item.checked .tc-box {
  background: var(--green);
  border-color: var(--green);
  color: white;
}
.tc-label { font-size: 13px; color: var(--ink2); flex: 1; }
.tc-del {
  font-size: 14px;
  color: var(--ink4);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: var(--r-sm);
  transition: color .1s;
}
.tc-del:hover { color: var(--red); }

.project-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.project-detail-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--ink3);
  margin-bottom: 8px;
}
.project-detail-row i { font-size: 14px; }

/* Empty state for renovation */
.ren-empty {
  text-align: center;
  padding: 48px 20px;
}
.ren-empty-icon {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--paper2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: var(--ink3);
  margin: 0 auto 16px;
}
.ren-empty h3 {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 8px;
}
.ren-empty p { font-size: 13px; color: var(--ink3); line-height: 1.6; margin-bottom: 20px; }

/* Project modal */
.proj-modal-overlay {
  position: fixed; inset: 0; z-index: 950;
  background: rgba(0,0,0,.45);
  display: flex; align-items: flex-end; justify-content: center;
}
.proj-modal {
  background: var(--warm-white);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  width: 100%; max-width: 560px;
  box-shadow: var(--shadow-lg);
  animation: slideUp .2s ease;
  max-height: 90vh;
  overflow-y: auto;
}
.proj-modal h3 {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 16px;
}
.proj-modal label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--ink3);
  display: block;
  margin-bottom: 5px;
}
.proj-modal-input {
  width: 100%;
  font-family: var(--sans);
  font-size: 15px;
  padding: 10px 12px;
  border: 1.5px solid var(--paper3);
  border-radius: var(--r-sm);
  background: var(--paper2);
  color: var(--ink);
  margin-bottom: 12px;
}
.proj-modal-input:focus { outline: none; border-color: var(--ink2); }
.proj-modal textarea.proj-modal-input {
  resize: vertical;
  min-height: 70px;
  font-size: 14px;
  line-height: 1.5;
}
.color-picker-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform .12s, border-color .12s;
}
.color-swatch.sel { border-color: var(--ink); transform: scale(1.15); }
.cat-picker-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.cat-pick-btn {
  padding: 5px 10px;
  border-radius: 20px;
  border: 1.5px solid var(--paper3);
  background: var(--warm-white);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
  cursor: pointer;
  transition: all .12s;
}
.cat-pick-btn.sel { background: var(--ink); color: var(--warm-white); border-color: var(--ink); }

/* Summary strip for renovation tab */
.ren-stat-strip {
  display: flex;
  gap: 8px;
  padding: 8px 16px 4px;
}
.ren-stat {
  flex: 1;
  background: var(--warm-white);
  border: 1px solid var(--paper3);
  border-radius: var(--r);
  padding: 8px 10px;
  text-align: center;
}
.ren-stat-num { font-size: 20px; font-weight: 700; color: var(--ink); }
.ren-stat-lbl { font-size: 10px; color: var(--ink3); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

/* Filter tabs for renovation */
.ren-filter-row {
  display: flex;
  gap: 6px;
  padding: 6px 16px 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.ren-filter-row::-webkit-scrollbar { display: none; }

/* ══════════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════════ */
#scroll-area::-webkit-scrollbar { width: 4px; }
#scroll-area::-webkit-scrollbar-track { background: transparent; }
#scroll-area::-webkit-scrollbar-thumb { background: var(--paper4); border-radius: 4px; }
══════════════════════════════════════════ */
.sub-label {

  align-items: center;

.sp-ok     { background: var(--green-soft);  color: #1C4D2C; }
.sp-no     { background: var(--red-soft);    color: #7B1F1A; }
.sp-cond   { background: var(--orange-soft); color: #7A4200; }
.sp-search { background: var(--blue-soft);   color: #1A3D6B; }

.law-disclaimer {

}
.legend-item {

    <div class="addr-modal">
      <h3 id="addr-modal-title">Legg til adresse</h3>

const STORAGE_KEY = 'bv_history_v1';
const SETTINGS_KEY = 'bv_settings_v1';

/** Load {taskId: {lastDone: ISO, count: n}} from storage */
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
/** Save full history object */
function saveHistory(h) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); } catch {}
}
/** Record a completion for task id */
/** Load/save app settings (boligtype, haUrl, haToken) */
function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'); } catch { return {}; }
}
function saveAppSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      boligtype: APP.boligtype,
      haUrl:     APP.haUrl,
      haToken:   APP.haToken,
      theme:     APP.theme,
      locale:    APP.locale,
    }));
  } catch {}
}
/** Given interval days and last-done date, compute next due Date */
function nextDueDate(intervalDays, lastDoneISO) {
  const last = new Date(lastDoneISO);
  const next = new Date(last);
  next.setDate(next.getDate() + intervalDays);
  return next;
}


/* ════════════════════════════════════════
   DATE HELPERS
════════════════════════════════════════ */
const TODAY = new Date();
function addDays(n) {
  const d = new Date(TODAY);
  d.setDate(d.getDate() + n);
  return d;
}
function fmtDate(d) {
  var localeMap = { no:'nb-NO', sv:'sv-SE', da:'da-DK', fi:'fi-FI', en:'en-GB', de:'de-DE', nl:'nl-NL' };
  var lang = (APP.locale && APP.locale.lang) || 'no';
  var locale = localeMap[lang] || 'nb-NO';
  return d.toLocaleDateString(locale, { day: 'numeric', month: 'short', year: 'numeric' });
}
function fmtICS(d) {
  return d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
}
