    63: { title:'Avkalka kaffemaskin och vattenkokare',freq:'Månadsvis',desc:'Kalk minskar effektivitet och ger sämre smak.',steps:['Fyll med 50/50 ättika och vatten.','Kör avkalkningsprogram.','Kör 2 sköljcykler med rent vatten.','Vattenkokare: koka, häll ut, skölj 2 ggr.','Upprepa månadsvis.'] },
    64: { title:'Rengör kylskåpet invändigt',freq:'Vartannat år',desc:'Regelbunden rengöring tar bort bakterier och mögel.',steps:['Ta ut all mat.','Stäng av och ta ut alla hyllor.','Tvätta med ljummet vatten och bikarbonat.','Tvätta hyllorna separat.','Sätt på strömmen och temperera 1 h.'] },
    65: { title:'Rengör köksfläkten och filtret',freq:'Var 3:e månad',desc:'Fettfilter kan i värsta fall fatta eld.',steps:['Ta ut fettfiltret.','Diska i diskmaskin 50–60°C.','Låt torka helt.','Torka insidan av fläkten.','Kontrollera att motorluften inte är blockerad.'] },
    66: { title:'Rengör torktumlare – kondensatstationen',freq:'Månadsvis',desc:'Smutsiga kondensatorer ökar elförbrukningen.',steps:['Töm kondensatvattenbehållaren.','Ta ut kondensatorn och skölj.','Sätt tillbaka när den är torr.','Rengör luddfilterkorgen vid luckan.'] },
    70: { title:'Öppna stugan på våren',freq:'En gång per år (vår)',desc:'En grundlig öppningsinspektion säkerställer att stugan är i ordning.',steps:['Öppna vattenkranen och kontrollera rör.','Kontrollera brandvarnare och brandsläckare.','Lufta stugan – öppna alla fönster 2 h.','Inspektera tak, väggar och grund.','Kontrollera att avlopp inte är igensatt.'] },
    71: { title:'Vinterstänga stugan',freq:'En gång per år (höst)',desc:'Rätt vinterstängning skyddar mot frostskador.',steps:['Stäng och töm vattenledningar.','Häll frostskyddsmedel i toalettsifongen.','Stäng av ström på alla kretsar utom frostvakt.','Ta bort mat som kan locka gnagare.','Rulla in trädgårdsslang och lösa föremål.'] },
    72: { title:'Kontrollera taket för snölast',freq:'Efter kraftigt snöfall',desc:'Snö på taket kan väga 100–300 kg/m².',steps:['Mät snödjupet med en mätstav.','Över 50 cm: använd takskyffel från marken.','Arbeta alltid från marken.','Kontrollera att takrännor inte är isbelagda.','Kontrollera insidan för sprickor.'] },
    73: { title:'Kontrollera och ventilera stugan mot fukt',freq:'Regelbundet vid bruk',desc:'Stugor är extra utsatta för fuktproblem.',steps:['Lufta grundligt vid ankomst.','Kontrollera för mögellukt och mörka fläckar.','Se under mattor och bakom möbler.','Kontrollera att ventilationsöppningar inte är igensatta.','Använd luftavfuktare vid fuktigt väder.'] },
    74: { title:'Underhåll bryggan',freq:'En gång per år',desc:'Sjövatten, sol och is är mycket skadliga för obehandlat trä.',steps:['Inspektera plankor för röta.','Byt ruttna plankor omedelbart.','Skrubba bryggdäcket.','Påför tjock täckolja eller bryggolja.','Kontrollera stöd, ankare och beslag.'] },
    75: { title:'Fyll ved och förbered vedlager',freq:'En gång per år (sommar)',desc:'Bra och torr ved är förutsättningen för effektiv vedeldning.',steps:['Beställ ved i god tid.','Klyv till rätt storlek.','Stapla med luftmellanrum.','Täck toppen men lämna sidorna öppna.','Vedlagret ska inte röra husväggen.'] },
    76: { title:'Kontrollera och serva vattenpumpen',freq:'En gång per år',desc:'Ett pumphaveri innebär ingen tillgång till vatten.',steps:['Slå på strömmen och kontrollera att den startar.','Kontrollera tryckkärl.','Inspektera sugsidan.','Kontrollera trycktankens laddning.','Onormala ljud? Ring rörmokare.'] },
    80: { title:'Vårklipp av bärbuskar',freq:'En gång per år (tidig vår)',desc:'Rätt vårklipp stimulerar buskarna att sätta rikligt med bär.',steps:['Klipp ut grenar äldre än 3–4 år.','Ta bort svaga och sjuka grenar.','Behåll 6–8 starka unga grenar per buske.','Klipp rent ovanför en utåtvänd knopp.','Kompostera klippet.'] },
    81: { title:'Gödsla och vattna bärbuskar',freq:'Vår och försommar',desc:'Bärbuskar är storkonsumenter av näring.',steps:['Gödsla tidig vår med bärgödning.','Blanda ned med lätt hackning eller vattning.','Ge en ny dos i juni.','Vattna rikligt i torra perioder.','Lägg kompost runt buskarna.'] },
    82: { title:'Skörda bär och rensa buskarna',freq:'En gång per år (sommar)',desc:'Bär plockade i rätt tid smakar bäst.',steps:['Svarta vinbär och röda: plocka när hela klasar är mogna.','Krusbär: plocka lite omogna för kokning.','Ta bort ruttna bär.','Rensa under buskarna efter skörd.','Lägg ny kompost runt rotzonen.'] },
    83: { title:'Vårklipp och formning av äppel- och päronträd',freq:'En gång per år (tidig vår)',desc:'Fruktträd som inte beskärs ger lite och dålig frukt.',steps:['Klipp bara i torrt väder, gärna vid frost.','Ta bort korsande och inåtväxande grenar.','Klipp ut vattenskott.','Kronan ska vara öppen – ljuset ska komma in.','Stora grenar: anlita arborist.'] },
    84: { title:'Gödsla och kalka fruktträd',freq:'En gång per år (vår)',desc:'Fruktträd behöver mycket näring.',steps:['Strö kalk runt rotzonen i april.','Tillsätt fruktgödsel efter blomning.','Vattna in.','Lägg kompost till drippsonen.','Avsluta gödsling senast 1 juli.'] },
    85: { title:'Kontrollera fruktträd för skadedjur och sjukdomar',freq:'Vår och försommar',desc:'Äppelskurv, bladlöss och fruktmott är de vanligaste problemen.',steps:['Kontrollera blad för bruna fläckar från maj.','Sätt upp lim- eller feromonfällor.','Rensa ogräs och gammalt blad under trädet.','Spraya med kopparmedel vid känt skurvproblem.','Tvätta stammar för mossa och lav på hösten.'] },
    86: { title:'Stödpåle och fastsättning av unga fruktträd',freq:'Kontrolleras varje år',desc:'Unga träd som rör sig i vinden utvecklar dåliga rötter.',steps:['Kontrollera att pålen inte är rutten.','Bindningen ska sitta löst nog för lite rörelse.','Använd brett mjukt band.','Träd äldre än 3–4 år: ta bort pålen.','Kontrollera att stammens rot inte är täckt av jord.'] },
    87: { title:'Förnya och dela gamla bärbuskar',freq:'Vart 5–7 år',desc:'Bärbuskar är produktiva i 10–15 år.',steps:['Gräv upp hela busken.','Dela rotsystemet i 3–4 delar.','Plantera med god avstånd.','Vattna rikligt och håll fuktig 4 veckor.','Alternativt: ta sticklingar i september.'] },
    90: { title:'Inspektera och fyll sprickor i asfalt',freq:'En gång per år (vår)',desc:'Vatten i asfalssprickor fryser och skapar större skador.',steps:['Rensa sprickorna noga.','Låt torka minst 24 h.','Fyll med asfaltspackningsmedel.','Komprimera med trä eller rulle.','Stora hål: kall asfaltmassa eller entreprenör.'] },
    91: { title:'Ogräs i asfalt och längs kanter',freq:'Vår och sommar',desc:'Rötterna spricker sönder asfalten.',steps:['Ta bort ogräs med rot.','Använd kokande vatten längs kanter.','Spraya med ättika.','Fyll rensade sprickor.','Lägg ogräsmatta vid renovering.'] },
    92: { title:'Tvätta och högtrycksspola uppfart',freq:'En gång per år (vår)',desc:'Högtryckstvätt tar bort alger och vintergrus.',steps:['Sopa bort löst grus och löv.','Använd högtryckstvätt med viftmunstycke (40°).','Börja uppifrån och arbeta nedåt.','Använd algrengöringsmedel om det behövs.','Oljefläckar: strö på avfettningsmedel.'] },
    93: { title:'Fyll på och jämna ut gruset',freq:'Vartannat år',desc:'Grus förflyttas med tiden av bilar och regn.',steps:['Jämna befintligt grus med kratta.','Beställ nytt grus (8–16 mm krossad sten).','Jämna ut till jämn tjocklek.','Kör över med bil för komprimering.','Kontrollera att gruset lutar från huset.'] },
    94: { title:'Rengör fogar i marktegel och natursten',freq:'En gång per år',desc:'Ogräs i fogar lyfter och vrider stenen.',steps:['Ta bort ogräs med fogverktyg.','Högtrycksspola fogarna vid lågt tryck (max 80 bar).','Låt torka minst 24 h.','Fyll med ny kvartsand eller polymersand.','Vattna lätt tills polymersanden stelnar.'] },
    95: { title:'Kontrollera fall och dränering',freq:'Vart 5 år',desc:'Fel fall leder vatten mot huset.',steps:['Lägg en rätskiva och mät fallet.','Rätt fall: minst 2 % bort från husväggen.','Kartlägg var vatten bli stående.','Låga fläckar: fyll med kall asfaltmassa.','Större problem: anlita markentreprenör.'] },
    96: { title:'Kontrollera och rensa golvbrunnar på uppfarten',freq:'Vår och höst',desc:'Igensatta brunnar ger vattensamlingar och vinterssprickor.',steps:['Lyft gallret och ta bort löv och grus.','Spola med slang.','Kontrollera att röret inte är igensatt.','Täppt ledning: använd avloppsöppnare.','Sätt tillbaka gallret.'] },
    97: { title:'Oljebehandla eller försegla ny asfalt',freq:'Vart 2–3 år',desc:'Asfaltsolja skyddar mot UV, vatten och salt.',steps:['Rengör asfalten – högtryckstvätt och torka 48 h.','Reparera sprickor och hål.','Påför asfaltolja med rulle i 2 lager.','Spärra av i minst 24 h.','Utför inte under 10°C eller vid regn.'] },
    101: { title:'Byt sängkläder', freq:'Varannan vecka', desc:'Sängkläder samlar kvalster, svett och hudceller. Regelbundna byten ger bättre sömnkvalitet.', steps:['Ta av påslakan, örngott och lakan.','Tvätta på 60 °C för att döda kvalster.','Lufta täcke och madrass medan tvätten pågår.','Trä på rena sängkläder.'] },
    102: { title:'Byt handdukar i badrum och kök', freq:'Varje vecka', desc:'Fuktiga handdukar är en grogrund för bakterier. Byt minst en gång i veckan och tvätta på 60 °C.', steps:['Samla alla badhanddukar och kökshanddukar.','Tvätta på 60 °C.','Häng alltid handdukar att torka ordentligt efter användning.','Sätt ut rena handdukar.'] },
    103: { title:'Tvätta duschgardin eller duschkabin', freq:'Månadsvis', desc:'Duschgardiner och -väggar samlar kalk, mögel och bakterier. Månatlig tvätt förhindrar missfärgning.', steps:['Tyggardiner: Tvätta i maskin 40 °C med lite ättika i sköljningen.','Plastgardiner: Skrubba med ättikelösning (1:1 med vatten).','Glasväggar: Spray kalklösare, låt verka 5 min, skrapa av.','Låt gardinen hänga utsträckt efter duschning.'] },
    104: { title:'Dammsug och lufta madrassen', freq:'Var 3:e månad', desc:'Madrassen samlar kvalster och svett. Regelbunden dammsugning och luftning förlänger livslängden.', steps:['Avlägsna all sängkläder.','Dammsug båda sidor med tapetmunstycket.','Vänd madrassen om den är vändbar.','Vädra rummet i 1–2 timmar med öppet fönster.','Fläckar: Strö bikarbonat, låt ligga 30 min, dammsug.'] },
    105: { title:'Tvätta kuddar och täcken', freq:'Var 3:e månad', desc:'Kuddar och täcken samlar svett och kvalster. De flesta syntetiska tål maskin – kolla alltid etiketten.', steps:['Kolla tvättetiketten – de flesta syntetiska tål 40 °C.','Använd lite tvättmedel – för mycket ger klumpar.','Kör ett extra sköljprogram.','Torka i torktumlare på låg värme med torkbollar – skaka under tiden.'] },
    106: { title:'Rengör ugn och spishäll', freq:'Varannan månad', desc:'Inbränt fett i ugnen kan ge obehaglig rök. Spishällen med matrester kan fatta eld.', steps:['Ugn: Spraya på ugnsspray, stäng luckan och låt verka enligt anvisning.','Skrubba och torka av med fuktiga trasor.','Spishäll: Lyft galler och platta, tvätta i diskvatten.','Glasshäll: Använd speciell skrapa och glashob.'] },
    107: { title:'Tvätta fönster inifrån', freq:'Varannan månad', desc:'Smutsiga fönster dämpar dagsljuset märkbart. Med rätt teknik är det enkelt och strekfritt.', steps:['Torka av karmar och spröjsar med fuktig trasa.','Spraya fönsterputsmedel på glaset.','Dra av med fönsterskrapa uppifrån och ned.','Torka kanterna med torr mikrofiberduk.'] },
    108: { title:'Töm och tvätta sopkorgar', freq:'Månadsvis', desc:'Sopkorgar är en grogrund för bakterier och ger obehaglig lukt. En snabb månatlig tvätt håller köket fräscht.', steps:['Töm alla sopkorgar.','Skölj med varmt vatten.','Spraya rengöringsmedel och skrubba.','Skölj och låt lufttorka.','Sätt i ny soppåse.'] },
    109: { title:'Byt tandborste eller borstehuvud', freq:'Var 3:e månad', desc:'Tandläkarförbundet rekommenderar att byta tandborste var 3:e månad, eller efter sjukdom.', steps:['Kolla borsten – om stråna är utspärrade är det dags att byta.','Byt alltid efter förkylning eller muninfektioner.','Kom ihåg alla i hushållet.','Elektrisk: Byt bara borstehuvudet.'] },
    110: { title:'Dammsug och torka under och bakom möbler', freq:'Månadsvis', desc:'Damm och luddar samlas under soffa och sängar – särskilt viktigt för allergiker.', steps:['Flytta soffa och lösa möbler åt sidan.','Dammsug golvet ordentligt, inklusive längs lister.','Torka av undersidan av möblerna med fuktig trasa.','Ställ tillbaka möblerna.'] },
  },
  da: {
    1:  { title:'Skift batterier i røgalarm',freq:'Hver 6. måned',desc:'En røgalarm med svagt batteri kan holde op uden varsel.',steps:['Tag alarmen ned (drej mod uret).','Åbn og skift batteri – 9V eller AA.','Hold testknap inde 5 s.','Notér skiftedato på bagsiden.'] },
    2:  { title:'Test kuldioxiddetektor',freq:'Månedligt',desc:'CO er lugtfri og dødelig.',steps:['Find detektoren i hall eller soveværelse.','Hold testknap inde 5–10 s til alarm høres.','Ingen lyd? Skift batteri eller enhed.','Enheder bør skiftes hvert 5–7 år.'] },
    3:  { title:'Ryst og inspicér brandslukker',freq:'Månedligt',desc:'Pulver kan klumpe. Rysten holder det løst.',steps:['Vend om og ryst forsigtigt 10–15 s.','Kontrollér manometeret – grønt.','Kontrollér sikringsstift og plombering.','Ældre end 10 år: service.'] },
    4:  { title:'Test HPFI-relæ/jordfejlsafbryder',freq:'Månedligt',desc:'Jordfejlsafbryderen beskytter mod elulykker nær vand.',steps:['Find "Test"/"Reset"-stik i køkken og badeværelse.','Tryk "Test" – strøm skal afbrydes.','Tryk "Reset" for at gendanne.','Virker det ikke: ring elektriker.'] },
    5:  { title:'Ryd og vask fællesgangen',freq:'Ifølge vagtplan',desc:'Rene fællesarealer er brandsikre og hyggelige.',steps:['Fej og vask gulv i entré og trapperum.','Tør brevkasser og håndtag af.','Fjern genstande der blokerer flugtveje.','Meld udbrændte pærer.'] },
    8:  { title:'Kontrollér rør under vaske for lækager',freq:'Hver 6. måned',desc:'Små lækager kan gå måneder ubemærket.',steps:['Åbn skabet under vasken.','Føl langs alle samlinger.','Se efter kalk, rust eller mørke pletter.','Fugtig klud næste dag? Ring VVS.'] },
    11: { title:'Skift luftfilter i ventilation',freq:'Hver 3. måned',desc:'Snavsede filtre reducerer luftkvaliteten.',steps:['Find ventilationsaggregatet.','Åbn og tag det gamle filter ud.','Notér filterstørrelse.','Sæt nyt filter i med luftpilen korrekt.'] },
    15: { title:'Rens tagrender og nedløb',freq:'To gange om året',desc:'Fyldte tagrender leder vand ned ad væggen.',steps:['Opstil stige sikkert.','Fjern blade med renseskraber.','Skyl mod nedløb.','Langsom afledning: frigør stop med plastikpind.'] },
    40: { title:'Klip plænen',freq:'Ugentligt (maj–sept)',desc:'Regelmæssig klipning holder plænen tæt og sund.',steps:['Indstil klippehøjde 4–6 cm.','Klip i tørt vejr.','Skift køreretning hver gang.','Tøm opsamler og kompostér.'] },
    41: { title:'Gødsk og rake plænen',freq:'Forår og efterår',desc:'Rivning fjerner dødgræs der kvæler plænen.',steps:['Rive filtlag med rive.','Luft tætte partier.','Strø pille-gødning jævnt.','Vand godt ind.'] },
    50: { title:'Slib og vedligehold plæneklipper',freq:'En gang om året (forår)',desc:'En skarp klipper bruger mindre brændstof.',steps:['Tøm benzin eller frakobl batteri.','Slib kniven med vinkelsliber.','Udskift tændrør og luftfilter.','Kontrollér olie.','Rens under klippedækket.'] },
    60: { title:'Afrim og rens fryseren',freq:'En gang om året',desc:'Isophobning reducerer kapacitet og effektivitet.',steps:['Tag al mad ud.','Sluk og læg håndklæde i bunden.','Lad is smelte naturligt.','Rens med lunkent vand og natron.','Tænd og køl ned 2–3 t.'] },
    61: { title:'Rens opvaskemaskinefilter og spylearm',freq:'Månedligt',desc:'Tilstoppet filter giver dårlig vask.',steps:['Tag kurvene ud og find filteret.','Drej mod uret og løft – skyl.','Løsn spylearm og rens huller.','Kør tomt program 60°C med eddike.','Tør pakning rundt om lugen.'] },
    80: { title:'Forårsbeskær bærbuske',freq:'En gang om året (tidlig forår)',desc:'Korrekt forårsbeskæring stimulerer bærbuske.',steps:['Klip grene ældre end 3–4 år ud.','Fjern svage og syge grene.','Behold 6–8 stærke unge grene.','Klip rent over en udadpegende knop.','Kompostér klippet.'] },
    90: { title:'Inspicér og fyld revner i asfalt',freq:'En gang om året (forår)',desc:'Vand i asfaltrevner fryser og skaber større skader.',steps:['Rens revnerne grundigt.','Lad tørre mindst 24 t.','Fyld med asfaltfugepasta.','Komprimer med flad træklods.','Store huller: kold asfaltmasse.'] },
    93: { title:'Fyld på og jævn grusdækket',freq:'Hvert 2. år',desc:'Grus flyttes og komprimeres med tiden.',steps:['Jævn med rive.','Bestil nyt grus (8–16 mm knust).','Jævn til jævn tykkelse.','Kør bil over for komprimering.','Kontrollér at gruset hælder fra huset.'] },
    101: { title:'Skift sengetøj', freq:'Hver 2. uge', desc:'Sengetøj samler støvmider, sved og hudceller. Jævnlig udskiftning giver bedre søvnkvalitet.', steps:['Tag dynetræk, pudebetræk og lagen af.','Vask alt på 60 °C for at dræbe støvmider.','Luft dyne og madras mens vasken kører.','Træk rent sengetøj på.'] },
    102: { title:'Skift håndklæder på badeværelse og køkken', freq:'Ugentligt', desc:'Fugtige håndklæder er grobunn for bakterier. Skift mindst ugentligt og vask på 60 °C.', steps:['Saml alle bade- og køkkenhåndklæder.','Vask på 60 °C.','Hæng altid håndklæder til ordentlig tørring efter brug.','Sæt rene håndklæder frem.'] },
    103: { title:'Vask brusekabine eller bruseforhæng', freq:'Månedligt', desc:'Brusekabiner og -vægge samler kalk, skimmel og bakterier. Månedlig vask forhindrer misfarvning.', steps:['Stofforhæng: Vask i maskine 40 °C med lidt eddike.','Plastforhæng: Skrub med eddikeopløsning (1:1).','Glasvægge: Spray afkalkningsmiddel, lad virke 5 min, skrab af.','Lad forhænget hænge udstrakt efter brusebad.'] },
    104: { title:'Støvsug og luft madrassen', freq:'Hver 3. måned', desc:'Madrassen samler støvmider og sved. Støvsugning og udluftning forlænger levetiden.', steps:['Fjern alt sengetøj.','Støvsug begge sider med tapetmunstykket.','Vend madrassen hvis den er vendbar.','Luft rummet i 1–2 timer med åbent vindue.'] },
    105: { title:'Vask puder og dyner', freq:'Hver 3. måned', desc:'Puder og dyner samler sved og støvmider. De fleste syntetiske tåler maskine – tjek altid mærket.', steps:['Tjek vaskemærket – de fleste syntetiske tåler 40 °C.','Brug lidt vaskemiddel.','Kør et ekstra skylleprogram.','Tør i tørretumbler på lav varme med tørrebolde.'] },
    106: { title:'Rengør ovn og komfur', freq:'Hver 2. måned', desc:'Indbagt fedt i ovnen kan give ubehagelig røg. Komfurtoppe med madrester kan gå i brand.', steps:['Ovn: Spray ovnrens, luk lågen og lad virke som anvist.','Skrub og tør af med fugtige klude.','Komfur: Løft rist og plade, vask i sæbevand.','Glasplade: Brug særlig skraber og glasrens.'] },
    107: { title:'Vask vinduer indvendigt', freq:'Hver 2. måned', desc:'Snavsede vinduer indefra dæmper dagslyset mærkbart.', steps:['Tør karme og sprosser af med fugtig klud.','Spray vinduespudser på glasset.','Træk af med vinduesskraber fra top til bund.','Tør kanterne med tør mikrofiberklud.'] },
    108: { title:'Tøm og vask skraldespande', freq:'Månedligt', desc:'Skraldespande er grobunn for bakterier og giver ubehagelig lugt. En hurtig månedlig vask holder køkkenet friskt.', steps:['Tøm alle skraldespande.','Skyl med varmt vand.','Spray rengøringsmiddel og skrub.','Skyl og lad lufttørre.','Sæt ny affaldpose i.'] },
    109: { title:'Skift tandbørste eller børstehoved', freq:'Hver 3. måned', desc:'Tandlægeforeningen anbefaler at skifte tandbørste hvert 3. måned eller efter sygdom.', steps:['Tjek børsten – er børsterne udover er det tid.','Skift altid efter forkølelse eller mundinfektioner.','Husk alle i husstanden.','Elektrisk: Skift kun børstehovedet.'] },
    110: { title:'Støvsug og tør under og bag møbler', freq:'Månedligt', desc:'Støv og fnug samler sig under sofa og senge – særligt vigtigt for allergikere.', steps:['Flyt sofa og løse møbler til siden.','Støvsug gulvet grundigt langs lister.','Tør undersiden af møblerne af med fugtig klud.','Sæt møblerne tilbage.'] },
  },
  en: {
    1:  { title:'Change smoke alarm batteries',freq:'Every 6 months',desc:'A smoke alarm with a weak battery can stop working without warning.',steps:['Remove the alarm (twist anticlockwise).','Replace battery – usually 9V or AA.','Hold test button 5 s.','Note the date on the back.'] },
    2:  { title:'Test carbon monoxide detector',freq:'Monthly',desc:'CO is odourless and deadly.',steps:['Locate detector in hallway or bedroom.','Hold test button 5–10 s until alarm sounds.','No sound? Replace battery or unit.','Replace units every 5–7 years.'] },
    3:  { title:'Shake and inspect fire extinguisher',freq:'Monthly',desc:'Powder can clump. Shaking keeps it ready.',steps:['Turn upside down and shake 10–15 s.','Check gauge – green zone.','Check safety pin and seal are intact.','Over 10 years old: send for service.'] },
    4:  { title:'Test GFCI outlets',freq:'Monthly',desc:'GFCI breakers protect against electric shock near water.',steps:['Find "Test"/"Reset" outlets in kitchen and bathroom.','Press "Test" – power should cut.','Press "Reset" to restore.','Not working: call an electrician.'] },
    5:  { title:'Clean communal hallway',freq:'According to rota',desc:'Clean communal areas are fire-safe and pleasant.',steps:['Sweep and mop entrance and stairwell.','Wipe letterboxes and handles.','Remove items blocking escape routes.','Report burnt-out bulbs.'] },
    6:  { title:'Report faults to the building manager',freq:'As needed',desc:'Reporting faults early prevents small damage from becoming large.',steps:['Take a photo as documentation.','Send via the board\'s channel.','Give exact location and contact info.','Follow up if you hear nothing.'] },
    7:  { title:'Check basement storage for damp',freq:'Every 3 months',desc:'Basements are prone to damp. Early detection prevents mould.',steps:['Smell for mould when opening storage.','Look for dark patches on walls and floor.','Feel for moisture.','Damp found? Report to building manager immediately.'] },
    8:  { title:'Check pipes under sinks for leaks',freq:'Every 6 months',desc:'Small leaks can go undetected for months.',steps:['Open the cupboard under the sink.','Feel along all joints.','Look for limescale, rust or dark patches.','Damp cloth next day? Call a plumber.'] },
    9:  { title:'Flush water heater sediment',freq:'Once a year',desc:'Limescale reduces efficiency. Regular flushing extends lifespan.',steps:['Switch off power at the fuse box.','Connect a hose to the drain valve.','Drain 20–40 min.','Flush with cold water until clear.'] },
    10: { title:'Check drainage channels and gullies',freq:'Once a year',desc:'Blocked drainage pushes water against foundations.',steps:['Find all gully covers around the house.','Lift lid – look for leaves and soil.','Clear with gloves and flush with hose.','Persistent blockage: contact drainage contractor.'] },
    11: { title:'Replace ventilation air filter',freq:'Every 3 months',desc:'Dirty filters reduce air quality and increase energy use.',steps:['Locate the ventilation unit.','Open and remove old filter.','Note filter size.','Insert new filter with airflow arrow correct.'] },
    12: { title:'Clean tumble dryer lint trap and duct',freq:'Every 3 months',desc:'Lint build-up is a fire hazard.',steps:['Empty lint trap after every load.','Vacuum inside filter housing.','Disconnect and clean exhaust duct.','Check external vent grille is not blocked.'] },
    13: { title:'Clean fridge condenser coils',freq:'Every 6 months',desc:'Dusty coils can use up to 30% more electricity.',steps:['Pull fridge away from wall and unplug.','Find condenser coils at back or below.','Vacuum gently with soft brush.','Push back and plug in.'] },
    14: { title:'Service heating system / heat pump',freq:'Once a year',desc:'Servicing maintains warranty and winter efficiency.',steps:['Book a qualified engineer.','Clean indoor filter monthly in heating season.','Keep outdoor unit clear of snow and plants.','Record the service date.'] },
    15: { title:'Clean gutters and downpipes',freq:'Twice a year',desc:'Full gutters lead water down the wall and cause damp damage.',steps:['Set up ladder safely.','Remove debris with gutter scoop or gloves.','Flush with hose towards downpipe.','Slow drainage: clear with drain rod.'] },
    16: { title:'Inspect roof and flashings',freq:'Once a year',desc:'Early detection saves significant repair costs.',steps:['Use binoculars from the ground.','Look for loose, cracked or missing tiles.','Check flashings around chimney and roof windows.','Damage found: call a qualified roofer.'] },
    17: { title:'Paint and maintain facade',freq:'Every 5–8 years',desc:'Paint is the primary weather protection for the timber.',steps:['Walk around and look for flaking and bubbling.','Scrape loose paint and prime bare wood.','Choose exterior paint suited to local climate.','Paint in dry weather 10–25°C.'] },
    18: { title:'Prune trees and shrubs near the house',freq:'Once a year',desc:'Branches against the roof keep it damp and can lift tiles.',steps:['Identify branches within 2 m of the roof.','Cut back cleanly to trunk or side branch.','Trees over 5 m: use certified arborist.','Dispose of branches at recycling centre.'] },
    19: { title:'Check foundations for cracks',freq:'Once a year',desc:'Cracks can allow water ingress and structural damage.',steps:['Inspect the visible foundation all around.','Look for cracks wider than 1–2 mm.','Photograph and mark – check if they grow.','Growing cracks: contact a structural engineer.'] },
    20: { title:'Clean chimney and inspect fireplace',freq:'Once a year',desc:'Soot build-up is a common cause of house fires.',steps:['Book a chimney sweep.','Clear the area around the stove.','Check the glass gasket seals properly.','Look for cracks in the firebox.'] },
    21: { title:'Seal gaps around windows and doors',freq:'Once a year before winter',desc:'Draughts can account for 20–30% of heat loss.',steps:['Hold a lit match along the frame – movement reveals draught.','Cracked weather strip? Replace it.','Remove old sealant with a craft knife.','Fill with exterior silicone and smooth with wetted finger.'] },
    22: { title:'Shut off and drain outdoor taps',freq:'Every autumn',desc:'Freezing in outdoor pipes can burst them.',steps:['Find the indoor stop valve – usually in the basement.','Close the stop valve.','Open the outdoor tap to drain residual water.','Leave the tap open all winter.'] },
    23: { title:'Check balcony for damp and rust',freq:'Once a year',desc:'Balconies are subject to freeze-thaw cycles.',steps:['Look for orange rust patches on railings.','Check the railing is secure.','Check flooring for cracks and damp.','Surface rust: sand and treat. Deep rust: report to building manager.'] },
    30: { title:'Wash house facade',freq:'Once a year (spring)',desc:'Algae and dirt break down the surface finish.',steps:['Use hose or pressure washer max 100 bar.','Start at the top and work down.','Use house wash product for algae – leave 10–15 min.','Rinse thoroughly and allow 48 h before painting.'] },
    31: { title:'Paint windows, door frames and trim',freq:'Every 3–5 years',desc:'Windows and frames are particularly exposed to weather.',steps:['Sand flaking paint.','Fill cracks with elastic filler.','Prime bare wood.','Apply 2 coats of exterior wood paint.'] },
    32: { title:'Treat decking and patio',freq:'Every 2–3 years',desc:'Untreated wood goes grey and cracks.',steps:['Wash and allow 2–3 days to dry.','Sand with coarse paper (80-grit).','Vacuum and wipe down.','Apply deck oil or stain with a wide brush.'] },
    33: { title:'Wash windows externally',freq:'Twice a year',desc:'Clean windows let in more light.',steps:['Clean frames with a soft cloth and soapy water.','Use window cleaner and scrub pad.','Rubber squeegee from top to bottom.','Dry edges with microfibre cloth.'] },
    34: { title:'Clean and wash the garage',freq:'Once a year',desc:'Oil and salt damage the floor and structure.',steps:['Move cars out and clear the floor.','Sweep and vacuum.','Wash with degreaser and scrub.','Inspect walls for damp and pests.'] },
    40: { title:'Mow the lawn',freq:'Weekly (May–Sept)',desc:'Regular mowing keeps the lawn thick and healthy.',steps:['Set cutting height to 4–6 cm.','Mow in dry weather.','Change direction each time.','Empty catcher and compost.'] },
    41: { title:'Fertilise and rake the lawn',freq:'Spring and autumn',desc:'Raking removes dead thatch.',steps:['Rake out thatch in spring.','Aerate compacted areas.','Spread lawn fertiliser evenly.','Water in well.'] },
    42: { title:'Control weeds in beds and lawn',freq:'Monthly (May–Sept)',desc:'Weeds steal nutrients and water.',steps:['Pull weeds out by the root.','Use a weeding tool.','Lay bark chippings in beds.','Compost weed-free material.'] },
    43: { title:'Prepare garden for winter',freq:'Once a year (autumn)',desc:'Autumn tidying protects plants and makes spring easier.',steps:['Mow lawn one last time – 5–6 cm.','Rake leaves and compost.','Bring in frost-sensitive plants.','Cover vulnerable perennials.'] },
    44: { title:'Trim hedges and shrubs',freq:'Once a year (summer)',desc:'Regular trimming keeps hedges dense and tidy.',steps:['Trim after flowering – June–Aug.','Use sharp hedge trimmers.','Aim for V-shape – wider at bottom.','Compost the clippings.'] },
    45: { title:'Water and feed plants',freq:'Weekly (May–Aug)',desc:'Drought is the most common reason plants fail.',steps:['Water early in the morning.','Soil should be moist 3–5 cm down.','Liquid feed once a week.','Water at the root, not on the leaves.'] },
    50: { title:'Sharpen and service lawn mower',freq:'Once a year (spring)',desc:'A sharp mower uses less fuel and cuts more evenly.',steps:['Drain fuel or disconnect battery.','Sharpen blade with angle grinder.','Replace spark plug and air filter.','Check oil level.','Clean under cutting deck.'] },
    51: { title:'Service chainsaw',freq:'Once a year or after use',desc:'A well-maintained chainsaw is safer and more effective.',steps:['Check and adjust chain tension.','Sharpen the chain.','Check chain oil and fuel.','Clean air filter.','Check chain guard and safety gear.'] },
    52: { title:'Sharpen and maintain garden tools',freq:'Once a year (spring)',desc:'Sharp tools are easier to use and protect plants better.',steps:['Clean soil and rust with wire brush.','Sharpen spades and hoes with file.','Rub metal parts with linseed oil.','Sand handles and treat with linseed oil.','Hang on hooks.'] },
    53: { title:'Service snow blower',freq:'Once a year (autumn)',desc:'A snow blower that fails in -20°C is a real problem.',steps:['Change oil and spark plug.','Check and tighten all bolts.','Check scraper blades are not worn.','Fill with fresh fuel.','Test the chute mechanism.'] },
    54: { title:'Inspect and maintain ladders',freq:'Once a year',desc:'A damaged ladder is a serious safety risk.',steps:['Check all rungs for cracks and rust.','Check rubber feet are intact.','Inspect locking mechanisms.','Wood: treat with linseed oil. Aluminium: light sand.','Store horizontally or on hooks.'] },
    55: { title:'Top up emergency supplies',freq:'Once a year',desc:'A small emergency supply makes you self-sufficient during power cuts.',steps:['Check torch batteries.','Top up candles and matches.','Check first aid kit.','Have 20 l water and a few days food.','Know where the main stopcock and fuse box are.'] },
    60: { title:'Defrost and clean freezer',freq:'Once a year',desc:'Ice build-up reduces capacity and efficiency.',steps:['Remove all food.','Switch off and lay towel in bottom.','Let ice melt naturally.','Clean with lukewarm water and bicarbonate.','Switch on and cool 2–3 hours before restocking.'] },
    61: { title:'Clean dishwasher filter and spray arms',freq:'Monthly',desc:'A blocked filter causes poor washing and bad smells.',steps:['Remove baskets and find filter.','Twist anticlockwise and lift – rinse.','Remove spray arms and clean holes.','Run empty programme at 60°C with vinegar.','Wipe door seal.'] },
    62: { title:'Clean washing machine drum seal and filter',freq:'Monthly',desc:'The door seal is a source of mould and bad smells.',steps:['Wipe seal with vinegar solution.','Find and unscrew pump filter slowly.','Drain water and clean filter.','Run empty programme at 60°C.','Leave door ajar after washing.'] },
    63: { title:'Descale coffee machine and kettle',freq:'Monthly',desc:'Limescale reduces efficiency and worsens taste.',steps:['Fill with 50/50 vinegar and water.','Run descaling programme.','Run 2 rinse cycles with clean water.','Kettle: boil, pour out, rinse twice.','Repeat monthly in hard water areas.'] },
    64: { title:'Clean fridge interior',freq:'Every two years',desc:'Regular cleaning removes bacteria and mould.',steps:['Remove all food.','Switch off and remove all shelves.','Wash with bicarbonate solution.','Wash shelves separately.','Switch on and allow 1 hour before restocking.'] },
    65: { title:'Clean cooker hood and filter',freq:'Every 3 months',desc:'Grease filters can catch fire.',steps:['Remove grease filter.','Wash in dishwasher at 50–60°C.','Allow to dry completely.','Wipe inside of hood.','Check fan air inlet is not blocked.'] },
    66: { title:'Clean tumble dryer condensate station',freq:'Monthly',desc:'Dirty condensers increase energy use.',steps:['Empty condensate water tank after every use.','Remove and rinse condenser unit.','Allow to dry and replace.','Clean lint filter drawer.'] },
    70: { title:'Open the cabin for spring',freq:'Once a year (spring)',desc:'A thorough opening inspection ensures the cabin is ready.',steps:['Turn on water and check pipes for leaks.','Check smoke alarm and extinguisher.','Air thoroughly – open all windows 2 hours.','Inspect roof, walls and foundations.','Check drains are not blocked.'] },
    71: { title:'Close the cabin for winter',freq:'Once a year (autumn)',desc:'Proper winter closing protects against frost damage.',steps:['Shut off and drain water pipes.','Pour antifreeze into toilet siphon.','Switch off all circuits except frost guard.','Remove food that could attract pests.','Roll up hoses and bring in loose items.'] },
    72: { title:'Check roof for snow load',freq:'After heavy snowfall',desc:'Snow can weigh 100–300 kg/m². Check after heavy falls.',steps:['Measure snow depth with a stick.','Over 50 cm: use a roof rake from ground.','Always work from the ground.','Check gutters are not frozen.','Check inside for cracking or bowed rafters.'] },
    73: { title:'Ventilate cabin against damp',freq:'Regularly when in use',desc:'Cabins are particularly prone to damp problems.',steps:['Air thoroughly on arrival – all windows 2 h.','Check for musty smell and dark patches.','Look under rugs and behind furniture.','Check ventilation openings are clear.','Use dehumidifier in damp weather.'] },
    74: { title:'Maintain jetty and mooring fittings',freq:'Once a year',desc:'Seawater, sun and ice are very damaging to untreated wood.',steps:['Inspect all planks for rot.','Replace rotten planks immediately.','Scrub deck with stiff brush and jetty cleaner.','Apply thick deck stain or jetty oil.','Check supports, anchors and fittings.'] },
    75: { title:'Stack firewood and prepare woodshed',freq:'Once a year (summer)',desc:'Good dry firewood is essential for efficient heating.',steps:['Order or collect wood in good time.','Split to the right size for your stove.','Stack with air gaps.','Cover top but leave sides open.','Keep woodshed away from house wall.'] },
    76: { title:'Service water pump at cabin',freq:'Once a year',desc:'A pump failure means no water access.',steps:['Turn on power and check the pump starts.','Check pressure vessel.','Inspect suction side for air leaks.','Check expansion tank pressure.','Unusual sounds? Call a plumber.'] },
    80: { title:'Spring pruning of berry bushes',freq:'Once a year (early spring)',desc:'Correct pruning stimulates the bushes to produce plenty of fruit.',steps:['Cut out stems older than 3–4 years.','Remove weak, diseased or inward-growing stems.','Keep 6–8 strong young stems per bush.','Cut cleanly just above an outward-facing bud.','Compost prunings.'] },
    81: { title:'Fertilise and water berry bushes',freq:'Spring and early summer',desc:'Berry bushes are heavy feeders.',steps:['Apply berry fertiliser in early spring.','Mix in with light hoeing or watering.','Apply another dose in June.','Water deeply in dry periods.','Mulch around bushes with compost.'] },
    82: { title:'Harvest berries and tidy bushes',freq:'Once a year (summer)',desc:'Berries picked at the right time taste best.',steps:['Blackcurrants and redcurrants: pick when whole trusses are ripe.','Gooseberries: pick slightly unripe for jam.','Remove rotten berries.','Clear under bushes after harvest.','Apply fresh compost around root zone.'] },
    83: { title:'Spring pruning of apple and pear trees',freq:'Once a year (early spring)',desc:'Unpruned fruit trees produce little and poor fruit.',steps:['Prune in dry weather, preferably in frost.','Remove crossing and inward-growing branches.','Remove water shoots.','The crown should be open – light must get in.','Large branches: use certified arborist.'] },
    84: { title:'Fertilise and lime fruit trees',freq:'Once a year (spring)',desc:'Fruit trees have high nutrient demands.',steps:['Apply lime around root zone in April.','Add fruit fertiliser after flowering.','Water in.','Lay compost out to drip line.','Stop fertilising by 1 July.'] },
    85: { title:'Check fruit trees for pests and disease',freq:'Spring and early summer',desc:'Apple scab, aphids and codling moth are the most common problems.',steps:['Check leaves for brown patches from May.','Hang pheromone traps.','Clear weeds and old leaves under trees.','Spray copper if scab is a known problem.','Wash stems for moss and lichen in autumn.'] },
    86: { title:'Support stake and ties for young fruit trees',freq:'Checked annually',desc:'Young trees that move in the wind develop poor roots.',steps:['Check stake is not rotten.','Tie should allow slight movement.','Use wide, soft ties.','Remove stake after 3–4 years.','Check root collar is not covered with soil.'] },
    87: { title:'Rejuvenate and divide old berry bushes',freq:'Every 5–7 years',desc:'Berry bushes are productive for 10–15 years.',steps:['Dig up the whole bush in early spring.','Divide root system into 3–4 parts.','Plant with adequate spacing.','Water well and keep moist for 4 weeks.','Alternatively: take cuttings in September.'] },
    90: { title:'Inspect and fill asphalt cracks',freq:'Once a year (spring)',desc:'Water in cracks freezes and causes progressively larger damage.',steps:['Clean cracks thoroughly.','Allow to dry at least 24 h.','Fill with asphalt filler.','Compact with a flat piece of timber.','Large holes: cold asphalt compound or contractor.'] },
    91: { title:'Weed asphalt and edges',freq:'Spring and summer',desc:'Roots crack and lift asphalt over time.',steps:['Pull weeds by root.','Use boiling water along edges.','Spray with vinegar.','Fill cleaned cracks.','Lay weed membrane at renovation.'] },
    92: { title:'Pressure-wash driveway',freq:'Once a year (spring)',desc:'Pressure washing removes algae and winter grit.',steps:['Sweep loose grit and leaves first.','Pressure washer with fan nozzle (40°).','Start at top and work downward.','Use algae remover if needed.','Oil stains: apply degreaser.'] },
    93: { title:'Top up and level gravel surface',freq:'Every 2 years',desc:'Gravel shifts over time from vehicles and rain.',steps:['Level existing gravel with a rake.','Order new gravel (8–16 mm crushed).','Spread to even thickness.','Drive car over to compact.','Check the gravel slopes away from the house.'] },
    94: { title:'Clean joints in paving and natural stone',freq:'Once a year',desc:'Weeds in joints lift and twist the stones.',steps:['Remove weeds with a joint tool.','Pressure wash joints at low pressure (max 80 bar).','Allow to dry at least 24 h.','Fill with new quartz or polymer sand.','Lightly water until polymer sand sets.'] },
    95: { title:'Check slope and drainage on outdoor surfaces',freq:'Every 5 years',desc:'Incorrect slope leads water towards the house.',steps:['Lay a long straight edge and measure slope.','Correct slope: at least 2% away from the house.','Map where water pools after rain.','Low spots: fill with cold asphalt.','Larger drainage problems: contact contractor.'] },
    96: { title:'Check and clean driveway gullies',freq:'Spring and autumn',desc:'Blocked gullies cause water pooling and winter damage.',steps:['Lift the grate and remove debris.','Flush with a hose.','Check the pipe is not blocked.','Blocked pipe: use drain unblocker.','Replace grate securely.'] },
    97: { title:'Seal or oil-treat new asphalt',freq:'Every 2–3 years',desc:'Sealcoating protects against UV, water and salt.',steps:['Clean asphalt thoroughly – pressure wash and dry 48 h.','Repair all cracks and holes first.','Apply sealcoat with roller in 2 coats.','Cordon off for at least 24 h.','Do not apply below 10°C or before rain.'] },
    101: { title:'Change bed linen', freq:'Every two weeks', desc:'Bed linen accumulates dust mites, sweat and skin cells. Regular changing improves sleep quality and reduces allergy symptoms.', steps:['Remove duvet cover, pillowcases and sheet.','Wash at 60 °C to kill dust mites.','Air the duvet and mattress while washing.','Put on clean bed linen.'] },
    102: { title:'Change bathroom and kitchen towels', freq:'Weekly', desc:'Damp towels breed bacteria and fungi. Change at least weekly and wash at 60 °C.', steps:['Collect all bath and kitchen towels.','Wash at 60 °C.','Always hang towels to dry properly after use.','Put out clean towels.'] },
    103: { title:'Clean shower curtain or shower enclosure', freq:'Monthly', desc:'Shower curtains and walls accumulate limescale, mould and bacteria. Monthly cleaning prevents discolouration.', steps:['Fabric curtain: machine wash 40 °C with a little vinegar in the rinse.','Plastic curtain: scrub with vinegar solution (1:1 with water).','Glass walls: spray limescale remover, leave 5 min, scrape off.','Always hang curtain stretched out to dry after showering.'] },
    104: { title:'Vacuum and air the mattress', freq:'Every 3 months', desc:'The mattress accumulates dust mites and sweat. Regular vacuuming and airing extends its lifespan.', steps:['Remove all bedding.','Vacuum both sides with the upholstery attachment.','Flip the mattress if it is reversible.','Open windows and air the room for 1–2 hours.','Stains: sprinkle bicarbonate, leave 30 min, vacuum off.'] },
    105: { title:'Wash pillows and duvets', freq:'Every 3 months', desc:'Pillows and duvets accumulate sweat and dust mites. Most synthetic ones are machine-washable – always check the label.', steps:['Check the care label – most synthetic items tolerate 40 °C.','Use only a little detergent to avoid clumping.','Run an extra rinse cycle.','Tumble dry on low heat with dryer balls – shake halfway through.'] },
    106: { title:'Clean oven and hob', freq:'Every 2 months', desc:'Burnt-on fat in the oven can produce unpleasant smoke. Hob with food residue can catch fire.', steps:['Oven: spray oven cleaner, close door and leave as directed (overnight is ideal).','Scrub and wipe down with damp cloths.','Hob: lift grate and plate, wash in soapy water.','Glass hob: use a special scraper and glass cleaner.'] },
    107: { title:'Clean windows from inside', freq:'Every 2 months', desc:'Dirty windows noticeably dim natural light. With the right technique it is quick and streak-free.', steps:['Wipe frames and sills with a damp cloth.','Spray window cleaner onto the glass.','Pull a squeegee from top to bottom in one sweep.','Wipe edges with a dry microfibre cloth to prevent streaks.'] },
    108: { title:'Empty and wash bins', freq:'Monthly', desc:'Bins breed bacteria and give off unpleasant odours. A quick monthly wash keeps the kitchen fresh.', steps:['Empty all bins.','Rinse with hot water.','Spray cleaner and scrub.','Rinse and leave to air-dry upside down.','Put in a new bin liner.'] },
    109: { title:'Replace toothbrush or brush head', freq:'Every 3 months', desc:'Dental associations recommend changing your toothbrush every 3 months, or after illness. Worn bristles remove far less plaque.', steps:['Check the bristles – if they are splayed it is time to change.','Always replace after a cold or mouth infection.','Remember everyone in the household.','Electric: replace only the brush head.'] },
    110: { title:'Vacuum and wipe under and behind furniture', freq:'Monthly', desc:'Dust and fluff build up under sofas and beds – especially important for allergy sufferers.', steps:['Move sofa and loose furniture to one side.','Vacuum the floor thoroughly, including along skirting boards.','Wipe the underside of furniture with a damp cloth.','Move furniture back into place.'] },
  },
  de: {
    1:  { title:'Rauchwarnmelder-Batterien wechseln',freq:'Alle 6 Monate',desc:'Ein Rauchwarnmelder mit schwacher Batterie kann ohne Vorwarnung ausfallen.',steps:['Melder abnehmen (gegen den Uhrzeigersinn).','Batterie wechseln – 9V oder AA.','Testtaste 5 s drücken.','Datum auf der Rückseite notieren.'] },
    2:  { title:'Kohlenmonoxidmelder testen',freq:'Monatlich',desc:'CO ist geruchlos und tödlich.',steps:['Melder in Flur oder Schlafzimmer finden.','Testtaste 5–10 s halten bis Alarm ertönt.','Kein Ton? Batterie oder Gerät wechseln.','Geräte alle 5–7 Jahre ersetzen.'] },
    3:  { title:'Feuerlöscher schütteln und prüfen',freq:'Monatlich',desc:'Pulver kann verklumpen. Schütteln hält es locker.',steps:['Umdrehen und vorsichtig 10–15 s schütteln.','Manometer prüfen – grüner Bereich.','Sicherungsstift und Plombe kontrollieren.','Älter als 10 Jahre: zur Prüfstelle.'] },
    4:  { title:'FI-Schalter testen',freq:'Monatlich',desc:'Der FI-Schalter schützt vor Stromunfällen in Wassernähe.',steps:['„Test"/„Reset"-Steckdosen in Küche und Bad finden.','„Test" drücken – Strom soll unterbrochen werden.','„Reset" drücken zum Wiederherstellen.','Funktioniert nicht: Elektriker rufen.'] },
    5:  { title:'Gemeinschaftsflur reinigen',freq:'Laut Putzplan',desc:'Saubere Gemeinschaftsflächen sind brandsicher.',steps:['Flur und Treppenhaus fegen und wischen.','Briefkästen und Türgriffe abwischen.','Fluchtwege freihalten.','Defekte Lampen melden.'] },
    8:  { title:'Rohre unter Waschbecken auf Leckagen prüfen',freq:'Alle 6 Monate',desc:'Kleine Leckagen bleiben monatelang unentdeckt.',steps:['Unterschrank öffnen.','Alle Verbindungen mit der Hand abtasten.','Kalk, Rost oder dunkle Flecken suchen.','Feuchtes Tuch am nächsten Tag? Klempner rufen.'] },
    11: { title:'Luftfilter der Lüftungsanlage wechseln',freq:'Alle 3 Monate',desc:'Schmutzige Filter erhöhen Energieverbrauch und mindern Luftqualität.',steps:['Lüftungsgerät finden.','Frontabdeckung öffnen und alten Filter herausnehmen.','Filtergröße notieren.','Neuen Filter einsetzen – Pfeil in Strömungsrichtung.'] },
    15: { title:'Dachrinnen und Fallrohre reinigen',freq:'Zweimal pro Jahr',desc:'Volle Dachrinnen leiten Wasser an der Fassade entlang.',steps:['Leiter sicher aufstellen.','Laub mit Rinnenräumer entfernen.','Mit Schlauch in Richtung Fallrohr spülen.','Verstopft: mit Plastikstab lösen.'] },
    40: { title:'Rasen mähen',freq:'Wöchentlich (Mai–Sept)',desc:'Regelmäßiges Mähen hält den Rasen gesund.',steps:['Schnitthöhe 4–6 cm einstellen.','Bei trockenem Wetter mähen.','Fahrtrichtung jedes Mal wechseln.','Fangkorb leeren und kompostieren.'] },
    41: { title:'Rasen düngen und harken',freq:'Frühjahr und Herbst',desc:'Harken entfernt Filz der den Rasen erstickt.',steps:['Filz im Frühjahr herausharken.','Verdichtete Stellen lüften.','Rasendünger gleichmäßig streuen.','Gut einwässern.'] },
    50: { title:'Rasenmäher schärfen und warten',freq:'Einmal jährlich (Frühjahr)',desc:'Ein scharfer Mäher spart Kraftstoff.',steps:['Kraftstoff ablassen oder Batterie abklemmen.','Messer mit Winkelschleifer schärfen.','Zündkerze und Luftfilter wechseln.','Ölstand kontrollieren.','Mähwerk reinigen.'] },
    60: { title:'Gefriergerät abtauen und reinigen',freq:'Einmal jährlich',desc:'Eisansammlungen verringern Kapazität und Effizienz.',steps:['Alle Lebensmittel entfernen.','Strom abschalten und Handtuch einlegen.','Eis natürlich schmelzen lassen.','Mit lauwarmem Wasser und Natron reinigen.','Einschalten und 2–3 h kühlen lassen.'] },
    61: { title:'Spülmaschinenfilter und Sprüharme reinigen',freq:'Monatlich',desc:'Verstopfte Filter verursachen schlechte Reinigung.',steps:['Körbe herausnehmen, Filter finden.','Gegen den Uhrzeigersinn drehen und spülen.','Sprüharme abnehmen und Löcher reinigen.','Leerprogramm 60°C mit Essig.','Türdichtung abwischen.'] },
    62: { title:'Waschmaschine – Trommel und Filter reinigen',freq:'Monatlich',desc:'Die Türdichtung ist ein Brutplatz für Schimmel.',steps:['Dichtung mit Essigwasser abwischen.','Pumpenfilter langsam aufschrauben.','Wasser ablassen und Filter reinigen.','Leerprogramm 60°C mit Maschinenreiniger.','Tür nach dem Waschen offen lassen.'] },
    63: { title:'Kaffeemaschine und Wasserkocher entkalken',freq:'Monatlich',desc:'Kalk mindert Effizienz und Geschmack.',steps:['Mit 50/50 Essig und Wasser befüllen.','Entkalkungsprogramm durchlaufen lassen.','2 Spülgänge mit klarem Wasser.','Wasserkocher: aufkochen, ausgießen, 2x spülen.','Monatlich in Hartwassergebieten.'] },

function getTask(taskObj) {
  var lang = (APP.locale && APP.locale.lang) || 'no';
  if (lang === 'no') return taskObj;
  var langMap = TASK_I18N[lang];
  if (!langMap) return taskObj;
  var tr = langMap[taskObj.id];
  if (!tr) return taskObj;
  return Object.assign({}, taskObj, {
    title: tr.title || taskObj.title,
    freq:  tr.freq  || taskObj.freq,
    desc:  tr.desc  || taskObj.desc,
    steps: tr.steps || taskObj.steps,
  });
}

function showToast(msg, ok = true) {
  const el = document.createElement('div');
  el.className = `toast ${ok ? 't-ok' : 't-err'}`;
  el.innerHTML = `<i class="ti ${ok ? 'ti-check' : 'ti-x'}"></i><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

════════════════════════════════════════ */
function navigate(page) {
  APP.page = page;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + page).classList.add('active');
  document.getElementById('scroll-area').scrollTop = 0;
  renderPage();
}

function renderPage() {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  const el = document.getElementById('page-' + APP.page);
  el.style.display = 'block';
  if (APP.page === 'hjem') renderHjem();
  else if (APP.page === 'juridisk') renderJuridisk();
  else if (APP.page === 'renovering') renderRenovering();
  else renderInnstillinger();
  updateOverdueDot();
  updateRenoveringDot();
}

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function urgency(t) {
  if (t.done) return 4;                        // just checked off → absolute bottom
  const d = Math.floor((t.due - TODAY) / 864e5);
  if (d < 0)   return 0;                       // overdue → top
  if (d <= 14) return 1;                       // due within 2 weeks → near top
  if (t.lastDone) return 3;                    // done before, future due → near bottom
  return 2;                                    // never done, future → middle
}
function getDueInfo(t) {
  const diff = Math.floor((t.due - TODAY) / 864e5);
  const isOv = !t.done && diff < 0;
  const isSn = !t.done && diff >= 0 && diff <= 14;
  let label = '', cls = '';
  if (isOv) { label = `${Math.abs(diff)} dager forfalt`; cls = 'overdue'; }
  else if (isSn) { label = diff === 0 ? 'Forfaller i dag' : `Om ${diff} dager`; cls = 'soon'; }
  else label = fmtDate(t.due);
  return { label, cls, isOv, isSn };
}
function updateOverdueDot() {
  const dot = document.getElementById('dot-hjem');
  const hasOverdue = APP.tasks.some(t => !t.done && t.due < TODAY);
  dot.classList.toggle('show', hasOverdue);
}
function setType(type) {
  APP.boligtype = type;
  APP.filter = 'all';
  APP.expandedId = null;
  const history = loadHistory();
  APP.tasks = ALL_TASKS
    .filter(t => t.types.includes(type))
    .map(t => {
      const h = history[t.id];
      if (h && h.lastDone) {
        const next = nextDueDate(t.interval, h.lastDone);
        return { ...t, due: next, done: false, lastDone: h.lastDone, doneCount: h.count || 1 };
      }
      return { ...t, done: false, lastDone: null, doneCount: 0 };
    });
  saveAppSettings();
}

  var lang = (APP.locale && APP.locale.lang) || 'no';

function renderTaskCard(task) {
  var lang = (APP.locale && APP.locale.lang) || 'no';
  var UI = {
    sist:    { no:'Sist utf\u00f8rt', sv:'Senast utf\u00f6rd', da:'Sidst udf\u00f8rt', en:'Last done',       de:'Zuletzt erledigt',        nl:'Laatst gedaan' },
    totalt:  { no:'totalt',           sv:'totalt',              da:'i alt',            en:'total',            de:'gesamt',                   nl:'totaal' },
    marker:  { no:'Marker som utf\u00f8rt', sv:'Markera som utf\u00f6rd', da:'Marker som udf\u00f8rt', en:'Mark as done', de:'Als erledigt markieren', nl:'Markeer als gedaan' },
    angre:   { no:'Angre',            sv:'\u00c5ngra',          da:'Fortryd',          en:'Undo',             de:'R\u00fcckg\u00e4ngig',    nl:'Ongedaan' },
    utsett:  { no:'Utsett 1 uke',     sv:'Skjut upp 1 vecka',   da:'Udskyd 1 uge',     en:'Snooze 1 week',   de:'1 Woche verschieben',      nl:'1 week uitstellen' },
    tildel:  { no:'Tildel',           sv:'Tilldela',            da:'Tildel',           en:'Assign',           de:'Zuweisen',                 nl:'Toewijzen' },
    fagfolk: { no:'Fagfolk',          sv:'Fackfolk',            da:'Fagfolk',          en:'Tradesmen',        de:'Fachleute',                nl:'Vakman' },
    guide:   { no:'Guide',            sv:'Guide',               da:'Guide',            en:'Guide',            de:'Anleitung',                nl:'Gids' },
    sendHA:  { no:'Send til HA',      sv:'Skicka till HA',      da:'Send til HA',      en:'Send to HA',       de:'An HA senden',             nl:'Naar HA sturen' },
    repeats: { no:'Gjentar hvert',    sv:'Upprepas varje',      da:'Gentages hver',    en:'Repeats every',    de:'Wiederholt alle',          nl:'Herhaalt elke' },
    days:    { no:'dager',            sv:'dagar',               da:'dage',             en:'days',             de:'Tage',                     nl:'dagen' },
    month:   { no:'. m\u00e5ned',     sv:'. m\u00e5nad',        da:'. m\u00e5ned',     en:' mo.',             de:'. Monat',                  nl:'. maand' },
    year:    { no:'\u00e5r',          sv:'\u00e5r',             da:'\u00e5r',          en:'year',             de:'Jahr',                     nl:'jaar' },
    years:   { no:'. \u00e5r',        sv:'. \u00e5r',           da:'. \u00e5r',        en:' yr.',             de:'. Jahr',                   nl:'. jaar' },
  };
  function s(key) { return (UI[key] && (UI[key][lang] || UI[key].no)) || key; }

  var info = getDueInfo(task);
  var label = info.label, cls = info.cls, isOv = info.isOv, isSn = info.isSn;
  var isOpen = APP.expandedId === task.id;

  var lastDoneHtml = task.lastDone
    ? '<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--green);font-weight:500;">' +
        '<i class="ti ti-circle-check" style="font-size:13px;"></i>' +
        s('sist') + ' ' + fmtDate(new Date(task.lastDone)) +
        (task.doneCount > 1 ? ' \u00b7 ' + task.doneCount + '\u00d7 ' + s('totalt') : '') +
      '</span>'
    : '';

  var stepsHtml = task.steps
    ? '<ul class="steps-list">' + task.steps.map(function(step, i) {
        return '<li><span class="step-num">' + (i+1) + '</span><span>' + step + '</span></li>';
      }).join('') + '</ul>'
    : '';

  var iv = task.interval;
  var repeatText = iv < 30 ? iv + ' ' + s('days')
    : iv < 365 ? Math.round(iv/30) + s('month')
    : Math.round(iv/365) === 1 ? s('year') : Math.round(iv/365) + s('years');
  var nextLabel = '<span style="font-size:11px;color:var(--ink3);display:inline-flex;align-items:center;gap:3px;">' +
    '<i class="ti ti-refresh" style="font-size:12px;"></i>' + s('repeats') + ' ' + repeatText + '</span>';

  /* For non-Norwegian use the translated task title as search query */
  var isNorwegian = lang === 'no';
  var maQuery = isNorwegian && task.fagfolk && task.fagfolk.ma ? task.fagfolk.ma : task.title;
  var gQuery  = isNorwegian && task.fagfolk && task.fagfolk.g  ? task.fagfolk.g  : task.title;
  var ytQuery = isNorwegian && task.yt ? task.yt : task.title;
  var contractorSvc = getContractorService();

  var fagfolkBtns = task.fagfolk
    ? '<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);">' + s('fagfolk') + ':</span>' +
      '<a href="' + maUrl(maQuery) + '" target="_blank" class="act-btn act-ma" onclick="event.stopPropagation()"><i class="ti ti-tools"></i>' + contractorSvc.name + '</a>' +
      '<a href="' + gUrl(gQuery) + '" target="_blank" class="act-btn act-g" onclick="event.stopPropagation()"><i class="ti ti-search"></i>Google</a>' +
      '<div class="divider"></div>'
    : '';
  var ytBtn = task.yt
    ? '<a href="' + ytUrl(ytQuery) + '" target="_blank" class="act-btn act-yt" onclick="event.stopPropagation()"><i class="ti ti-brand-youtube"></i>' + s('guide') + '</a><div class="divider"></div>'
    : '';
  var haBtn = '';
  var angreBtn = task.lastDone
    ? '<div class="divider"></div><button class="act-btn" style="color:var(--ink3);" onclick="event.stopPropagation();undoTask(' + task.id + ')" title="' + s('angre') + '"><i class="ti ti-arrow-back-up"></i>' + s('angre') + '</button>'
    : '';

  var members = getMembers();
  var assignments = getAssignments();
  var assignedId = assignments[task.id];
  var assignedMember = assignedId ? members.find(function(m) { return m.id === assignedId; }) : null;
  var assignChip = members.length > 0
    ? '<button class="assign-chip ' + (assignedMember ? '' : 'unassigned') + '" ' +
        (assignedMember ? 'style="background:' + assignedMember.color + '"' : '') +
        ' onclick="event.stopPropagation();toggleAssignPicker(' + task.id + ',this)">' +
        '<i class="ti ti-user" style="font-size:11px;"></i>' +
        (assignedMember ? assignedMember.name : s('tildel')) +
      '</button>'
    : '';

  return '<div class="task-card' + (task.done?' is-done':'') + (isOv?' is-overdue':isSn?' is-soon':'') + '">' +
    '<div class="task-row" onclick="toggleExpand(' + task.id + ')">' +
      '<button class="check-btn' + (task.done?' done':'') + '" onclick="toggleDone(' + task.id + ',event)" title="' + (task.done ? s('angre') : s('marker')) + '"><i class="ti ti-check"></i></button>' +
      '<div class="task-info">' +
        '<div class="task-title">' +
          '<i class="ti ' + task.icon + '" style="font-size:14px;color:var(--ink3);"></i> ' +
          task.title +
          (task.fagfolk ? '<span class="fagfolk-chip"><i class="ti ti-hard-hat"></i>' + s('fagfolk') + '</span>' : '') +
        '</div>' +
        '<div class="task-meta">' +
          '<span class="cat-badge cat-' + task.cat + '">' + CAT_LABEL[task.cat] + '</span>' +
          '<span class="due-text ' + cls + '"><i class="ti ti-calendar"></i> ' + label + '</span>' +
          (assignedMember ? '<span class="member-row-badge" style="background:' + assignedMember.color + '22;color:' + assignedMember.color + ';">' + memberInitials(assignedMember.name) + (assignedMember.isMe ? ' · Meg' : ' · ' + assignedMember.name) + '</span>' : '') +
          (lastDoneHtml || nextLabel) +
        '</div>' +
      '</div>' +
      (isOv ? '<button class="snooze-btn" onclick="snoozeTask(' + task.id + ',event)" title="' + s('utsett') + '"><i class="ti ti-clock-snooze"></i></button>' : '') +
      '<i class="ti ti-chevron-down task-chevron' + (isOpen?' open':'') + '"></i>' +
    '</div>' +
    '<div class="task-detail' + (isOpen?' open':'') + '" id="detail-' + task.id + '">' +
      (task.desc ? '<p class="detail-desc">' + task.desc + '</p>' : '') +
      stepsHtml +
      '<div class="action-bar">' + fagfolkBtns + ytBtn + haBtn + angreBtn + (assignChip ? '<div class="divider"></div>' + assignChip : '') + '<div class="divider"></div><button class="act-btn" style="color:var(--purple);" onclick="event.stopPropagation();openProjModalFromTask(' + task.id + ',\'' + task.title.replace(/'/g,"\\'") + '\',\'' + task.cat + '\')"><i class="ti ti-hammer"></i> ' + t('projAddTask') + '</button>' + '</div>' +
    '</div>' +
  '</div>';
}

/* ════════════════════════════════════════
   TASK ACTIONS
════════════════════════════════════════ */
function toggleExpand(id) {
  APP.expandedId = APP.expandedId === id ? null : id;
  renderPage();
}
function toggleDone(id, e) {
  if (e && e.stopPropagation) e.stopPropagation();
  const task = APP.tasks.find(x => x.id === id);
  if (!task) return;
  if (!task.done) {
    recordDone(id);
    const key = (APP.activeAddr || 'default') + '_' + id;
    const h = loadHistory()[key];
    if (!h) return;
    task.done = true;
    task.lastDone = h.lastDone;
    task.doneCount = h.count;
    renderPage();
    setTimeout(() => {
      const next = nextDueDate(task.interval, task.lastDone);
      task.due = next;
      task.done = false;
      APP.expandedId = null;
      showToast(t('taskDone') + ' ' + fmtDate(next));
      renderPage();
    }, 1200);
  } else {
    undoTask(id);
  }
}
function undoTask(id) {
  const task = APP.tasks.find(x => x.id === id);
  if (!task) return;
  undoRecord(id);
  task.done = false;
  task.lastDone = null;
  task.doneCount = 0;
  const original = ALL_TASKS.find(x => x.id === id);
  if (original) task.due = original.due;
  showToast(t('taskUndone'));
  renderPage();
}
function snoozeTask(id, e) {
  e.stopPropagation();
  const task = APP.tasks.find(x => x.id === id);
  if (task) { task.due = addDays(7); showToast(t('taskSnoozed')); }
  renderPage();
}
function setFilter(f) {
  APP.filter = f;
  APP.expandedId = null;
  renderPage();
}
function changeType(type) {
  if (APP.profile) {
    APP.profile.boligtype = type;
    saveProfile(APP.profile);
    setTypeFromProfile(APP.profile);
  } else {
    setType(type);
  }
  renderPage();
}
function changeTypeSettings(type) {
  if (APP.profile) {
    APP.profile.boligtype = type;
    saveProfile(APP.profile);
    setTypeFromProfile(APP.profile);
  } else {
    setType(type);
  }
  renderInnstillinger();
}
/* ════════════════════════════════════════
   BOLIGVERDI
════════════════════════════════════════ */
function saveBoligverdi(field, rawVal) {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  if (!addr) return;
  if (!addr.verdi) addr.verdi = {};
  if (field === 'kjopsdato') {
    addr.verdi[field] = rawVal || '';
  } else {
    var num = parseInt((rawVal + '').replace(/[^\d]/g, ''), 10);
    addr.verdi[field] = isNaN(num) ? null : num;
  }
  saveAddresses(APP.addresses);
  renderInnstillinger();
}

function getRenovasjonskostnader() {
  var projects = loadProjects();
  var total = 0;
  projects.forEach(function(p) {
    if (!p.budget) return;
    var n = parseInt((p.budget + '').replace(/[^\d]/g, ''), 10);
    if (!isNaN(n)) total += n;
  });
  return total;
}

function fmtNOK(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('nb-NO') + ' kr';
}

   PUSH NOTIFICATIONS  (OneSignal)
════════════════════════════════════════ */
function enablePushNotif() {
  if (!window.OneSignal) {
    showToast('OneSignal SDK er ikke lastet ennå. Prøv igjen om et øyeblikk.', false);
    return;
  }
  OneSignal.User.PushSubscription.optIn().then(function() {
    renderInnstillinger();
    showToast('🔔 Push-varsler aktivert!');
  }).catch(function(err) {
    showToast('Kunne ikke aktivere varsler: ' + (err.message || err), false);
  });
}

function disablePushNotif() {
  if (!window.OneSignal) return;
  OneSignal.User.PushSubscription.optOut().then(function() {
    renderInnstillinger();
    showToast('Varsler slått av.');
  });
}

/* Notify on open if overdue tasks exist */
function maybeNotifyOverdue() {
  if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  var overdue = (APP.tasks || []).filter(function(t) { return !t.done && t.due < new Date(); });
  if (!overdue.length) return;
  try {
    new Notification(t('appName') || 'Boligvedlikehold', {
      body: overdue.length + ' forfalt' + (overdue.length !== 1 ? 'e' : '') + ' oppgave' + (overdue.length !== 1 ? 'r' : '') + ' venter på deg.',
      icon: 'https://fenanix.github.io/boligvedlikehold/icon-192.png',
    });
  } catch (_) {}
}

  { lang:'nl', country:'NL', flag:'🇳🇱', native:'Nederlands', cont:'Doorgaan'  },
];
var _pickedLang      = { lang:'en', country:'GB' };
var _langPickerDone  = null;

function openLangPicker(onDone) {
  _pickedLang     = { lang:'en', country:'GB' };
  _langPickerDone = onDone;
  renderLangPicker();
  document.getElementById('lang-picker-overlay').style.display = 'block';
}

function renderLangPicker() {
  var grid = document.getElementById('lang-picker-grid');
  if (!grid) return;
  grid.innerHTML = LANG_OPTIONS.map(function(o) {
    var sel = _pickedLang.lang === o.lang;
    return '<button class="lang-btn' + (sel ? ' sel' : '') + '" onclick="pickLang(\'' + o.lang + '\',\'' + o.country + '\')">' +
      '<span class="flag">' + o.flag + '</span>' +
      '<span class="native">' + o.native + '</span>' +
    '</button>';
  }).join('');
  var opt = LANG_OPTIONS.find(function(o) { return o.lang === _pickedLang.lang; });
  var btn = document.getElementById('lang-continue-btn');
  if (btn && opt) btn.textContent = opt.cont;
}

function pickLang(lang, country) {
  _pickedLang = { lang: lang, country: country };
  renderLangPicker();
}

function confirmLanguage() {
  APP.locale = _pickedLang;
  saveAppSettings();
  updateNavLabels();
  document.getElementById('lang-picker-overlay').style.display = 'none';
  if (_langPickerDone) _langPickerDone();
}

function toggleEkstraFeature(key) {
  if (!APP.profile) return;
  var feats = (APP.profile.features || []).slice();
  var idx = feats.indexOf(key);
  if (idx === -1) feats.push(key); else feats.splice(idx, 1);
  APP.profile.features = feats;
  saveProfile(APP.profile);
  setTypeFromProfile(APP.profile);
  renderInnstillinger();
  showToast((feats.includes(key) ? '✓ ' : '— ') + EKSTRA_OPTIONS.find(function(o){return o.val===key;}).label);
}

      hvitevarer: [...(profile.hvitevarer || [])],
      erfaring:   profile.erfaring   || '',
      paaminelse: profile.paaminelse || '',
    };
  } else {
    SV = {};
  }
  surveyStep = 0;
  openSurvey();
}

function updateHADot() {
  document.getElementById('ha-dot').classList.toggle('connected', APP.haConnected);
}
function setHAStatus(state, msg) {
  const el = document.getElementById('ha-status');
  if (!el) return;
  const cls = state === 'ok' ? 'sd-ok' : state === 'err' ? 'sd-err' : state === 'loading' ? 'sd-loading' : 'sd-idle';
  el.innerHTML = `<div class="status-dot ${cls}"></div><span>${msg}</span>`;
}
async function connectHA() {
  APP.haUrl   = (document.getElementById('ha-url')?.value || '').replace(/\/$/, '');
  APP.haToken = document.getElementById('ha-token')?.value || '';
  if (!APP.haUrl || !APP.haToken) { showToast(t('haFillFields'), false); return; }
  setHAStatus('loading', t('haConnecting'));
  try {
    const r = await fetch(APP.haUrl + '/api/', { headers: { Authorization: 'Bearer ' + APP.haToken } });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    APP.haConnected = true;
    showToast(t('haConnected') + ' ' + (d.location_name || 'Home Assistant'));
    renderInnstillinger();
  } catch(e) {
    APP.haConnected = false;
    setHAStatus('err', 'Feil: ' + e.message);
    showToast(t('haFailed'), false);
  }
  updateHADot();
}
function disconnectHA() {
  APP.haConnected = false;
  APP.haUrl = ''; APP.haToken = '';
  showToast(t('haDisconnected'));
  renderInnstillinger();
  updateHADot();
}
async function refreshSensors() {
  const grid = document.getElementById('sensor-grid');
  if (!grid) return;
  grid.innerHTML = '<div style="font-size:12px;color:var(--ink3)">Henter sensorer…</div>';
  const results = await Promise.all(SENSORS.map(async s => {
    try {
      const r = await fetch(APP.haUrl + '/api/states/' + s.entity, { headers: { Authorization: 'Bearer ' + APP.haToken } });
      if (!r.ok) return { ...s, na: true };
      const d = await r.json();
      return { ...s, state: d.state };
    } catch { return { ...s, na: true }; }
  }));
  const available = results.filter(s => !s.na && s.state !== 'unavailable');
  if (!available.length) {
    grid.innerHTML = '<div style="font-size:12px;color:var(--ink3);">' + t('haNoSensors') + '</div>';
    return;
  }
  grid.innerHTML = available.map(s => {
    let val, cls = '';
    if (s.goodState !== undefined) {
      const ok = s.state === s.goodState;
      val = ok ? s.goodLabel : s.badLabel;
      cls = ok ? 'sv-ok' : 'sv-err';
    } else {
      const n = parseFloat(s.state);
      val = isNaN(n) ? s.state : n.toFixed(1);
      if ((s.warnBelow && n < s.warnBelow) || (s.warnAbove && n > s.warnAbove)) cls = 'sv-err';
      else cls = 'sv-ok';
    }
    return `<div class="sensor-tile">
      <div class="sensor-tile-label"><i class="ti ${s.icon}"></i>${s.label}</div>
      <div class="sensor-tile-val ${cls}">${val}${s.unit ? '<span class="sv-unit"> ' + s.unit + '</span>' : ''}</div>
    </div>`;
  }).join('');
}
async function toggleAuto(id, btn) {
  APP.autoStates[id] = !APP.autoStates[id];
  btn.className = 'toggle-btn ' + (APP.autoStates[id] ? 'on' : 'off');
  if (!APP.haConnected) return;
  const svc = APP.autoStates[id] ? 'turn_on' : 'turn_off';
  try {
    await fetch(APP.haUrl + '/api/services/automation/' + svc, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + APP.haToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ entity_id: AUTO_ENTITY[id] })
    });
    showToast(APP.autoStates[id] ? t('haAutoToggled_on') : t('haAutoToggled_off'));
  } catch { showToast(t('haAutoError'), false); }
}
async function haAction(taskId) {
  if (!APP.haConnected) { showToast(t('haNotConn'), false); return; }
  const taskObj = APP.tasks.find(x => x.id === taskId);
  if (!taskObj) return;
  try {
    const r = await fetch(APP.haUrl + '/api/services/todo/add_item', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + APP.haToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        entity_id: 'todo.boligvedlikehold',
        item: taskObj.title,
        description: (taskObj.steps || []).join(' → '),
        due_date: taskObj.due.toISOString().split('T')[0]
      })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    showToast('"' + taskObj.title + '" ' + t('haSent'));
  } catch(e) { showToast(t('haError') + ' ' + e.message, false); }
}

function getKalTasks() {
  const v = document.getElementById('kal-velg')?.value || 'alle';
  if (v === 'overdue') return APP.tasks.filter(t => !t.done && t.due < TODAY);
  if (v === 'snart')   return APP.tasks.filter(t => !t.done && t.due >= TODAY && Math.floor((t.due - TODAY) / 864e5) <= 14);
  if (v === 'fagfolk') return APP.tasks.filter(t => t.fagfolk);
  return APP.tasks.filter(t => !t.done);
}
function exportGCal() {
  const tasks = getKalTasks();
  if (!tasks.length) { showToast(t('noTasks'), false); return; }
  const t = tasks[0];
  const s = new Date(t.due); s.setHours(9, 0, 0, 0);
  const e = new Date(s);     e.setHours(10, 0, 0, 0);
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('🏠 '+t.title)}&dates=${fmtICS(s)}/${fmtICS(e)}&details=${encodeURIComponent(t.desc||'')}`, '_blank');
  if (tasks.length > 1) showToast(t('calGoogleOne') + ' ' + tasks.length + ' ' + t('calGoogleSuffix'));
}
function exportICS() {
  const tasks = getKalTasks();
  if (!tasks.length) { showToast(t('noTasksShort'), false); return; }
  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Boligvedlikehold v0.2.8//NO\r\n';
  tasks.forEach(t => {
    const s = new Date(t.due); s.setHours(9, 0, 0, 0);
    const e = new Date(s);     e.setHours(10, 0, 0, 0);
    ics += `BEGIN:VEVENT\r\nUID:${t.id}-${Date.now()}@boligvedlikehold\r\nDTSTAMP:${fmtICS(new Date())}\r\nDTSTART:${fmtICS(s)}\r\nDTEND:${fmtICS(e)}\r\nSUMMARY:🏠 ${t.title}\r\nDESCRIPTION:${(t.desc||'').replace(/\n/g,'\\n')}\r\nEND:VEVENT\r\n`;
  });
  ics += 'END:VCALENDAR';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([ics], { type: 'text/calendar' }));
  a.download = 'boligvedlikehold.ics';
  a.click();
  showToast(tasks.length + ' ' + (tasks.length === 1 ? t('calExported') : t('calExportedPlural')));
}
function exportOutlook() {
  const tasks = getKalTasks();
  if (!tasks.length) { showToast('Ingen oppgaver.', false); return; }
  const t = tasks[0];
  const s = new Date(t.due); s.setHours(9, 0, 0, 0);
  const e = new Date(s);     e.setHours(10, 0, 0, 0);
  window.open(`https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent&subject=${encodeURIComponent('🏠 '+t.title)}&startdt=${s.toISOString()}&enddt=${e.toISOString()}&body=${encodeURIComponent(t.desc||'')}`, '_blank');
  if (tasks.length > 1) showToast(t('calGoogleOne') + ' ' + tasks.length + ' ' + t('calOutlookSuffix'));
}

function t(key) {
  var lang = (APP.locale && APP.locale.lang) || 'no';
  var map = STRINGS[lang] || STRINGS.no;
  return map[key] || STRINGS.no[key] || key;
}

function setLocale(lang, country) {
  APP.locale = { lang: lang, country: country };
  saveAppSettings();
  // Re-render everything with new locale
  renderPage();
  // Update nav tab labels
  updateNavLabels();
}

function updateNavLabels() {
  var tabHjem = document.getElementById('tab-hjem');
  var tabRen  = document.getElementById('tab-renovering');
  var tabJur  = document.getElementById('tab-juridisk');
  var tabSet  = document.getElementById('tab-innstillinger');
  if (tabHjem) tabHjem.querySelector('span').textContent = t('home');
  if (tabRen)  tabRen.querySelector('span').textContent  = t('projects');
  if (tabJur)  tabJur.querySelector('span').textContent  = t('laws');
  if (tabSet)  tabSet.querySelector('span').textContent  = t('settings');
  var nameEl = document.getElementById('topbar-app-name');
  if (nameEl) nameEl.textContent = t('appName');
  document.title = t('appName');
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute('content', t('appDesc'));
  var metaApple = document.querySelector('meta[name="apple-mobile-web-app-title"]');
  if (metaApple) metaApple.setAttribute('content', t('appName'));
}

const PROFILE_KEY  = 'bv_profile_v1';
const ADDRESS_KEY  = 'bv_addresses_v1';

function formatFeatures(features) {
  const map = { hage:'Hage', frukt:'Frukt & bær', terrasse:'Terrasse', garasje:'Garasje',
    asfalt:'Asfalt', grus:'Grus', stein:'Belegningsstein', vedovn:'Vedovn/peis',
    varmepumpe:'Varmepumpe', brygge:'Brygge', snøfreser:'Snøfreser', motorsag:'Motorsag' };
  return (features || []).map(f => map[f] || f).join(', ');
}

function loadProfile() {
  try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || 'null'); }
  catch { return null; }
}
function saveProfile(p) {
  try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); } catch {}
}

/* ── Address management ── */
function loadAddresses() {
  try { return JSON.parse(localStorage.getItem(ADDRESS_KEY) || '[]'); }
  catch { return []; }
}
function saveAddresses(list) {
  try { localStorage.setItem(ADDRESS_KEY, JSON.stringify(list)); } catch {}
}
function genId() { return 'a' + Date.now() + Math.random().toString(36).slice(2,6); }

function addAddress(name, boligtype, profile) {
  const addr = { id: genId(), name, boligtype, profile: profile || null };
  APP.addresses.push(addr);
  saveAddresses(APP.addresses);
  return addr;
}
function deleteAddress(id) {
  APP.addresses = APP.addresses.filter(a => a.id !== id);
  saveAddresses(APP.addresses);
  if (APP.activeAddr === id) {
    const next = APP.addresses[0];
    if (next) switchAddress(next.id);
    else { APP.activeAddr = null; APP.tasks = []; }
  }
}
function switchAddress(id) {
  const addr = APP.addresses.find(a => a.id === id);
  if (!addr) return;
  APP.activeAddr = id;
  APP.boligtype  = addr.boligtype;
  APP.filter     = 'all';
  APP.expandedId = null;
  APP.profile    = addr.profile;
  // Load history scoped to this address
  const history = loadHistory();
  if (addr.profile) {
    APP.tasks = computeTasksForProfile(addr.profile).map(t => {
      const h = history[addr.id + '_' + t.id];
      if (h && h.lastDone) {
        const next = nextDueDate(t.interval, h.lastDone);
        return { ...t, due: next, done: false, lastDone: h.lastDone, doneCount: h.count || 1 };
      }
      return { ...t, done: false, lastDone: null, doneCount: 0 };
    });
  } else {
    APP.tasks = ALL_TASKS.filter(t => t.types.includes(addr.boligtype)).map(t => {
      const h = history[addr.id + '_' + t.id];
      if (h && h.lastDone) {
        const next = nextDueDate(t.interval, h.lastDone);
        return { ...t, due: next, done: false, lastDone: h.lastDone, doneCount: h.count || 1 };
      }
      return { ...t, done: false, lastDone: null, doneCount: 0 };
    });
  }
  // Save active address id
  try { localStorage.setItem('bv_active_addr', id); } catch {}
}

/* Override recordDone/undoRecord to be address-scoped */
function recordDone(taskId) {
  const h = loadHistory();
  const key = (APP.activeAddr || 'default') + '_' + taskId;
  h[key] = { lastDone: new Date().toISOString(), count: ((h[key] || {}).count || 0) + 1 };
  saveHistory(h);
}
function undoRecord(taskId) {
  const h = loadHistory();
  const key = (APP.activeAddr || 'default') + '_' + taskId;
  delete h[key];
  saveHistory(h);
}
