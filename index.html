function renderTaskCard(task) {
  var lang = (APP.locale && APP.locale.lang) || 'no';
  var UI = {
    sist:    { no:'Sist utf\u00f8rt', sv:'Senast utf\u00f6rd', da:'Sidst udf\u00f8rt', en:'Last done',       de:'Zuletzt erledigt',        nl:'Laatst gedaan' },
    totalt:  { no:'totalt',           sv:'totalt',              da:'i alt',            en:'total',            de:'gesamt',                   nl:'totaal' },
    marker:  { no:'Marker som utf\u00f8rt', sv:'Markera som utf\u00f6rd', da:'Marker som udf\u00f8rt', en:'Mark as done', de:'Als erledigt markieren', nl:'Markeer als gedaan' },
    angre:   { no:'Angre',            sv:'\u00c5ngra',          da:'Fortryd',          en:'Undo',             de:'R\u00fcckg\u00e4ngig',    nl:'Ongedaan' },
    utsett:  { no:'Utsett 1 uke',     sv:'Skjut upp 1 vecka',   da:'Udskyd 1 uge',     en:'Snooze 1 week',   de:'1 Woche verschieben',      nl:'1 week uitstellen' },
    tildel:  { no:'Tildel',           sv:'Tilldela',            da:'Tildel',           en:'Assign',           de:'Zuweisen',                 nl:'Toewijzen' },
    fagfolk: { no:'Fagfolk',          sv:'Fackfolk',            da:'Fagfolk',          en:'Tradesmen',        de:'Fachleute',                nl:'Vakman' },
    guide:   { no:'Guide',            sv:'Guide',               da:'Guide',            en:'Guide',            de:'Anleitung',                nl:'Gids' },
    sendHA:  { no:'Send til HA',      sv:'Skicka till HA',      da:'Send til HA',      en:'Send to HA',       de:'An HA senden',             nl:'Naar HA sturen' },
    repeats: { no:'Gjentar hvert',    sv:'Upprepas varje',      da:'Gentages hver',    en:'Repeats every',    de:'Wiederholt alle',          nl:'Herhaalt elke' },
    days:    { no:'dager',            sv:'dagar',               da:'dage',             en:'days',             de:'Tage',                     nl:'dagen' },
    month:   { no:'. m\u00e5ned',     sv:'. m\u00e5nad',        da:'. m\u00e5ned',     en:' mo.',             de:'. Monat',                  nl:'. maand' },
    year:    { no:'\u00e5r',          sv:'\u00e5r',             da:'\u00e5r',          en:'year',             de:'Jahr',                     nl:'jaar' },
    years:   { no:'. \u00e5r',        sv:'. \u00e5r',           da:'. \u00e5r',        en:' yr.',             de:'. Jahr',                   nl:'. jaar' },
  };
  function s(key) { return (UI[key] && (UI[key][lang] || UI[key].no)) || key; }

  var info = getDueInfo(task);
  var label = info.label, cls = info.cls, isOv = info.isOv, isSn = info.isSn;
  var isOpen = APP.expandedId === task.id;

  var lastDoneHtml = task.lastDone
    ? '<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--green);font-weight:500;">' +
        '<i class="ti ti-circle-check" style="font-size:13px;"></i>' +
        s('sist') + ' ' + fmtDate(new Date(task.lastDone)) +
        (task.doneCount > 1 ? ' \u00b7 ' + task.doneCount + '\u00d7 ' + s('totalt') : '') +
      '</span>'
    : '';

  var stepsHtml = task.steps
    ? '<ul class="steps-list">' + task.steps.map(function(step, i) {
        return '<li><span class="step-num">' + (i+1) + '</span><span>' + step + '</span></li>';
      }).join('') + '</ul>'
    : '';

  var iv = task.interval;
  var repeatText = iv < 30 ? iv + ' ' + s('days')
    : iv < 365 ? Math.round(iv/30) + s('month')
    : Math.round(iv/365) === 1 ? s('year') : Math.round(iv/365) + s('years');
  var nextLabel = '<span style="font-size:11px;color:var(--ink3);display:inline-flex;align-items:center;gap:3px;">' +
    '<i class="ti ti-refresh" style="font-size:12px;"></i>' + s('repeats') + ' ' + repeatText + '</span>';

  /* For non-Norwegian use the translated task title as search query */
  var isNorwegian = lang === 'no';
  var maQuery = isNorwegian && task.fagfolk && task.fagfolk.ma ? task.fagfolk.ma : task.title;
  var gQuery  = isNorwegian && task.fagfolk && task.fagfolk.g  ? task.fagfolk.g  : task.title;
  var ytQuery = isNorwegian && task.yt ? task.yt : task.title;
  var contractorSvc = getContractorService();

  var fagfolkBtns = task.fagfolk
    ? '<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);">' + s('fagfolk') + ':</span>' +
      '<a href="' + maUrl(maQuery) + '" target="_blank" class="act-btn act-ma" onclick="event.stopPropagation()"><i class="ti ti-tools"></i>' + contractorSvc.name + '</a>' +
      '<a href="' + gUrl(gQuery) + '" target="_blank" class="act-btn act-g" onclick="event.stopPropagation()"><i class="ti ti-search"></i>Google</a>' +
      '<div class="divider"></div>'
    : '';
  var ytBtn = task.yt
    ? '<a href="' + ytUrl(ytQuery) + '" target="_blank" class="act-btn act-yt" onclick="event.stopPropagation()"><i class="ti ti-brand-youtube"></i>' + s('guide') + '</a><div class="divider"></div>'
    : '';
  var haBtn = '<button class="act-btn act-ha" onclick="event.stopPropagation();haAction(' + task.id + ')"><i class="ti ti-smart-home"></i>' + s('sendHA') + '</button>';
  var angreBtn = task.lastDone
    ? '<div class="divider"></div><button class="act-btn" style="color:var(--ink3);" onclick="event.stopPropagation();undoTask(' + task.id + ')" title="' + s('angre') + '"><i class="ti ti-arrow-back-up"></i>' + s('angre') + '</button>'
    : '';

  var members = getMembers();
  var assignments = getAssignments();
  var assignedId = assignments[task.id];
  var assignedMember = assignedId ? members.find(function(m) { return m.id === assignedId; }) : null;
  var assignChip = members.length > 0
    ? '<button class="assign-chip ' + (assignedMember ? '' : 'unassigned') + '" ' +
        (assignedMember ? 'style="background:' + assignedMember.color + '"' : '') +
        ' onclick="event.stopPropagation();toggleAssignPicker(' + task.id + ',this)">' +
        '<i class="ti ti-user" style="font-size:11px;"></i>' +
        (assignedMember ? assignedMember.name : s('tildel')) +
      '</button>'
    : '';

  return '<div class="task-card' + (task.done?' is-done':'') + (isOv?' is-overdue':isSn?' is-soon':'') + '">' +
    '<div class="task-row" onclick="toggleExpand(' + task.id + ')">' +
      '<button class="check-btn' + (task.done?' done':'') + '" onclick="toggleDone(' + task.id + ',event)" title="' + (task.done ? s('angre') : s('marker')) + '"><i class="ti ti-check"></i></button>' +
      '<div class="task-info">' +
        '<div class="task-title">' +
          '<i class="ti ' + task.icon + '" style="font-size:14px;color:var(--ink3);"></i> ' +
          task.title +
          (task.fagfolk ? '<span class="fagfolk-chip"><i class="ti ti-hard-hat"></i>' + s('fagfolk') + '</span>' : '') +
        '</div>' +
        '<div class="task-meta">' +
          '<span class="cat-badge cat-' + task.cat + '">' + CAT_LABEL[task.cat] + '</span>' +
          '<span class="due-text ' + cls + '"><i class="ti ti-calendar"></i> ' + label + '</span>' +
          (lastDoneHtml || nextLabel) +
        '</div>' +
      '</div>' +
      (isOv ? '<button class="snooze-btn" onclick="snoozeTask(' + task.id + ',event)" title="' + s('utsett') + '"><i class="ti ti-clock-snooze"></i></button>' : '') +
      '<i class="ti ti-chevron-down task-chevron' + (isOpen?' open':'') + '"></i>' +
    '</div>' +
    '<div class="task-detail' + (isOpen?' open':'') + '" id="detail-' + task.id + '">' +
      (task.desc ? '<p class="detail-desc">' + task.desc + '</p>' : '') +
      stepsHtml +
      '<div class="action-bar">' + fagfolkBtns + ytBtn + haBtn + angreBtn + (assignChip ? '<div class="divider"></div>' + assignChip : '') + '<div class="divider"></div><button class="act-btn" style="color:var(--purple);" onclick="event.stopPropagation();openProjModalFromTask(' + task.id + ',\'' + task.title.replace(/'/g,"\\'") + '\',\'' + task.cat + '\')"><i class="ti ti-hammer"></i> ' + t('projAddTask') + '</button>' + '</div>' +
    '</div>' +
  '</div>';
}

════════════════════════════════════════ */
function toggleExpand(id) {
  APP.expandedId = APP.expandedId === id ? null : id;
  renderPage();
}
function toggleDone(id, e) {
  if (e && e.stopPropagation) e.stopPropagation();
  const task = APP.tasks.find(x => x.id === id);
  if (!task) return;
  if (!task.done) {
    recordDone(id);
    const key = (APP.activeAddr || 'default') + '_' + id;
    const h = loadHistory()[key];
    if (!h) return;
    task.done = true;
    task.lastDone = h.lastDone;
    task.doneCount = h.count;
    renderPage();
    setTimeout(() => {
      const next = nextDueDate(task.interval, task.lastDone);
      task.due = next;
      task.done = false;
      APP.expandedId = null;
      showToast(t('taskDone') + ' ' + fmtDate(next));
      renderPage();
    }, 1200);
  } else {
    undoTask(id);
  }
}
function undoTask(id) {
  const task = APP.tasks.find(x => x.id === id);
  if (!task) return;
  undoRecord(id);
  task.done = false;
  task.lastDone = null;
  task.doneCount = 0;
  const original = ALL_TASKS.find(x => x.id === id);
  if (original) task.due = original.due;
  showToast(t('taskUndone'));
  renderPage();
}
function snoozeTask(id, e) {
  e.stopPropagation();
  const task = APP.tasks.find(x => x.id === id);
  if (task) { task.due = addDays(7); showToast(t('taskSnoozed')); }
  renderPage();
}
function setFilter(f) {
  APP.filter = f;
  APP.expandedId = null;
  renderPage();
}
function changeType(type) {
  if (APP.profile) {
    APP.profile.boligtype = type;
    saveProfile(APP.profile);
    setTypeFromProfile(APP.profile);
  } else {
    setType(type);
  }
  renderPage();
}
function changeTypeSettings(type) {
  if (APP.profile) {
    APP.profile.boligtype = type;
    saveProfile(APP.profile);
    setTypeFromProfile(APP.profile);
  } else {
    setType(type);
  }
  renderInnstillinger();
}
function startSurveyFromSettings() {
  var profile = loadProfile();
  if (profile) {
    SV = {
      name:       profile.name       || '',
      location:   profile.location   || null,
      boligtype:  profile.boligtype  || '',
      alder:      profile.alder      || '',
      features:   [...(profile.features   || [])],
      etasjer:    profile.etasjer    || '',
      hvitevarer: [...(profile.hvitevarer || [])],
      erfaring:   profile.erfaring   || '',
      paaminelse: profile.paaminelse || '',
    };
  } else {
    SV = {};
  }

}

function updateHADot() {
  document.getElementById('ha-dot').classList.toggle('connected', APP.haConnected);
}
function setHAStatus(state, msg) {
  const el = document.getElementById('ha-status');
  if (!el) return;
  const cls = state === 'ok' ? 'sd-ok' : state === 'err' ? 'sd-err' : state === 'loading' ? 'sd-loading' : 'sd-idle';
  el.innerHTML = `<div class="status-dot ${cls}"></div><span>${msg}</span>`;
}
async function connectHA() {
  APP.haUrl   = (document.getElementById('ha-url')?.value || '').replace(/\/$/, '');
  APP.haToken = document.getElementById('ha-token')?.value || '';
  if (!APP.haUrl || !APP.haToken) { showToast(t('haFillFields'), false); return; }
  setHAStatus('loading', t('haConnecting'));
  try {
    const r = await fetch(APP.haUrl + '/api/', { headers: { Authorization: 'Bearer ' + APP.haToken } });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    APP.haConnected = true;
    showToast(t('haConnected') + ' ' + (d.location_name || 'Home Assistant'));
    renderInnstillinger();
  } catch(e) {
    APP.haConnected = false;
    setHAStatus('err', 'Feil: ' + e.message);
    showToast(t('haFailed'), false);
  }
  updateHADot();
}
function disconnectHA() {
  APP.haConnected = false;
  APP.haUrl = ''; APP.haToken = '';
  showToast(t('haDisconnected'));
  renderInnstillinger();
  updateHADot();
}
async function refreshSensors() {
  const grid = document.getElementById('sensor-grid');
  if (!grid) return;
  grid.innerHTML = '<div style="font-size:12px;color:var(--ink3)">Henter sensorer…</div>';
  const results = await Promise.all(SENSORS.map(async s => {
    try {
      const r = await fetch(APP.haUrl + '/api/states/' + s.entity, { headers: { Authorization: 'Bearer ' + APP.haToken } });
      if (!r.ok) return { ...s, na: true };
      const d = await r.json();
      return { ...s, state: d.state };
    } catch { return { ...s, na: true }; }
  }));
  const available = results.filter(s => !s.na && s.state !== 'unavailable');
  if (!available.length) {
    grid.innerHTML = '<div style="font-size:12px;color:var(--ink3);">' + t('haNoSensors') + '</div>';
    return;
  }
  grid.innerHTML = available.map(s => {
    let val, cls = '';
    if (s.goodState !== undefined) {
      const ok = s.state === s.goodState;
      val = ok ? s.goodLabel : s.badLabel;
      cls = ok ? 'sv-ok' : 'sv-err';
    } else {
      const n = parseFloat(s.state);
      val = isNaN(n) ? s.state : n.toFixed(1);
      if ((s.warnBelow && n < s.warnBelow) || (s.warnAbove && n > s.warnAbove)) cls = 'sv-err';
      else cls = 'sv-ok';
    }
    return `<div class="sensor-tile">
      <div class="sensor-tile-label"><i class="ti ${s.icon}"></i>${s.label}</div>
      <div class="sensor-tile-val ${cls}">${val}${s.unit ? '<span class="sv-unit"> ' + s.unit + '</span>' : ''}</div>
    </div>`;
  }).join('');
}
async function toggleAuto(id, btn) {
  APP.autoStates[id] = !APP.autoStates[id];
  btn.className = 'toggle-btn ' + (APP.autoStates[id] ? 'on' : 'off');
  if (!APP.haConnected) return;
  const svc = APP.autoStates[id] ? 'turn_on' : 'turn_off';
  try {
    await fetch(APP.haUrl + '/api/services/automation/' + svc, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + APP.haToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ entity_id: AUTO_ENTITY[id] })
    });
    showToast(APP.autoStates[id] ? t('haAutoToggled_on') : t('haAutoToggled_off'));
  } catch { showToast(t('haAutoError'), false); }
}
async function haAction(taskId) {
  if (!APP.haConnected) { showToast(t('haNotConn'), false); return; }
  const taskObj = APP.tasks.find(x => x.id === taskId);
  if (!taskObj) return;
  try {
    const r = await fetch(APP.haUrl + '/api/services/todo/add_item', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + APP.haToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        entity_id: 'todo.boligvedlikehold',
        item: taskObj.title,
        description: (taskObj.steps || []).join(' → '),
        due_date: taskObj.due.toISOString().split('T')[0]
      })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    showToast('"' + taskObj.title + '" ' + t('haSent'));
  } catch(e) { showToast(t('haError') + ' ' + e.message, false); }
}

function getKalTasks() {
  const v = document.getElementById('kal-velg')?.value || 'alle';
  if (v === 'overdue') return APP.tasks.filter(t => !t.done && t.due < TODAY);
  if (v === 'snart')   return APP.tasks.filter(t => !t.done && t.due >= TODAY && Math.floor((t.due - TODAY) / 864e5) <= 14);
  if (v === 'fagfolk') return APP.tasks.filter(t => t.fagfolk);
  return APP.tasks.filter(t => !t.done);
}
function exportGCal() {
  const tasks = getKalTasks();
  if (!tasks.length) { showToast(t('noTasks'), false); return; }
  const t = tasks[0];
  const s = new Date(t.due); s.setHours(9, 0, 0, 0);
  const e = new Date(s);     e.setHours(10, 0, 0, 0);
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('🏠 '+t.title)}&dates=${fmtICS(s)}/${fmtICS(e)}&details=${encodeURIComponent(t.desc||'')}`, '_blank');
  if (tasks.length > 1) showToast(t('calGoogleOne') + ' ' + tasks.length + ' ' + t('calGoogleSuffix'));
}
function exportICS() {
  const tasks = getKalTasks();
  if (!tasks.length) { showToast(t('noTasksShort'), false); return; }
  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Boligvedlikehold v0.0.011.a//NO\r\n';
  tasks.forEach(t => {
    const s = new Date(t.due); s.setHours(9, 0, 0, 0);
    const e = new Date(s);     e.setHours(10, 0, 0, 0);
    ics += `BEGIN:VEVENT\r\nUID:${t.id}-${Date.now()}@boligvedlikehold\r\nDTSTAMP:${fmtICS(new Date())}\r\nDTSTART:${fmtICS(s)}\r\nDTEND:${fmtICS(e)}\r\nSUMMARY:🏠 ${t.title}\r\nDESCRIPTION:${(t.desc||'').replace(/\n/g,'\\n')}\r\nEND:VEVENT\r\n`;
  });
  ics += 'END:VCALENDAR';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([ics], { type: 'text/calendar' }));
  a.download = 'boligvedlikehold.ics';
  a.click();
  showToast(tasks.length + ' ' + (tasks.length === 1 ? t('calExported') : t('calExportedPlural')));
}
function exportOutlook() {
  const tasks = getKalTasks();
  if (!tasks.length) { showToast('Ingen oppgaver.', false); return; }
  const t = tasks[0];
  const s = new Date(t.due); s.setHours(9, 0, 0, 0);
  const e = new Date(s);     e.setHours(10, 0, 0, 0);
  window.open(`https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent&subject=${encodeURIComponent('🏠 '+t.title)}&startdt=${s.toISOString()}&enddt=${e.toISOString()}&body=${encodeURIComponent(t.desc||'')}`, '_blank');
  if (tasks.length > 1) showToast(t('calGoogleOne') + ' ' + tasks.length + ' ' + t('calOutlookSuffix'));
}

function t(key) {
  var lang = (APP.locale && APP.locale.lang) || 'no';
  var map = STRINGS[lang] || STRINGS.no;
  return map[key] || STRINGS.no[key] || key;
}

function setLocale(lang, country) {
  APP.locale = { lang: lang, country: country };
  saveAppSettings();
  // Re-render everything with new locale
  renderPage();
  // Update nav tab labels
  updateNavLabels();
}

function updateNavLabels() {
  var tabHjem = document.getElementById('tab-hjem');
  var tabRen  = document.getElementById('tab-renovering');
  var tabJur  = document.getElementById('tab-juridisk');
  var tabSet  = document.getElementById('tab-innstillinger');
  if (tabHjem) tabHjem.querySelector('span').textContent = t('home');
  if (tabRen)  tabRen.querySelector('span').textContent  = t('projects');
  if (tabJur)  tabJur.querySelector('span').textContent  = t('laws');
  if (tabSet)  tabSet.querySelector('span').textContent  = t('settings');
  var nameEl = document.getElementById('topbar-app-name');
  if (nameEl) nameEl.textContent = t('appName');
  document.title = t('appName');
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute('content', t('appDesc'));
  var metaApple = document.querySelector('meta[name="apple-mobile-web-app-title"]');
  if (metaApple) metaApple.setAttribute('content', t('appName'));
}

const PROFILE_KEY  = 'bv_profile_v1';
const ADDRESS_KEY  = 'bv_addresses_v1';

function formatFeatures(features) {
  const map = { hage:'Hage', frukt:'Frukt & bær', terrasse:'Terrasse', garasje:'Garasje',
    asfalt:'Asfalt', grus:'Grus', stein:'Belegningsstein', vedovn:'Vedovn/peis',
    varmepumpe:'Varmepumpe', brygge:'Brygge', snøfreser:'Snøfreser', motorsag:'Motorsag' };
  return (features || []).map(f => map[f] || f).join(', ');
}

function loadProfile() {
  try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || 'null'); }
  catch { return null; }
}
function saveProfile(p) {
  try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); } catch {}
}

/* ── Address management ── */
function loadAddresses() {
  try { return JSON.parse(localStorage.getItem(ADDRESS_KEY) || '[]'); }
  catch { return []; }
}
function saveAddresses(list) {
  try { localStorage.setItem(ADDRESS_KEY, JSON.stringify(list)); } catch {}
}
function genId() { return 'a' + Date.now() + Math.random().toString(36).slice(2,6); }

function addAddress(name, boligtype, profile) {
  const addr = { id: genId(), name, boligtype, profile: profile || null };
  APP.addresses.push(addr);
  saveAddresses(APP.addresses);
  return addr;
}
function deleteAddress(id) {
  APP.addresses = APP.addresses.filter(a => a.id !== id);
  saveAddresses(APP.addresses);
  if (APP.activeAddr === id) {
    const next = APP.addresses[0];
    if (next) switchAddress(next.id);
    else { APP.activeAddr = null; APP.tasks = []; }
  }
}
function switchAddress(id) {
  const addr = APP.addresses.find(a => a.id === id);
  if (!addr) return;
  APP.activeAddr = id;
  APP.boligtype  = addr.boligtype;
  APP.filter     = 'all';
  APP.expandedId = null;
  APP.profile    = addr.profile;
  // Load history scoped to this address
  const history = loadHistory();
  if (addr.profile) {
    APP.tasks = computeTasksForProfile(addr.profile).map(t => {
      const h = history[addr.id + '_' + t.id];
      if (h && h.lastDone) {
        const next = nextDueDate(t.interval, h.lastDone);
        return { ...t, due: next, done: false, lastDone: h.lastDone, doneCount: h.count || 1 };
      }
      return { ...t, done: false, lastDone: null, doneCount: 0 };
    });
  } else {
    APP.tasks = ALL_TASKS.filter(t => t.types.includes(addr.boligtype)).map(t => {
      const h = history[addr.id + '_' + t.id];
      if (h && h.lastDone) {
        const next = nextDueDate(t.interval, h.lastDone);
        return { ...t, due: next, done: false, lastDone: h.lastDone, doneCount: h.count || 1 };
      }
      return { ...t, done: false, lastDone: null, doneCount: 0 };
    });
  }
  // Save active address id
  try { localStorage.setItem('bv_active_addr', id); } catch {}
}

/* Override recordDone/undoRecord to be address-scoped */
function recordDone(taskId) {
  const h = loadHistory();
  const key = (APP.activeAddr || 'default') + '_' + taskId;
  h[key] = { lastDone: new Date().toISOString(), count: ((h[key] || {}).count || 0) + 1 };
  saveHistory(h);
}
function undoRecord(taskId) {
  const h = loadHistory();
  const key = (APP.activeAddr || 'default') + '_' + taskId;
  delete h[key];
  saveHistory(h);
}

/* Survey location helpers */
async function surveySearchLocation() {
  var input = document.getElementById('survey-loc-input');
  var status = document.getElementById('survey-loc-status');
  var q = (input && input.value || '').trim();
  if (!q) { if (status) status.textContent = 'Skriv inn et stednavn først.'; return; }
  if (status) status.textContent = '🔍 Søker etter «' + q + '»…';
  var loc = await geocodeCity(q);
  if (loc) {
    SV.location = { lat: loc.lat, lon: loc.lon, name: loc.name };
    renderSurveyStep();
  } else {
    if (status) status.textContent = 'Fant ikke «' + q + '». Prøv et annet navn.';
  }
}

function surveyDetectGPS() {
  var status = document.getElementById('survey-loc-status');
  if (!navigator.geolocation) {
    if (status) status.textContent = 'GPS er ikke tilgjengelig i denne nettleseren.';
    return;
  }
  if (status) status.textContent = '📍 Henter GPS-posisjon…';
  navigator.geolocation.getCurrentPosition(
    async function(pos) {
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;
      if (status) status.textContent = '✓ Posisjon funnet – slår opp stednavn…';
      try {
        var r = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lon, {
          headers: { 'User-Agent': 'Boligvedlikehold/0.0.003.a' }
        });
        var j = await r.json();
        var name = (j.address && (j.address.city || j.address.town || j.address.village)) || (lat.toFixed(2) + ', ' + lon.toFixed(2));
        SV.location = { lat: lat, lon: lon, name: name };
        renderSurveyStep();
      } catch(e) {
        SV.location = { lat: lat, lon: lon, name: lat.toFixed(3) + ', ' + lon.toFixed(3) };
        renderSurveyStep();
      }
    },
    function(err) {
      if (status) status.textContent = 'Kunne ikke hente posisjon: ' + err.message;
    }
  );
}

function openSurvey() {
  SV = {};
  surveyStep = 0;
  document.getElementById('survey-overlay').style.display = 'block';
  document.getElementById('survey-overlay').scrollTop = 0;
  renderSurveyStep();
}
function closeSurvey() {
  document.getElementById('survey-overlay').style.display = 'none';
}

function renderSurveyStep() {
  const total = SURVEY_STEPS.length - 2; // exclude intro+done from count
  const step = SURVEY_STEPS[surveyStep];
  const progressPct = surveyStep === 0 ? 0
    : surveyStep >= SURVEY_STEPS.length - 1 ? 100
    : Math.round(((surveyStep - 1) / total) * 100);

  document.getElementById('survey-progress-fill').style.width = progressPct + '%';
  document.getElementById('survey-back').style.display = surveyStep === 0 ? 'none' : '';
  const nextBtn = document.getElementById('survey-next');

  let html = '';

  if (step.type === 'intro') {
    nextBtn.innerHTML = 'Kom i gang <i class="ti ti-arrow-right"></i>';
    nextBtn.disabled = false;
    html = `
      <div class="survey-intro">
        <div class="survey-intro-icon"><i class="ti ti-home"></i></div>
        <h1>Velkommen til Boligvedlikehold</h1>
        <p>Vi stiller deg noen raske spørsmål for å sette opp en personlig vedlikeholdsplan tilpasset akkurat din bolig.</p>
        <div class="survey-intro-meta">
          <span><i class="ti ti-clock" style="font-size:14px;"></i> Ca. 2 minutter</span>
          <span><i class="ti ti-list-check" style="font-size:14px;"></i> ${total} spørsmål</span>
          <span><i class="ti ti-lock" style="font-size:14px;"></i> Lagres lokalt</span>
        </div>
      </div>`;
  }
  else if (step.type === 'text') {
    const val = SV[step.key] || '';
    nextBtn.innerHTML = 'Neste <i class="ti ti-arrow-right"></i>';
    nextBtn.disabled = false;
    html = `
      <div class="survey-step-num">Spørsmål 1 av ${total}</div>
      <div class="survey-question">${step.question}</div>
      <div class="survey-hint">${step.hint}</div>
      <input class="survey-name-input" id="survey-text-input" type="text"
        placeholder="${step.placeholder}" value="${val}"
        oninput="SV['${step.key}'] = this.value"
        onkeydown="if(event.key==='Enter') surveyNext()"

function selectSingle(key, val) {
  SV[key] = val;
  document.getElementById('survey-next').disabled = false;
  // Re-render options only (toggle selected class)
  const step = SURVEY_STEPS[surveyStep];
  document.querySelectorAll('.survey-option').forEach((btn, i) => {
    const isSelected = step.options[i].val === val;
    btn.classList.toggle('selected', isSelected);
  });
  // Auto-advance — but NOT if the next step is 'done' (let user see done screen by clicking)
  const nextStep = SURVEY_STEPS[surveyStep + 1];
  if (nextStep && nextStep.type !== 'done') {
    setTimeout(() => surveyNext(), 280);
  }
}

function toggleMulti(key, val) {
  if (!SV[key]) SV[key] = [];
  const idx = SV[key].indexOf(val);
  if (idx === -1) SV[key].push(val);
  else SV[key].splice(idx, 1);
  // Re-render buttons
  const step = SURVEY_STEPS[surveyStep];
  document.querySelectorAll('.survey-option').forEach((btn, i) => {
    btn.classList.toggle('selected', SV[key].includes(step.options[i].val));
  });
}

function surveyNext() {
  const step = SURVEY_STEPS[surveyStep];

  // Validate
  if (step.type === 'text' && step.key === 'name') {
    // Name is optional — allow empty
  }
  if (step.type === 'single' && !SV[step.key]) {
    const area = document.getElementById('survey-step-area');
    area.classList.remove('survey-shake');
    void area.offsetWidth;
    area.classList.add('survey-shake');
    return;
  }

  if (step.type === 'done') {
    // Finish survey — save profile, create address entry, show hjem
    var profile = buildProfile();
    saveProfile(profile);
    APP.profile = profile;
    // Create address for this profile — include location if provided
    var addrName = profile.name || 'Hjemme';
    var newAddr = addAddress(addrName, profile.boligtype, profile);
    // Attach weather location if user entered one
    if (profile.location && profile.location.lat) {
      newAddr.lat      = profile.location.lat;
      newAddr.lon      = profile.location.lon;
      newAddr.cityName = profile.location.name;
      saveAddresses(APP.addresses);
    }
    APP.addresses = loadAddresses();
    switchAddress(newAddr.id);
    navigate('hjem');
    closeSurvey();
    showToast(t('welcome') + (profile.name ? ', ' + profile.name : '') + '! ' + APP.tasks.length + ' ' + t('tasksReady'));
    // Trigger weather load immediately
    if (newAddr.lat) loadWeatherForCurrentAddr();
    return;
  }

  surveyStep = Math.min(surveyStep + 1, SURVEY_STEPS.length - 1);
  renderSurveyStep();
}

function surveyBack() {
  if (surveyStep === 0) return;
  surveyStep--;
  renderSurveyStep();
}

function buildProfile() {
  return {
    name:        SV.name        || '',
    boligtype:   SV.boligtype   || 'enebolig',
    alder:       SV.alder       || 'middel',
    features:    SV.features    || [],
    etasjer:     SV.etasjer     || '2',
    hvitevarer:  SV.hvitevarer  || [],
    erfaring:    SV.erfaring    || 'middels',
    paaminelse:  SV.paaminelse  || 'normal',
    location:    SV.location    || null,
    completedAt: new Date().toISOString(),
  };
}

function computeTasksForProfile(profile) {
  const type = profile.boligtype || 'enebolig';
  const features = profile.features || [];
  const hvitevarer = profile.hvitevarer || [];

  return ALL_TASKS.filter(t => {
    if (!t.types.includes(type)) return false;

    // Feature-gated categories
    if (t.cat === 'frukt'    && !features.includes('frukt'))     return false;
    if (t.cat === 'uteareal') {
      const hasAny = features.some(f => ['asfalt','grus','stein'].includes(f));
      if (!hasAny) return false;
      // Asfalt-specific tasks
      if ([90,91,97].includes(t.id) && !features.includes('asfalt')) return false;
      // Grus-specific
      if (t.id === 93 && !features.includes('grus'))               return false;
      // Belegningsstein
      if (t.id === 94 && !features.includes('stein'))              return false;
    }
    if (t.cat === 'hage' && !features.includes('hage'))           return false;

    // Brygge
    if (t.id === 74 && !features.includes('brygge'))              return false;

    // Vedovn / pipe
    if (t.id === 20 && !features.includes('vedovn'))              return false;
    if (t.id === 75 && !features.includes('vedovn'))              return false;

    // Varmepumpe
    if (t.id === 14 && !features.includes('varmepumpe'))          return false;

    // Snøfreser
    if (t.id === 53 && !features.includes('snøfreser'))           return false;

    // Motorsag
    if (t.id === 51 && !features.includes('motorsag'))            return false;

    // Garasje
    if (t.id === 34 && !features.includes('garasje'))             return false;

    // Hvitevarer filtering
    if (t.id === 61 && !hvitevarer.includes('oppvask'))           return false;
    if (t.id === 62 && !hvitevarer.includes('vaskemaskin'))        return false;
    if (t.id === 66 && !hvitevarer.includes('tørketrommel'))       return false;
    if (t.id === 63 && !hvitevarer.includes('kaffemaskin'))        return false;
    if (t.id === 60 && !hvitevarer.includes('fryser'))             return false;
    if (t.id === 11 && !hvitevarer.includes('ventilasjon'))        return false;

    return true;
  });
}

function setTypeFromProfile(profile) {
  APP.profile = profile;
  APP.boligtype = profile.boligtype;
  APP.filter = 'all';
  APP.expandedId = null;
  const history = loadHistory();
  APP.tasks = computeTasksForProfile(profile).map(t => {
    const h = history[t.id];
    if (h && h.lastDone) {
      const next = nextDueDate(t.interval, h.lastDone);
      return { ...t, due: next, done: false, lastDone: h.lastDone, doneCount: h.count || 1 };
    }
    return { ...t, done: false, lastDone: null, doneCount: 0 };
  });
  saveAppSettings();
}

function saveAddrModal() {
  var name = (document.getElementById('addr-name-input').value || '').trim();
  if (!name) { document.getElementById('addr-name-input').focus(); return; }
  var cityInput = (document.getElementById('addr-city-input').value || '').trim();

  async function doSave(lat, lon, cityName) {
    if (_addrEditId) {
      var addr = APP.addresses.find(function(a) { return a.id === _addrEditId; });
      if (addr) {
        addr.name = name;
        addr.boligtype = _addrModalType;
        if (lat) { addr.lat = lat; addr.lon = lon; addr.cityName = cityName; }
        saveAddresses(APP.addresses);
        if (_addrEditId === APP.activeAddr) {
          APP.boligtype = _addrModalType;
          switchAddress(_addrEditId);
        }
      }
    } else {
      var newAddr = addAddress(name, _addrModalType, null);
      if (lat) {
        newAddr.lat = lat; newAddr.lon = lon; newAddr.cityName = cityName;
        saveAddresses(APP.addresses);
      }
      switchAddress(newAddr.id);
    }
    closeAddrModal();
    renderPage();
    if (APP.page === 'innstillinger') renderInnstillinger();
    showToast(_addrEditId ? t('addrUpdated') : '"' + name + '" ' + t('addrAdded'));
    // Trigger weather load
    loadWeatherForCurrentAddr();
  }

  // Try to get location: GPS detected > city input > no location
  if (_detectedLoc) {
    doSave(_detectedLoc.lat, _detectedLoc.lon, _detectedLoc.name);
    _detectedLoc = null;
  } else if (cityInput) {
    var statusEl = document.getElementById('loc-status');
    if (statusEl) statusEl.textContent = 'Søker etter ' + cityInput + '…';
    geocodeCity(cityInput).then(function(loc) {
      if (loc) doSave(loc.lat, loc.lon, loc.name);
      else doSave(null, null, null);
    });
  } else {
    doSave(null, null, null);
  }
}

/* ════════════════════════════════════════
   CLOUD SYNC  (JSONBin.io free tier)
   Each address with sharing enabled gets
   a bin. Members read/write via master key.
════════════════════════════════════════ */
const JSONBIN_BASE = 'https://api.jsonbin.io/v3';
const JSONBIN_KEY  = '$2a$10$bvFreePublicKeyPlaceholder'; // replaced per-bin

var _syncTimer = null;
var _syncState = 'idle'; // idle | syncing | ok | err

function getSyncMeta() {
  try { return JSON.parse(localStorage.getItem('bv_sync_' + APP.activeAddr) || 'null'); }
  catch { return null; }
}
function saveSyncMeta(meta) {
  try { localStorage.setItem('bv_sync_' + APP.activeAddr, JSON.stringify(meta)); } catch {}
}

// Build the cloud payload for the current address
function buildCloudPayload() {
  var h = loadHistory();
  var addrHistory = {};
  Object.keys(h).forEach(function(k) {
    if (k.startsWith(APP.activeAddr + '_')) addrHistory[k] = h[k];
  });
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  return {
    addrId:    APP.activeAddr,
    members:   (addr && addr.members) || [],
    assignments: (addr && addr.assignments) || {},
    history:   addrHistory,
    updatedAt: new Date().toISOString(),
  };
}

// Merge incoming cloud data into local state
function mergeCloudPayload(payload) {
  if (!payload || !payload.addrId) return;
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  if (!addr) return;

  // Merge members
  addr.members = payload.members || [];
  addr.assignments = payload.assignments || {};
  saveAddresses(APP.addresses);

  // Merge history (take latest lastDone per key)
  var h = loadHistory();
  var incoming = payload.history || {};
  Object.keys(incoming).forEach(function(k) {
    if (!h[k] || new Date(incoming[k].lastDone) > new Date((h[k]||{}).lastDone||0)) {
      h[k] = incoming[k];
    }
  });
  saveHistory(h);
}

async function pushToCloud() {
  var meta = getSyncMeta();
  if (!meta || !meta.binId || !meta.apiKey) return false;
  _syncState = 'syncing';
  updateSyncUI();
  try {
    var payload = buildCloudPayload();
    var r = await fetch(JSONBIN_BASE + '/b/' + meta.binId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': meta.apiKey },
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    _syncState = 'ok';
    updateSyncUI();
    return true;
  } catch(e) {
    _syncState = 'err';
    updateSyncUI();
    return false;
  }
}

async function pullFromCloud() {
  var meta = getSyncMeta();
  if (!meta || !meta.binId || !meta.apiKey) return false;
  _syncState = 'syncing';
  updateSyncUI();
  try {
    var r = await fetch(JSONBIN_BASE + '/b/' + meta.binId + '/latest', {
      headers: { 'X-Master-Key': meta.apiKey },
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var data = await r.json();
    mergeCloudPayload(data.record);
    // Reload tasks with fresh history
    switchAddress(APP.activeAddr);
    _syncState = 'ok';
    updateSyncUI();
    renderPage();
    return true;
  } catch(e) {
    _syncState = 'err';
    updateSyncUI();
    return false;
  }
}

async function createBin(apiKey) {
  var r = await fetch(JSONBIN_BASE + '/b', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey, 'X-Bin-Private': 'false' },
    body: JSON.stringify({ addrId: APP.activeAddr, members: [], assignments: {}, history: {} }),
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  var data = await r.json();
  return data.metadata.id;
}

// Generate a short human-friendly room code from bin ID
function binToCode(binId) {
  // Take last 6 chars uppercase
  return binId.slice(-6).toUpperCase();
}
function codeToBinSearch(code) {
  return code.toLowerCase();
}

function updateSyncUI() {
  var dots = document.querySelectorAll('.sync-dot');
  var labels = document.querySelectorAll('.sync-label');
  var cls = _syncState === 'ok' ? 'ok' : _syncState === 'err' ? 'err' : _syncState === 'syncing' ? 'syncing' : 'idle';
  var lbl = _syncState === 'ok' ? 'Synkronisert' : _syncState === 'err' ? 'Synkfeil – sjekk nett' : _syncState === 'syncing' ? 'Synkroniserer…' : 'Ikke synkronisert';
  dots.forEach(function(d) { d.className = 'sync-dot ' + cls; });
  labels.forEach(function(l) { l.textContent = lbl; });
}

function schedulePush() {
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function() { pushToCloud(); }, 2000);
}

/* ════════════════════════════════════════
   MEMBER MANAGEMENT
════════════════════════════════════════ */
var MEMBER_COLORS = ['#2A6E3F','#1A4F8A','#8A2A4A','#C96A00','#5A3F9A','#1A7A7A','#8A5A1A','#4A42A8'];

function getMembers() {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  return (addr && addr.members) || [];
}

function getAssignments() {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  return (addr && addr.assignments) || {};
}

function addMember(name) {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  if (!addr) return;
  if (!addr.members) addr.members = [];
  var color = MEMBER_COLORS[addr.members.length % MEMBER_COLORS.length];
  var member = { id: genId(), name: name, color: color, isMe: addr.members.length === 0 };
  addr.members.push(member);
  saveAddresses(APP.addresses);
  schedulePush();
  return member;
}

function removeMember(memberId) {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  if (!addr || !addr.members) return;
  addr.members = addr.members.filter(function(m) { return m.id !== memberId; });
  // Unassign tasks assigned to this member
  if (addr.assignments) {
    Object.keys(addr.assignments).forEach(function(k) {
      if (addr.assignments[k] === memberId) delete addr.assignments[k];
    });
  }
  saveAddresses(APP.addresses);
  schedulePush();
}

async function doCreateRoom() {
  var apiKey = (document.getElementById('jb-key-input').value || '').trim();
  var myName = (document.getElementById('jb-name-input').value || '').trim();
  if (!apiKey || !myName) { showToast(t('shareFillFields'), false); return; }
  showToast(t('shareCreating'));
  try {
    var binId = await createBin(apiKey);
    saveSyncMeta({ binId: binId, apiKey: apiKey });
    // Add self as first member
    addMember(myName);
    // Mark first member as "me"
    var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
    if (addr && addr.members && addr.members[0]) addr.members[0].isMe = true;
    saveAddresses(APP.addresses);
    await pushToCloud();
    _shareStep = 'created';
    renderShareModal();
    showToast(t('shareCreated'));
  } catch(e) {
    showToast(t('shareError') + ' ' + e.message + ' ' + t('shareKeyError'), false);
  }
}

async function doJoinRoom() {
  var code   = (document.getElementById('jb-code-input').value || '').trim().toUpperCase();
  var apiKey = (document.getElementById('jb-key-input').value || '').trim();
  var myName = (document.getElementById('jb-name-input').value || '').trim();
  if (!code || !apiKey || !myName) { showToast(t('shareFillAll'), false); return; }

  showToast(t('shareConnecting'));
  try {
    // Search for a bin matching the code suffix
    // JSONBin free: we store binId = last 6 chars is the code
    // User must enter full binId or we search — simplest: ask user to enter binId directly
    // We treat the 6-char code as the last 6 chars of the binId
    // Fetch bins list
    var r = await fetch(JSONBIN_BASE + '/b', { headers: { 'X-Master-Key': apiKey } });
    if (!r.ok) throw new Error('HTTP ' + r.status + ' – sjekk API-nøkkelen');
    var data = await r.json();
    var bins = data || [];
    var match = bins.find(function(b) { return b.id && b.id.toUpperCase().endsWith(code); });
    if (!match) throw new Error('Fant ikke rom med kode ' + code);
    saveSyncMeta({ binId: match.id, apiKey: apiKey });
    // Pull data from cloud
    await pullFromCloud();
    // Add self as member
    addMember(myName);
    var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
    var newMember = addr && addr.members && addr.members[addr.members.length - 1];
    if (newMember) newMember.isMe = true;
    saveAddresses(APP.addresses);
    await pushToCloud();
    _shareStep = 'menu';
    renderShareModal();
    showToast(t('shareConnected') + ' ' + code + '!');
  } catch(e) {
    showToast('Feil: ' + e.message, false);
  }
}

function addMemberFromInput() {
  var input = document.getElementById('new-member-input');
  if (!input) return;
  var name = (input.value || '').trim();
  if (!name) return;
  addMember(name);
  renderShareModal();

  showToast('"' + name + '" ' + t('memberAdded'));
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(function() {
    showToast(t('codeCopied') + ' ' + code);
  }).catch(function() {
    showToast(t('codeIs') + ' ' + code);
  });
}

  var rect = anchorEl.getBoundingClientRect();
  picker.style.position = 'fixed';
  picker.style.top = (rect.bottom + 4) + 'px';
  picker.style.left = rect.left + 'px';
  document.body.appendChild(picker);

    document.addEventListener('click', function closePicker(e) {
      if (!picker.contains(e.target)) {
        picker.remove(); _pickerOpen = null;
        document.removeEventListener('click', closePicker);
      }

  }, 10);

var WMO_ICONS = {
  clearsky_day:'☀️', clearsky_night:'🌙', clearsky_polartwilight:'🌅',
  fair_day:'🌤', fair_night:'🌙', fair_polartwilight:'🌤',
  partlycloudy_day:'⛅', partlycloudy_night:'☁️', partlycloudy_polartwilight:'⛅',
  cloudy:'☁️',
  lightrainshowers_day:'🌦', lightrainshowers_night:'🌧', lightrainshowers_polartwilight:'🌦',
  rainshowers_day:'🌧', rainshowers_night:'🌧',
  heavyrainshowers_day:'⛈', heavyrainshowers_night:'⛈',
  lightrain:'🌦', rain:'🌧', heavyrain:'⛈',
  lightsleet:'🌨', sleet:'🌨', heavysleet:'❄️',
  lightsnow:'🌨', snow:'❄️', heavysnow:'❄️',

};

function weatherIcon(symbolCode) {
  return WMO_ICONS[symbolCode] || '🌡';
}

// Outdoor-relevant tasks categories
var OUTDOOR_CATS = ['utvendig', 'hage', 'maling', 'uteareal', 'frukt', 'hytte'];

async function fetchWeatherForAddr(addr) {
  if (!addr || !addr.lat || !addr.lon) return null;
  var cacheKey = addr.id;
  var cached = _weatherCache[cacheKey];
  // Use cached data if less than 1 hour old
  if (cached && (Date.now() - cached.fetchedAt) < 3600000) return cached.data;

  try {
    var url = 'https://api.met.no/weatherapi/locationforecast/2.0/compact' +
      '?lat=' + addr.lat.toFixed(4) + '&lon=' + addr.lon.toFixed(4);
    var r = await fetch(url, {
      headers: { 'User-Agent': 'Boligvedlikehold/0.0.002.a (contact@boligvedlikehold.no)' }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var json = await r.json();
    _weatherCache[cacheKey] = { data: json, fetchedAt: Date.now() };
    return json;
  } catch(e) {
    console.warn('Weather fetch failed:', e.message);
    return null;
  }
}

function parseDailyForecast(weatherJson) {
  if (!weatherJson || !weatherJson.properties) return [];
  var timeseries = weatherJson.properties.timeseries;
  var days = {};

  timeseries.forEach(function(ts) {
    var date = ts.time.slice(0, 10);
    var hour = parseInt(ts.time.slice(11, 13));
    if (!days[date]) days[date] = { date: date, temps: [], rain: 0, symbol: null };
    var instant = ts.data.instant.details;
    days[date].temps.push(instant.air_temperature);
    if (ts.data.next_6_hours) {
      var details = ts.data.next_6_hours.details;
      days[date].rain += (details.precipitation_amount || 0);
      if (hour === 12 && ts.data.next_6_hours.summary) {
        days[date].symbol = ts.data.next_6_hours.summary.symbol_code;
      }
    }
    if (!days[date].symbol && ts.data.next_1_hours && ts.data.next_1_hours.summary) {
      days[date].symbol = ts.data.next_1_hours.summary.symbol_code;
    }
  });

  return Object.values(days).slice(0, 7).map(function(d) {
    return {
      date:   d.date,
      min:    Math.round(Math.min.apply(null, d.temps)),
      max:    Math.round(Math.max.apply(null, d.temps)),
      rain:   Math.round(d.rain * 10) / 10,
      symbol: d.symbol || 'cloudy',
    };
  });
}

  var lang = (APP.locale && APP.locale.lang) || 'no';
  var TR = {
    no: {
      perfectPaint: '☀️ <strong>Perfekt maleruke!</strong> Tørt og mildt 5+ dager – ideelt for maling av fasade, terrasse og vinduer.',
      goodOutdoor:  '🌤 <strong>Bra uke for utearbeid.</strong> Pent vær de fleste dagene – god tid for hagearbeid, husvasking og utvendige oppgaver.',
      rainWash:     '🌧 <strong>Vaske huset?</strong> Overskyet og regnfull uke – la regnet ta den grove vasken, men unngå maling og beis.',
      avoidPaint:   '🚫 <strong>Unngå maling og beis.</strong> For kaldt (under 10 °C) eller regnvær gjør at malingen ikke tørker riktig.',
      frostWarns:   '❄️ <strong>Frostnatt!</strong> Temperaturer under 0 °C – steng utvendige vannuttak og beskytt sårbare planter.',
      mowGood:      '✂️ <strong>Bra uke for plenklipping.</strong> Tørt og mildt – gresset er klart for klipping.',
      stormy:       '💨 <strong>Unngå høyt arbeid denne uken.</strong> Sterk vind gjør stiger og takarbeid farlig.',
    },
    sv: {
      perfectPaint: '☀️ <strong>Perfekt målarvecka!</strong> Torrt och mildt 5+ dagar – idealiskt för målning av fasad, terrass och fönster.',
      goodOutdoor:  '🌤 <strong>Bra vecka för utomhusarbete.</strong> Fint väder de flesta dagarna – bra tid för trädgårdsarbete och utvändiga uppgifter.',
      rainWash:     '🌧 <strong>Tvätta huset?</strong> Mulet och regnig vecka – låt regnet ta den grova tvätten, men undvik målning.',
      avoidPaint:   '🚫 <strong>Undvik målning och betsning.</strong> För kallt (under 10°C) eller regn gör att färgen inte torkar ordentligt.',
      frostWarns:   '❄️ <strong>Frostrisk!</strong> Temperaturer under 0°C – stäng av utomhuskranar och skydda känsliga växter.',
      mowGood:      '✂️ <strong>Bra vecka för gräsklippning.</strong> Torrt och mildt – gräset är klart för klippning.',
      stormy:       '💨 <strong>Undvik höga arbeten denna veckan.</strong> Hård vind gör stegar och takarbete farligt.',
    },
    en: {
      perfectPaint: '☀️ <strong>Perfect painting week!</strong> Dry and mild for 5+ days – ideal for painting facades, decking and windows.',
      goodOutdoor:  '🌤 <strong>Good week for outdoor work.</strong> Nice weather most days – great time for gardening, house washing and exterior tasks.',
      rainWash:     '🌧 <strong>Washing the house?</strong> Overcast and rainy week – let the rain do the rough cleaning, but avoid painting and staining.',
      avoidPaint:   '🚫 <strong>Avoid painting and staining.</strong> Too cold (below 10°C) or rain means the paint will not dry properly.',
      frostWarns:   '❄️ <strong>Frost warning!</strong> Temperatures below 0°C – shut off outdoor taps and protect vulnerable plants.',
      mowGood:      '✂️ <strong>Good week for mowing.</strong> Dry and mild – the lawn is ready for cutting.',
      stormy:       '💨 <strong>Avoid working at height this week.</strong> Strong winds make ladders and roof work dangerous.',
    },
  };
  var M = TR[lang] || TR.no;

  var hasOutdoorTasks = tasks && tasks.some(function(t) {
    return OUTDOOR_CATS.includes(t.cat) && !t.done;
  });
  if (!hasOutdoorTasks || days.length === 0) return [];

  // Analyse week
  var dryDays    = days.filter(function(d) { return d.rain < 1; }).length;
  var coldDays   = days.filter(function(d) { return d.max < 10; }).length;
  var frostNights= days.filter(function(d) { return d.min < 0; }).length;
  var rainyDays  = days.filter(function(d) { return d.rain > 5; }).length;
  var windyDays  = days.filter(function(d) { return (d.symbol||'').includes('thunder') || (d.symbol||'').includes('heavy'); }).length;
  var avgMax     = Math.round(days.reduce(function(s,d) { return s + d.max; }, 0) / days.length);

  // Perfect painting window
  if (dryDays >= 5 && coldDays === 0) {
    tips.push({ type:'good', icon:'ti-paint', text: M.perfectPaint });
  } else if (dryDays >= 3 && coldDays === 0) {
    tips.push({ type:'good', icon:'ti-sun', text: M.goodOutdoor });
  }

  // Rainy — good for house washing, bad for painting
  if (rainyDays >= 3 && coldDays < 3) {
    tips.push({ type:'info', icon:'ti-droplet', text: M.rainWash });
  }

  // Too cold or rainy for painting
  if ((coldDays >= 4 || rainyDays >= 4) && dryDays < 3) {
    tips.push({ type:'warn', icon:'ti-paint-off', text: M.avoidPaint });
  }

  // Frost warning
  if (frostNights >= 2) {
    tips.push({ type:'bad', icon:'ti-snowflake', text: M.frostWarns });
  }

  // Good mowing week
  var hasMowing = tasks && tasks.some(function(t) { return t.id === 40 && !t.done; });
  if (hasMowing && dryDays >= 4 && avgMax >= 12) {
    tips.push({ type:'good', icon:'ti-cut', text: M.mowGood });
  }

  // Stormy / dangerous for height work
  if (windyDays >= 2) {
    tips.push({ type:'warn', icon:'ti-ladder', text: M.stormy });
  }

  return tips.slice(0, 3);
}

function dayLabel(dateStr, idx, lang) {
  var labels = {
    no: ['Man','Tir','Ons','Tor','Fre','Lør','Søn'],
    sv: ['Mån','Tis','Ons','Tor','Fre','Lör','Sön'],
    da: ['Man','Tir','Ons','Tor','Fre','Lør','Søn'],
    en: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
    de: ['Mo','Di','Mi','Do','Fr','Sa','So'],
    nl: ['Ma','Di','Wo','Do','Vr','Za','Zo'],
  };
  var todayWord = { no:'I dag', sv:'I dag', da:'I dag', en:'Today', de:'Heute', nl:'Vandaag' };
  if (idx === 0) return todayWord[lang] || 'I dag';
  var d = new Date(dateStr + 'T12:00:00');
  return (labels[lang] || labels.no)[d.getDay()];
}

    '<div class="weather-header" onclick="toggleWeather(\'' + addrId + '\')">' +
      '<div class="weather-location"><i class="ti ti-map-pin"></i>' + locName + '</div>' +

        '<i class="ti ti-chevron-down weather-chevron' + (isOpen?' open':'') + '"></i>' +
      '</div>' +
    '</div>' +
    (isOpen
      ? '<div class="weather-body">' +
          '<div class="weather-days">' + daysHtml + '</div>' +
          (tipsHtml ? '<div class="weather-tips">' + tipsHtml + '</div>' : '') +
        '</div>'

}

function toggleWeather(addrId) {
  _weatherOpen[addrId] = !_weatherOpen[addrId];

}

async function loadWeatherForCurrentAddr() {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  if (!addr || !addr.lat || !addr.lon) return null;
  var data = await fetchWeatherForAddr(addr);
  if (!data) return null;
  var days = parseDailyForecast(data);
  var tips = generateWeatherTips(days, APP.tasks);
  // Re-render so weather appears
  renderPage();
  return { days: days, tips: tips };
}

// Geocode city name using Nominatim (free, no key needed)
async function geocodeCity(cityName) {
  try {
    var r = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' +
      encodeURIComponent(cityName) + '&limit=1', {
      headers: { 'User-Agent': 'Boligvedlikehold/0.0.002.a' }
    });
    if (!r.ok) return null;
    var results = await r.json();
    if (!results.length) return null;
    return { lat: parseFloat(results[0].lat), lon: parseFloat(results[0].lon), name: results[0].display_name.split(',')[0] };
  } catch(e) { return null; }
}

function detectLocation() {
  var status = document.getElementById('loc-status');
  if (!navigator.geolocation) {
    if (status) status.textContent = 'GPS ikke tilgjengelig i denne nettleseren.';
    return;
  }
  if (status) status.textContent = '📍 Henter posisjon…';
  navigator.geolocation.getCurrentPosition(
    async function(pos) {
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;
      // Reverse geocode
      try {
        var r = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lon, {
          headers: { 'User-Agent': 'Boligvedlikehold/0.0.002.a' }
        });
        var j = await r.json();
        var name = (j.address && (j.address.city || j.address.town || j.address.village)) || lat.toFixed(2) + ',' + lon.toFixed(2);
        _detectedLoc = { lat: lat, lon: lon, name: name };
        var inp = document.getElementById('addr-city-input');
        if (inp) inp.value = name;
        if (status) status.textContent = '✓ Posisjon funnet: ' + name;
      } catch(e) {
        _detectedLoc = { lat: lat, lon: lon, name: 'Min posisjon' };
        if (status) status.textContent = '✓ GPS-posisjon hentet.';
      }
    },
    function(err) {
      if (status) status.textContent = 'Kunne ikke hente posisjon: ' + err.message;
    }
  );
}

const PROJ_KEY = 'bv_projects_v1';

const PROJ_COLORS = [
  '#2A6E3F','#1A4F8A','#8A2A4A','#C96A00',
  '#5A3F9A','#1A7A7A','#8A1A1A','#3A5A9A',
];
const PROJ_CATS = [
  { key:'kjokken',  label:'Kjøkken',    icon:'ti-chef-hat' },
  { key:'bad',      label:'Bad',         icon:'ti-droplet' },
  { key:'stue',     label:'Stue',        icon:'ti-sofa' },
  { key:'soverom',  label:'Soverom',     icon:'ti-bed' },
  { key:'entré',    label:'Entré/Gang',  icon:'ti-door' },
  { key:'utvendig', label:'Utvendig',    icon:'ti-building' },

const PROJ_STATUS = [
  { key:'planned',  label:'Planlagt',   cls:'status-planned' },
  { key:'active',   label:'Pågår',      cls:'status-active' },
  { key:'paused',   label:'Pauset',     cls:'status-paused' },

];

var _projEditId    = null;
var _projFilter    = 'all';
var _projExpandId  = null;
var _newTaskInput  = {};   // { projId: inputValue }

function loadProjects() {
  try {
    // Projects are per-address
    var key = PROJ_KEY + '_' + (APP.activeAddr || 'default');
    return JSON.parse(localStorage.getItem(key) || '[]');
  } catch { return []; }
}
function saveProjects(list) {
  try {
    var key = PROJ_KEY + '_' + (APP.activeAddr || 'default');
    localStorage.setItem(key, JSON.stringify(list));
  } catch {}
}

function createProject(fields) {
  var list = loadProjects();
  var proj = {
    id:          genId(),
    name:        fields.name        || 'Nytt prosjekt',
    category:    fields.category    || 'annet',
    status:      fields.status      || 'planned',
    color:       fields.color       || PROJ_COLORS[list.length % PROJ_COLORS.length],
    desc:        fields.desc        || '',
    budget:      fields.budget      || '',
    contractor:  fields.contractor  || '',
    deadline:    fields.deadline    || '',
    tasks:       [],
    createdAt:   new Date().toISOString(),
  };
  list.push(proj);
  saveProjects(list);
  return proj;
}

function updateProject(id, fields) {
  var list = loadProjects();
  var proj = list.find(function(p) { return p.id === id; });
  if (!proj) return;
  Object.assign(proj, fields);
  saveProjects(list);
}

function confirmDeleteProject(id) {
  var proj = loadProjects().find(function(p) { return p.id === id; });
  var name = proj ? proj.name : 'prosjektet';
  if (confirm('Slette «' + name + '»? Dette kan ikke angres.')) {
    deleteProject(id);
    renderRenovering();
    updateRenoveringDot();
  }
}
function deleteProject(id) {
  var list = loadProjects().filter(function(p) { return p.id !== id; });
  saveProjects(list);
}

function addProjectTask(projId, label) {
  var list = loadProjects();
  var proj = list.find(function(p) { return p.id === projId; });
  if (!proj) return;
  proj.tasks.push({ id: genId(), label: label, done: false });
  saveProjects(list);
}

function toggleProjectTask(projId, taskId) {
  var list = loadProjects();
  var proj = list.find(function(p) { return p.id === projId; });
  if (!proj) return;
  var task = proj.tasks.find(function(t) { return t.id === taskId; });
  if (task) {
    task.done = !task.done;
    // Auto-set project to done if all tasks checked
    if (proj.tasks.length > 0 && proj.tasks.every(function(t) { return t.done; })) {
      proj.status = 'done';
    } else if (proj.status === 'done' && !proj.tasks.every(function(t) { return t.done; })) {
      proj.status = 'active';
    }
    saveProjects(list);
  }
}

function deleteProjectTask(projId, taskId) {
  var list = loadProjects();
  var proj = list.find(function(p) { return p.id === projId; });
  if (!proj) return;
  proj.tasks = proj.tasks.filter(function(t) { return t.id !== taskId; });
  saveProjects(list);
}

function setProjectStatus(projId, status) {
  updateProject(projId, { status: status });
  renderRenovering();
}

function updateRenoveringDot() {
  var dot = document.getElementById('dot-renovering');
  if (!dot) return;
  var projs = loadProjects();
  var active = projs.filter(function(p) { return p.status === 'active'; }).length;
  dot.classList.toggle('show', active > 0);
}

  }).join('');

  return '<div class="project-card' + (proj.status==='done'?' done-project':'') + '">' +
    '<div class="project-header" onclick="toggleProjExpand(this.dataset.proj)" data-proj="' + proj.id + '">' +
      '<div class="project-color-bar" style="background:' + proj.color + '"></div>' +
      '<div class="project-icon" style="background:' + proj.color + '18">' +
        '<i class="ti ' + cat.icon + '" style="color:' + proj.color + '"></i>' +

        '<div class="project-name">' + proj.name + '</div>' +
        '<div class="project-chips">' +
          '<span class="project-chip ' + statusInfo.cls + '">' + statusInfo.label + '</span>' +
          '<span class="project-chip">' + cat.label + '</span>' +
          (totalTasks > 0 ? '<span class="project-chip">' + pct + '% ferdig</span>' : '') +
        '</div>' +
      '</div>' +
      '<i class="ti ti-chevron-down project-chevron' + (isOpen?' open':'') + '"></i>' +
    '</div>' +
    (isOpen
      ? '<div class="project-body">' +
          (proj.desc ? '<p class="project-desc">' + proj.desc + '</p>' : '') +

                '<button class="btn-secondary" style="padding:8px 12px;" onclick="submitProjectTask(\'' + proj.id + '\')"><i class="ti ti-plus"></i></button>' +
              '</div>'
            : '') +
          '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:6px;">Status</div>' +
          '<div class="cat-picker-row" style="margin-bottom:12px;">' + statusBtns + '</div>' +
          '<div class="project-actions">' +
            '<button class="btn-secondary" style="font-size:12px;" onclick="openProjModal(this.dataset.id)" data-id="' + proj.id + '"><i class="ti ti-pencil"></i> Rediger</button>' +
            '<button class="btn-secondary" style="font-size:12px;color:var(--red);" onclick="confirmDeleteProject(this.dataset.id)" data-id="' + proj.id + '"><i class="ti ti-trash"></i> Slett</button>' +

(function boot() {
  const saved = loadSettings();
  if (saved.haUrl)   APP.haUrl   = saved.haUrl;
  if (saved.haToken) APP.haToken = saved.haToken;

  // Restore theme
  const savedTheme = saved.theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(savedTheme);

  // Restore locale
  if (saved.locale) APP.locale = saved.locale;

  // Load addresses
  APP.addresses = loadAddresses();

  const profile = loadProfile();

  // If we have a profile but no addresses yet, migrate it as first address
  if (profile && APP.addresses.length === 0) {
    var migratedAddr = addAddress(profile.name || 'Hjemme', profile.boligtype || 'enebolig', profile);
    APP.addresses = loadAddresses();
    try { localStorage.setItem('bv_active_addr', migratedAddr.id); } catch {}
  }

  // Restore active address
  var lastActive = null;
  try { lastActive = localStorage.getItem('bv_active_addr'); } catch {}
  if (APP.addresses.length > 0) {
    var toActivate = APP.addresses.find(function(a) { return a.id === lastActive; }) || APP.addresses[0];
    switchAddress(toActivate.id);
    navigate('hjem');
    updateNavLabels();
    updateRenoveringDot();
    // Load weather for active address
    loadWeatherForCurrentAddr();
    // Pull from cloud if room is set up
    if (getSyncMeta()) {
      setTimeout(function() { pullFromCloud(); }, 1000);
      // Auto-sync every 60s
      setInterval(function() { if (getSyncMeta()) pullFromCloud(); }, 60000);
    }
  } else {
    setType(saved.boligtype || 'leilighet');
    navigate('hjem');
    updateNavLabels();
    if (!profile) openSurvey();
  }
})();
</script>
</body>
</html>
