  { id:30, interval:365, title:'Vask husets fasade og vegger',        cat:'maling',     icon:'ti-paint',    due:addDays(20),  freq:'Én gang i året (vår)',    types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:{ ma:'husvask fasadereinsing',  g:'vaske fasade hus selv'               }, yt:'vaske fasade hus høytrykksspyler',    desc:'Alger, sopp og smuss setter seg i trevirket og bryter ned overflatebehandlingen. Vask forlenger malingens levetid med mange år.',                          steps:['Bruk hagehose eller høytrykkspyler på lavt trykk (maks 100 bar) – for høyt trykk skader treverket.','Start ovenfra og arbeid nedover.','Bruk husvask-middel (f.eks. klorheksidin) ved alger og mose – la virke 10–15 min.','Skyll grundig med rent vann og la tørke minst 48 t før eventuell maling.']},
  { id:31, interval:1095,title:'Mal vinduer, dørkarmer og belistning', cat:'maling',    icon:'ti-paint',    due:addDays(60),  freq:'Hvert 3.–5. år',         types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:{ ma:'maler vinduer dørkarmer',  g:'male vinduer karm utvendig'          }, yt:'male vinduer og karmer utvendig',     desc:'Vinduer og dørkarmer er spesielt utsatt for vær og vind. Malte og vedlikeholdte karmer hindrer råte og trekkproblemer.',                                   steps:['Rens og sandpapir gammel maling der den flasser.','Fyll sprekker med elastisk fugepasta.','Grunne med uteprimer der treverket er bart.','Påfør 2 strøk yttermaling – pensle alltid med treverkets retning.']},
  { id:32, interval:730, title:'Behandle terrasse og uteplass',        cat:'maling',    icon:'ti-paint',    due:addDays(30),  freq:'Hvert 2.–3. år',         types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'behandle terrasse tre beis',          desc:'Ubehandlet treverk grårner og sprekker raskt. Beising eller oljebehandling beskytter og gir terrassen lang levetid.',                                       steps:['Vask terrassen grundig og la tørke i minst 2–3 dager.','Slip med grovt papir (80-korn) langs treverkets retning.','Støvsug og tørk av alt trevirk.','Påfør terrasse-olje eller beis med bred pensel – arbeide med treets retning.']},
  { id:33, interval:180, title:'Vask og rens vinduer utvendig',        cat:'maling',    icon:'ti-paint',    due:addDays(-8),  freq:'To ganger i året',       types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                  yt:'vaske vinduer utvendig uten striper', desc:'Rene vinduer slipper inn mer lys og gjør det lettere å se tidlige tegn på råte i karmene.',                                                               steps:['Rens karmene med en myk klut og såpevann.','Bruk vindusrenser eller eddikoppløsning (1:10) og skrubbesvamp.','Bruk gummiskrape ovenfra og ned i ett drag.','Tørk kanter med mikrofiberklut – hindrer striper.']},
  { id:34, interval:365, title:'Rengjør og vask garasje/carport',      cat:'maling',    icon:'ti-paint',    due:addDays(45),  freq:'Én gang i året',         types:['rekkehus','enebolig'],                              fagfolk:null,                                             yt:'rengjøre garasje gulv vegger',        desc:'Olje, salt og smuss bygger seg opp og skader gulv og konstruksjon over tid. Et rent garasjerom er dessuten tryggere.',                                     steps:['Kjør ut alle biler og rydd gulvet.','Fei og støvsug gulv og hjørner grundig.','Vask gulvet med avfettingsmiddel og skrubb.','Inspiser vegger og tak for fukt, sprekker og skadedyr.']},

  // ── HAGE & PLEN ──
  { id:40, interval:7,   title:'Klipp plenen',                         cat:'hage',       icon:'ti-plant-2',  due:addDays(-3),  freq:'Ukentlig (mai–sept)',     types:['rekkehus','enebolig','sommerhytte'],               fagfolk:null,                                             yt:'klippe plen tips teknikk',            desc:'Regelmessig klipping holder plenen tett og sunn. For langt gress svekker gressets røtter og inviterer ugress.',                                            steps:['Still klippehøyden til 4–6 cm (aldri klipp mer enn 1/3 av lengden av gangen).','Klipp i tørt vær – vått gress klistrer seg og skader maskinen.','Varier kjøreretningen hver gang for jevnere slitasje.','Tøm gressoppsamleren regelmessig og legg på kompost.']},
  { id:41, interval:180, title:'Gjødsle og rake plenen',               cat:'hage',       icon:'ti-plant-2',  due:addDays(25),  freq:'Vår og høst',            types:['rekkehus','enebolig','sommerhytte'],               fagfolk:null,                                             yt:'gjødsle og rake plen vår',            desc:'Raking fjerner dødt gress (filtlag) som kveler plenen. Gjødsling om våren gir tett, grønn og sunn plen hele sesongen.',                                   steps:['Rake filtstykkene med en greip-rake om våren – dette lufter plenen.','Luft tette partier med aerator eller greip.','Strø jevnt med pelletgjødsel beregnet på plen.','Vann godt inn etter gjødsling – gjødselen skal løses opp i jorda.']},
  { id:42, interval:30,  title:'Bekjemp ugress i bed og plener',       cat:'hage',       icon:'ti-plant-2',  due:addDays(10),  freq:'Månedlig (mai–sept)',     types:['rekkehus','enebolig','sommerhytte'],               fagfolk:null,                                             yt:'luke ugress hage effektivt',          desc:'Ugress stjeler næring og vann fra planter og plen. Tidlig og jevnlig luking er langt enklere enn å ta det store ryddejabbe om høsten.',                    steps:['Luke ugress med rot – ikke bare toppen, det vokser raskt tilbake.','Bruk lukefjær eller huk til rotsystemet.','Legg flis eller barkflis i bed for å hindre nytt ugress.','Kompostér ugress uten frø – frø overlever i komposten.']},
  { id:43, interval:365, title:'Rydd og klargjør hagen til vinteren',  cat:'hage',       icon:'ti-plant-2',  due:addDays(55),  freq:'Én gang i året (høst)',   types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'klargjøre hagen til vinter',          desc:'En grundig høstrydding beskytter planter, hindrer sopp og gjør vårarbeidet langt lettere.',                                                               steps:['Klipp plenen siste gang – hold den på 5–6 cm for vinteren.','Rake løvfall og legg på kompost eller brukes som mulch.','Ta inn potteplanter og sommerblomster som tåler frost dårlig.','Dekk sårbare flerårige planter med fiberduk eller granbar.']},
  { id:44, interval:365, title:'Beskjær hekk og busker',               cat:'hage',       icon:'ti-plant-2',  due:addDays(35),  freq:'Én gang i året (sommer)', types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'beskjære hekk og busker',             desc:'Regelmessig beskjæring holder hekker tette og pene, og fremmer blomstring og ny vekst.',                                                                  steps:['Beskjær hekk etter blomstring – de fleste hekker tåler dette best i juni–august.','Bruk skarpe hekksaks eller motorsag for store jobber.','Sikt mot en svakt V-formet form – bredere i bunnen enn toppen, slik slipper lyset til.','Rydde bort kvister og kompostere.']},
  { id:45, interval:7,   title:'Vann og fôr planter og bed',           cat:'hage',       icon:'ti-plant-2',  due:addDays(5),   freq:'Ukentlig (mai–aug)',      types:['rekkehus','enebolig','sommerhytte'],               fagfolk:null,                                             yt:'vanne og gjødsle hageplanter',        desc:'Tørke er den vanligste årsaken til at planter mislykkes. Jevn og riktig vanning er viktigere enn sporadisk overdrenking.',                                steps:['Vann tidlig om morgenen – minsker fordamping og sopp.','Sjekk jordfuktigheten med fingeren – jorda skal kjennes fuktig 3–5 cm ned.','Bruk flytende gjødsel 1 gang i uka i vekstsesongen.','Unngå å vanne bladene – vann direkte i roten.']},

  // ── REDSKAPER ──
  { id:50, interval:365, title:'Slipe og vedlikeholde gressklipper',   cat:'redskaper',  icon:'ti-tool-2',   due:addDays(20),  freq:'Én gang i året (vår)',    types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:{ ma:'gressklipper service reparasjon', g:'service gressklipper slipe kniver' }, yt:'service gressklipper vår',            desc:'En skarp og velstelt klipper bruker mindre drivstoff, klipper jevnere og varer lengre. Sløv kniv river gresset istedenfor å kutte.',                       steps:['Tøm bensintanken eller koble fra batteriet før arbeid.','Slipe kniven med en vinkelsliper eller fil – følg eksisterende vinkel.','Bytt tennplugg og luftfilter én gang i året.','Sjekk oljenivå og fyll opp etter fabrikkens anbefaling.','Rens under klippe-dekket med skrape og hageslange.']},
  { id:51, interval:365, title:'Vedlikehold motorsag',                 cat:'redskaper',  icon:'ti-tool-2',   due:addDays(45),  freq:'Én gang i året eller ved bruk', types:['enebolig','vinterhytte'],               fagfolk:null,                                             yt:'vedlikeholde motorsag slipe kjede',   desc:'En godt vedlikeholdt motorsag er tryggere og mer effektiv. Sløv eller feil strammet kjede er den vanligste årsaken til ulykker.',                          steps:['Sjekk og juster kjærespenning – skal ha 3–4 mm spenn midt på svinget.','Slipe kjeden med rund fil etter antall kutt eller ved tegn på sløvhet.','Sjekk oljenivå for kjedeolje og bensintank.','Rens luftfilter og kontroller at bremsen fungerer.','Sjekk at kjedefanger og verneutstyr er intakt.']},
  { id:52, interval:365, title:'Skjerp og vedlikehold hageverktøy',    cat:'redskaper',  icon:'ti-tool-2',   due:addDays(30),  freq:'Én gang i året (vår)',    types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'vedlikeholde hageverktøy slipe',      desc:'Skarpt og rent hageverktøy er langt enklere å bruke og beskytter planter bedre enn sløve kniver som river og kvaser.',                                    steps:['Rens jord og rust med en stålbørste og evt. oljebehandling.','Slipe spader, hakker og greinknipper med slipefil eller -stein.','Gni inn metalldelene med linolje for å hindre rust.','Sandpapir skaftene og behandle tresparter med linfrøolje.','Heng verktøy på kroker – aldri la de ligge i jord.']},
  { id:53, interval:365, title:'Kontroller og service snøfreser',      cat:'redskaper',  icon:'ti-tool-2',   due:addDays(-10), freq:'Én gang i året (høst)',   types:['enebolig','vinterhytte'],                           fagfolk:{ ma:'snøfreser service reparasjon', g:'service snøfreser høst'           }, yt:'klargjøre snøfreser høst',            desc:'En snøfreser som svikter i minus 20 grader er et reelt problem. Høstservice sikrer at maskinen er klar når du trenger den.',                                steps:['Bytt olje og tennplugg før vintersesongen.','Sjekk og stram alle skruer og bolter.','Kontroller at skrapelistene er hele og ikke for slitte.','Fyll på frisk bensin – gammel bensin fra sommeren kan gi startproblemer.','Test at kastemunningen og rørmekanismen beveger seg fritt.']},
  { id:54, interval:365, title:'Vedlikehold stiger og klatrestativer', cat:'redskaper',  icon:'ti-tool-2',   due:addDays(40),  freq:'Én gang i året',         types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'inspisere og vedlikeholde stige',     desc:'En stige med skader er et alvorlig sikkerhetsrisiko. Regelmessig sjekk tar under 5 minutter.',                                                             steps:['Kontroller alle trinn for sprekker, løse skruer eller korrosjon.','Sjekk at føttene (gummiklosser) er hele og ikke glatte.','Inspiser låsemekanismer og låsehaker – skal klikke fast.','Treverk-stiger: behandle med linolje. Aluminium: lett sandpapir på skurte partier.','Oppbevar liggende eller heng på kroker – ikke stående mot vegg.']},
  { id:55, interval:365, title:'Sjekk og fyll opp beredskapslageret',  cat:'redskaper',  icon:'ti-tool-2',   due:addDays(50),  freq:'Én gang i året',         types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,                                             yt:'beredskapslager hjemme hva trenger du', desc:'Et lite beredskapslager gjør deg selvstendig ved strømbrudd, storm eller andre uforutsette hendelser.',                                                   steps:['Sjekk at lommelykter og pannelykter har fungerende batterier.','Fyll opp med stearinlys, fyrstikker og tennbriketter.','Kontroller at du har førstehjelpsskrin med nødvendige artikler.','Ha minst 20 liter drikkevann og noen dagers mat i reserve.','Sørg for at du vet hvor hoved-stoppekranen og sikringsskapet er.']},

  // ── HVITEVARER ──
  { id:60, interval:365, title:'Avrim og rens fryseboks/-skuff',       cat:'hvitevarer',  icon:'ti-washing-machine', due:addDays(30), freq:'Én gang i året',  types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'avrime fryseboks selv',               desc:'Is-opphopning reduserer kapasitet og effektivitet. En avrimet fryser bruker betydelig mindre strøm.',                                                      steps:['Ta ut all mat og sett i kjølebag eller naboens fryser.','Skru av strømmen og legg håndkle i bunnen.','La isen smelte naturlig – påskyndes med bolle varmt vann inne i fryseren.','Rens og tørk innvendig med lunket vann og natron.','Skru på igjen og la kjøle ned 2–3 timer før mat settes inn.']},
  { id:61, interval:30,  title:'Rens oppvaskmaskinens filter og armer', cat:'hvitevarer', icon:'ti-washing-machine', due:addDays(20), freq:'Månedlig',         types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'rense oppvaskmaskin filter',          desc:'Tilstoppet filter og spylearm gir dårlig vask og er den vanligste årsaken til dårlig lukt i oppvaskmaskinen.',                                             steps:['Ta ut de nedre kurvene og finn filteret i bunnen.','Drei filteret mot urviseren og løft opp – skyll under rennende vann.','Løsne spylearmene (vri eller klikk av) og rens hullene med tannpirker.','Kjør et tomt program på 60–65 °C med en dl eddik i bunnen.','Tørk pakningen rundt luken med en klut – mold samler seg her.']},
  { id:62, interval:30,  title:'Rens vaskemaskinens trommel og filter', cat:'hvitevarer', icon:'ti-washing-machine', due:addDays(25), freq:'Månedlig',         types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'rense vaskemaskin pakning filter',    desc:'Gummipakningen rundt luken er et arnested for mugg og dårlig lukt. Tøm pumpefilter hindrer gjenleving av pumpen.',                                        steps:['Tørk av gummipakningen rundt luken med klut fuktet med eddikoppløsning.','Finn pumpe-filteret (panel foran nede) – legg håndkle under og skru opp sakte.','Tøm vannet og rens filteret for lo og fremmedlegemer.','Skru igjen og kjør et tomt program på 60 °C med maskinfrisker eller eddik.','La luken stå åpen etter vask – dette hindrer muggvekst.']},
  { id:63, interval:30,  title:'Avkalk kaffemaskin og vannkoker',       cat:'hvitevarer',  icon:'ti-washing-machine', due:addDays(15), freq:'Månedlig',        types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'avkalke kaffemaskin vannkoker',       desc:'Kalk reduserer effektiviteten, gir dårligere smak og forkorter levetiden på varmeelementer.',                                                              steps:['Fyll tanken med 50/50 eddik og vann eller bruk avkalkingsmiddel.','Kjør et komplett avkalkingsprogram – eller la stå i 30 min for enkle maskiner.','Kjør minst 2 skyllesykluser med rent vann til smaken er borte.','For vannkoker: kok opp eddikblandingen, hell ut og skyll 2 ganger.','Gjenta månedlig i hardvannsområder, hvert kvartal ellers.']},
  { id:64, interval:730, title:'Rens kjøleskap og frysedel innvendig', cat:'hvitevarer',  icon:'ti-washing-machine', due:addDays(35), freq:'Annethvert år',    types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'rengjøre kjøleskap innvendig grundig', desc:'Kjøleskap trenger innvendig rengjøring for å fjerne bakterier, sopp og matrester som gir dårlig lukt og kortere holdbarhet.',                             steps:['Ta ut all mat og legg i kjølebag eller kjølig rom.','Skru av strømmen og ta ut alle hyller og skuffer.','Vask alle innvendige flater med lunket vann og natron-oppløsning.','Vask hyllene og skuffene separat, la tørke.','Skru på igjen, la temperere i 1 time, fyll inn mat igjen.']},
  { id:65, interval:90,  title:'Rens avtrekksviften og filteret',       cat:'hvitevarer',  icon:'ti-washing-machine', due:addDays(40), freq:'Hver 3. måned',    types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,           yt:'rense kjøkkenvifte filter',           desc:'Fettfiltre i kjøkkenvifte samler opp fett og kan i verste fall ta fyr. Rene filtre gir bedre avtrekk og hindrer lukt.',                                   steps:['Ta ut fettfilteret – klikk eller skli ut avhengig av modell.','Legg i oppvaskmaskin (50–60 °C) eller vask i varmt vann med oppvaskmiddel.','La filteret tørke helt før det settes inn igjen.','Tørk av innsiden av viften med en fettoppløsende klut.','Sjekk at motorluften til viften ikke er blokkert.']},
  { id:66, interval:30,  title:'Rens tørketrommelens kondensatstasjon', cat:'hvitevarer', icon:'ti-washing-machine', due:addDays(10), freq:'Månedlig',         types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null,          yt:'rense tørketrommel kondensator',      desc:'Kondensatoren i varmepumpe-tørketromler samler lo og støv. Skitne kondensatorer gjør at maskinen bruker mer strøm og tørker dårligere.',                  steps:['Tøm kondensatvannbeholderen etter hvert bruk.','Finn kondensatoren (vanligvis bak et panel nede) og ta den ut.','Skyll under rennende vann til vannet renner klart.','La tørke og sett inn igjen.','Rens lofilter-skuffen ved luken etter hvert bruk.']},

  // ── HYTTE-SPESIFIKKE ──
  { id:70, interval:365, title:'Åpne hytta om våren (sesongstart)',    cat:'hytte',      icon:'ti-trees',    due:addDays(-20), freq:'Én gang i året (vår)',    types:['sommerhytte'],                                      fagfolk:null,                                             yt:'åpne hytte vår sjekkliste',           desc:'En grundig åpningssjekk om våren sikrer at hytta er klar til bruk og at vinterskadene oppdages tidlig.',                                                  steps:['Åpne stoppekran og sjekk alle rør for lekkasjer etter frost.','Sjekk røykvarsler og brannslukkeren – bytt batteri.','Luft hytta grundig – åpne alle vinduer i minst 2 timer.','Inspiser tak, vegger og grunnmur for vinter- og fuktskader.','Sjekk at avløp og sluk ikke er tette etter vinteren.']},
  { id:71, interval:365, title:'Vinterstenging av hytta',              cat:'hytte',      icon:'ti-trees',    due:addDays(50),  freq:'Én gang i året (høst)',   types:['sommerhytte'],                                      fagfolk:null,                                             yt:'vinterstenge hytte sjekkliste',       desc:'Riktig vinterlukking beskytter mot frostskader på rør og vanninntrenging, og sikrer at hytta er hel til neste sesong.',                                   steps:['Steng og tøm vannledninger – åpne alle kraner og tøm varmtvannsbereder.','Hell frostvæske i toalett-sifon og sluk.','Slå av strøm på alle kurser unntatt ev. frostvakt.','Ryd bort mat som kan trekke skadedyr.','Rull opp og ta inn hageslanger, puter og løse gjenstander.']},
  { id:72, interval:14,  title:'Sjekk tak for snølast og isbelastning', cat:'hytte',     icon:'ti-trees',    due:addDays(5),   freq:'Etter kraftig snøfall',   types:['vinterhytte'],                                      fagfolk:null,                                             yt:'snølast tak hytte måle',              desc:'Snø på tak kan veie 100–300 kg/m². Hyttetak er sjelden dimensjonert for ekstremt snøfall – sjekk etter kraftige snøvær.',                                 steps:['Mål snødybden på taket med en målestav.','Er det over 50 cm snø: bruk et takspade-verktøy og fjern fra bakken.','Arbeid alltid fra bakken – gå aldri opp på snødekket tak.','Sjekk at takrenner og dreneringsrør ikke er islagte.','Sjekk innsiden for sprekkelyder, bøyde sperrebjelker eller sprekker i platene.']},
  { id:73, interval:30,  title:'Sjekk og ventiler hytta mot fukt',     cat:'hytte',      icon:'ti-trees',    due:addDays(25),  freq:'Jevnlig ved bruk',        types:['sommerhytte','vinterhytte'],                         fagfolk:null,                                             yt:'ventilere hytte fukt mugg',           desc:'Hytter er særlig utsatt for fuktproblemer, spesielt etter perioder uten bruk. Mugg setter seg raskt i kalde, fuktige rom.',                               steps:['Luft hytta grundig ved ankomst – åpne alle vinduer og dører.','Sjekk etter mugglukt og mørke flekker på vegger og i kott.','Se under tepper og bak møbler – mugg vokser i skjulte rom.','Sørg for at ventilasjonsåpninger ikke er tette eller blokkerte.','Bruk luftavfukter ved langvarig opphold i fuktig vær.']},
  { id:74, interval:365, title:'Vedlikehold brygge og naustfester',    cat:'hytte',      icon:'ti-trees',    due:addDays(30),  freq:'Én gang i året',         types:['sommerhytte'],                                      fagfolk:null,                                             yt:'vedlikeholde brygge impregnering',    desc:'Sjøvann, sol og is er svært ødeleggende for ubehandlet tre. Et oljet og inspektert bryggedekk varer mange år lenger.',                                   steps:['Inspiser alle planker for råte – press med skrutrekker, myk tre betyr råte.','Bytt råtne planker umiddelbart.','Skubb bryggegulvet med stiv børste og bryggerens.','Påfør tykk dekkbeis, oljeimpregnering eller bryggeolje.','Sjekk at bryggestøttene, ankere og festebånd er intakte og uten rust.']},
  { id:75, interval:365, title:'Fyll ved og klargjør vedlager',        cat:'hytte',      icon:'ti-trees',    due:addDays(-5),  freq:'Én gang i året (sommer)', types:['vinterhytte'],                                      fagfolk:null,                                             yt:'stable ved lagre riktig tørke',       desc:'God og tørr ved er forutsetningen for effektiv vedfyring og lite sot i pipa. Veden trenger minst ett år for å tørke skikkelig.',                           steps:['Bestill eller hent ved i god tid – helst tidligere på sommeren.','Kløyv ved til riktig størrelse for ovnen din (typisk 25–33 cm).','Stable med luftgap mellom vedene – unngå tett stabling.','Dekk toppen med takpapp eller presenning, men la sidene stå åpne.','Sjekk at vedlageret ikke er i kontakt med husveggen (trekker fukt og skadedyr).']},
  { id:76, interval:365, title:'Sjekk og service vannpumpe på hytta',  cat:'hytte',      icon:'ti-trees',    due:addDays(20),  freq:'Én gang i året',         types:['sommerhytte','vinterhytte'],                         fagfolk:{ ma:'rørlegger pumpe vann hytte', g:'service brønnpumpe hytte'           }, yt:'sjekke vannpumpe hytte',              desc:'En pumpefeil på hytta kan bety ingen tilgang på vann. En enkel sjekk om våren forebygger overraskelser i høysesongen.',                                   steps:['Sett strøm til pumpen og sjekk at den starter og gir trykk.','Sjekk trykkbeholder – aktiveres pumpen mer enn hvert 5. minutt tyder det på feil.','Inspiser sugesiden for luft-lekkasjer og løse koblinger.','Sjekk at ekspansjonstanken er ladet til korrekt fortrykk (vanligvis 1,5–2 bar).','Merker du unormale lyder eller trykkfall: tilkall rørlegger.']},

  // ── FRUKT & BÆR ──
  { id:80, interval:365, title:'Vårklipp av bærbusker (rips, solbær, stikkelsbær)', cat:'frukt', icon:'ti-apple', due:addDays(20), freq:'Én gang i året (tidlig vår)', types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'beskjære solbær rips stikkelsbær vår', desc:'Riktig vårklipp fjerner gammel, utslitt ved og stimulerer buskene til å sette rikelig med bær. Gammel ved gir lite og dårlig frukt.', steps:['Klipp ut alle greiner eldre enn 3–4 år (mørkere bark, lite knopper).','Fjern svake, syke eller innovervendte greiner.','Behold 6–8 sterke, unge greiner per busk.','Klipp rent rett over en knopp som peker utover.','Bær leveres til kompost – aldri la syk plantedeler ligge under buskene.']},
  { id:81, interval:365, title:'Gjødsel og vanning av bærbusker',                   cat:'frukt', icon:'ti-apple', due:addDays(10), freq:'Vår og forsommer',            types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'gjødsle bærbusker riktig', desc:'Bærbusker er storforbrukere av næring. Riktig gjødsling på riktig tidspunkt gir dobbelt så stor avling.', steps:['Gjødsel tidlig vår (april/mai) med allround- eller bærgjødsel – strø jevnt under buskene.','Bland ned med lett harving eller vanning – gjødselen skal ikke ligge på tørr jord.','Gi en ny dose i juni etter at blomstringen er over.','Vann grundig i tørre perioder, særlig når bærene sveller.','Legg et lag kompost eller barkflis rundt buskene for å holde på fuktighet.']},
  { id:82, interval:365, title:'Høst bær til rett tid og rens buskene etterpå',    cat:'frukt', icon:'ti-apple', due:addDays(75), freq:'Én gang i året (sommer)',     types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'høste bær riktig tidspunkt', desc:'Bær plukket på rett tidspunkt smaker best og holder lengst. Grundig rydding etter høst reduserer sopp og skadedyr neste sesong.', steps:['Solbær og rips: plukk når hele druene er mørke/røde og faller lett av.','Stikkelsbær: plukk til frisk spising litt umodne, til syltetøy fullt modne.','Fjern råtne og mugne bær – aldri la de bli liggende.','Rens under buskene for blad og gammelt bæravfall etter høst.','Legg et nytt lag kompost rundt rotsonen etter høst.']},
  { id:83, interval:365, title:'Vårklipp og forming av eple- og pæretre',           cat:'frukt', icon:'ti-apple', due:addDays(25), freq:'Én gang i året (tidlig vår)', types:['rekkehus','enebolig','sommerhytte'], fagfolk:{ ma:'hagearbeider frukttreklipper arborist', g:'beskjære epletre pæretre vår' }, yt:'beskjære epletre vår guide', desc:'Frukttrær som ikke klippes blir tette, mister lys inn i kronen og gir lite og dårlig frukt. Riktig klipp gir åpen krone, god luftsirkulasjon og stor avling.', steps:['Klipp bare i tørt vær, helst i frost – reduserer sjansen for soppinfeksjon.','Fjern greiner som krysser hverandre, vokser innover eller henger rett ned.','Klipp ut vannris (kraftige, loddrette skudd) – de stjeler næring uten å gi frukt.','La lyset slippe inn i kronen – du skal kunne kaste en hatt gjennom et velklippet tre.','Store greiner (over 5 cm): tilkall arborist. Bruk alltid sag, aldri klyp.']},
  { id:84, interval:365, title:'Gjødsel og kalkbehandling av frukttrær',            cat:'frukt', icon:'ti-apple', due:addDays(15), freq:'Én gang i året (vår)',        types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'gjødsle epletre pæretre', desc:'Frukttrær har høye næringsbehov, særlig kalium og kalsium. Riktig gjødsling gir fastere og sunnere frukt med lengre holdbarhet.', steps:['Strø kalk (kalkstein eller dolomittkalk) rundt rotsonen i april – hever pH og styrker celleveggene.','Tilsett fruktgjødsel med god kaliumbalanse etter blomstring.','Vann inn etter gjødsling – ikke la gjødsel ligge tørt på jord.','Legg kompost rundt treet ut til dryppsonen (der kronekanten er) som jordforbedring.','Gjenta gjødsling lett i juni, men avslutt innen 1. juli – sen gjødsling gir mykt, svakt trevirke.']},
  { id:85, interval:365, title:'Sjekk frukttrær for skadedyr og soppsjukdommer',   cat:'frukt', icon:'ti-apple', due:addDays(40), freq:'Vår og forsommer',            types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'sjukdommer epletre skurv bladlus', desc:'Epleskurv, bladlus og fruktvikler er de vanligste problemene. Tidlig oppdagelse og forebygging er langt enklere enn å bekjempe etablerte angrep.', steps:['Sjekk blad for brune/gule flekker (skurv) eller sammenrullede blad (bladlus) fra mai.','Heng opp lim- eller feromonfeller mot fruktvikler (larven som lager ormehuller).','Gro opp ugress og gammelt blad under treet – sopp overvintrer i planteavfall.','Spray med kobbermiddel (tillatt for hobbybruk) om skurv er kjent problem på stedet.','Vask stammer for mose og lav om høsten – reduserer overvintring av skadedyr.']},
  { id:86, interval:365, title:'Støttestake og fastbinding av unge frukttrær',      cat:'frukt', icon:'ti-apple', due:addDays(30), freq:'Sjekkes hvert år',            types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'støttestake frukttree riktig binding', desc:'Unge trær som beveger seg i vinden utvikler dårlige røtter. Men for stram binding kan skade barken og gi innsnevringsmerker.', steps:['Sjekk at staken ikke er råtten eller løs i jorda.','Bind skal sitte løst nok til at stammen kan bevege seg litt – 2–3 cm spill.','Bruk et bredt, mykt bindebånd, ikke ståltråd eller snor som kan skade barken.','For trær eldre enn 3–4 år: ta bort staken – treet skal nå klare seg selv.','Sjekk om rota av stammen er fri og ikke tildekket av jord (rotdrukningsrisiko).']},
  { id:87, interval:1825,title:'Forynge og dele opp gamle bærbusker',               cat:'frukt', icon:'ti-apple', due:addDays(180),freq:'Hvert 5.–7. år',             types:['rekkehus','enebolig','sommerhytte'], fagfolk:null, yt:'fornye bærbusker formering stiklinger', desc:'Bærbusker er produktive i 10–15 år. Eldre busker kan forynges ved deling eller stiklinger, og du får nye, kraftige planter gratis.', steps:['Grav opp hele busken tidlig vår mens jorda er fuktig.','Del rotsystemet i 3–4 deler med spade – hver del skal ha røtter og minst 3 sterke skudd.','Plant delene med god avstand (minst 1 m mellom rips/solbær, 1,5 m mellom stikkelsbær).','Vann grundig inn etter planting og hold fuktig de første 4 ukene.','Alternativt: ta stiklinger (20 cm greinstykker) i september og plant direkte i jord.']},

  // ── UTEAREAL (asfalt, grus, belegningsstein) ──
  { id:90, interval:365, title:'Inspiser og fyll sprekker i asfalt',                cat:'uteareal', icon:'ti-road', due:addDays(30),  freq:'Én gang i året (vår)',    types:['rekkehus','enebolig'], fagfolk:{ ma:'asfalt reparasjon innkjørsel', g:'tette sprekker asfalt selv' }, yt:'reparere sprekker asfalt innkjørsel', desc:'Vann i asfaltkrekker fryser og utvider seg om vinteren og lager større skader år for år. Tidlig tetting er billig – å vente er dyrt.', steps:['Rens sprekkene grundig med trykkluft, børste eller høytrykksvasker – fjern all løs asfalt og ugress.','La tørke helt – minst 24 timer etter vask.','Fyll med asfalt-fugepasta (kald asfalt) fra spraybokse eller spann – bruk for sprekker under 2 cm.','Komprimer med en flatt stykke tre eller kjevle.','For store hull (over 5 cm): bruk kald asfaltmasse og trampe godt ned, eller tilkall fagfolk.']},
  { id:91, interval:365, title:'Ugress i asfalt og langs kanter',                   cat:'uteareal', icon:'ti-road', due:addDays(15),  freq:'Vår og sommer',           types:['rekkehus','enebolig'], fagfolk:null, yt:'fjerne ugress asfalt kantstein', desc:'Røttene fra ugress i asfaltkrekker løfter og sprenger asfalten over tid. Tidlig fjerning sparer mye penger og arbeid.', steps:['Fjern ugress med rot ved å bruke en smal fugekniv eller ugressjern.','Bruk kokende vann langs kanter og sprekker – dreper røtter uten kjemi.','Spray med eddik (15 %-konsentrasjon) på ugress som vokser spredt.','Fyll rensede sprekker med fugemasse etterpå – hindrer gjenvekst.','Legg ukrudtsduk under kantstein ved større renoveringer.']},
  { id:92, interval:365, title:'Vask og høytrykkspyl innkjørsel og gårdsplass',    cat:'uteareal', icon:'ti-road', due:addDays(20),  freq:'Én gang i året (vår)',    types:['rekkehus','enebolig'], fagfolk:null, yt:'høytrykkvask innkjørsel betong asfalt', desc:'En gang i året med høytrykkvasker fjerner oljeflekkene, alger og vintergrus som bryter ned overflaten og gjør den glatt og farlig.', steps:['Fei bort løst grus og blader med kosebørste først.','Bruk høytrykkvasker med vifte-munnstykke (40°) – ikke punktstråle rett ned, det skader fuger.','Start fra høyeste punkt og arbeid nedover mot avrenning.','Bruk terrasse- eller fasaderens på alger og grønne flekker – la virke 10 min.','Oljeflekkene: strø på asfaltavfetting eller kattesand, la trekke inn, skrubb og vask.']},
  { id:93, interval:730, title:'Etterfyll og jevne ut grusdekke',                   cat:'uteareal', icon:'ti-road', due:addDays(25),  freq:'Hvert 2. år',             types:['rekkehus','enebolig'], fagfolk:{ ma:'grus innkjørsel levering', g:'grustype innkjørsel pukk singel' }, yt:'legge grus innkjørsel jevne ut', desc:'Grus flyttes og komprimeres over tid, særlig av biler og nedbør. Jevn og riktig dybde (minst 5–8 cm) gir god drening og unngår søleproblemer.', steps:['Jevn ut eksisterende grus med en rive – fyll forsenkninger og spor etter biler.','Bestill ny grus (knust pukk 8–16 mm er vanligst for innkjørsler – god drening og lite søl).','Jevn ut nye masser til jevn tykkelse, start fra midten og arbeid utover.','Kjør over med bil eller trampe godt – grus må komprimeres for å ligge stabilt.','Sjekk at gruset heller svakt bort fra huset (dreneringsgradient på minst 2 %).']},
  { id:94, interval:365, title:'Rens fuger i belegningsstein og naturstein',        cat:'uteareal', icon:'ti-road', due:addDays(35),  freq:'Én gang i året',          types:['rekkehus','enebolig'], fagfolk:null, yt:'rense fuger belegningsstein naturstein', desc:'Ugress i fuger løfter og vrikker steinen over tid. Rene fuger med god fugepasta holder plassen stabil og ser pen ut i mange år.', steps:['Fjern ugress i fugene med et smalt fugejern eller ugress-stikker.','Høytrykkspyl fugene på lavt trykk (maks 80 bar) – høyere trykk blåser ut fugesanden.','La tørke helt i minst 24 timer (helst 48 timer).','Fyll fugene med ny kvartssand eller polymersand – strø over hele flaten og fei ned i fugene.','Vann lett over flaten til polymersanden stivner – den binder seg og hindrer ugress og maur.']},
  { id:95, interval:1825,title:'Kontroller fall og drening på utearealer',          cat:'uteareal', icon:'ti-road', due:addDays(50),  freq:'Hvert 5. år',             types:['rekkehus','enebolig'], fagfolk:{ ma:'gravearbeider drenering uteareal', g:'dreneringsfall innkjørsel gårdsplass sjekke' }, yt:'dreneringsfall kontrollere innkjørsel', desc:'Feil fall på innkjørsel og gårdsplass leder vann mot huset istedenfor bort fra det. Over år kan dette gi fuktskader i grunnmur og kjeller.', steps:['Legg en lang rettholt (2–3 m) på flaten og mål fallet med et vater eller nivellerstav.','Riktig fall: minst 2 % (2 cm per meter) bort fra husveggen.','Kartlegg hvor vann blir stående etter regn – det er alltid lavereliggende enn det burde.','Lav flekker i asfalt: fyll med kald asfaltmasse. I grus: skjær drenering eller legg rørgrøft.','Større problemer med dreneringen: tilkall graveentreprenør.']},
  { id:96, interval:365, title:'Sjekk og rens sluk og rister på gårdsplass',        cat:'uteareal', icon:'ti-road', due:addDays(10),  freq:'Vår og høst',             types:['rekkehus','enebolig'], fagfolk:null, yt:'rense avløpssluk gårdsplass rist', desc:'Tette sluk på gårdsplass gir vannansamling og vintersprekker i belegget. Enkelt å rense – tar 10 minutter.', steps:['Løft risten og fjern blader, grus og smuss fra kurven under.','Skyll med hageslange eller bøtte vann – vannet skal renne fritt.','Sjekk at selve rørforbindelsen ikke er tett (bruk en pinne for å kjenne etter).','Tett ledning: bruk avløpsåpner eller ringleder med trykkspyling.','Legg risten tilbake og sjekk at den sitter stødig og ikke vagger.']},
  { id:97, interval:730, title:'Oljebehandle eller forsegle ny asfalt',             cat:'uteareal', icon:'ti-road', due:addDays(90),  freq:'Hvert 2.–3. år',          types:['rekkehus','enebolig'], fagfolk:{ ma:'asfaltering forseglingssystem innkjørsel', g:'forsegle asfalt innkjørsel sealcoat' }, yt:'forsegle asfalt innkjørsel sealcoat', desc:'Asfaltolje (sealcoating) beskytter mot UV-stråling, vann og salt som bryter ned bindemiddelet i asfalten. Livstidsforlenger for innkjørselen.', steps:['Rens asfalten grundig – høytrykkspyl og la tørke minst 48 timer.','Reparer alle sprekker og hull først – forseglingen dekker over, men fikser ikke strukturproblemer.','Påfør asfaltolje med rulle eller sprøyte i 2 strøk – følg produsentens tørketid mellom strøkene.','Sperr av området i minst 24 timer etter siste strøk.','Utfør ikke behandlingen under 10 °C eller ved fare for regn – bindemiddelet trenger varme for å herde.']},

  // ── EKSTRA VALGFRIE OPPGAVER (opt-in via survey) ──
  { id:111, interval:180, title:'Test stoppekranen',                                cat:'ror',      icon:'ti-droplet', due:addDays(90),  freq:'To ganger i året',         types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:{ ma:'rørlegger stoppekran bytte', g:'stoppekran sitter fast hva gjøre' }, yt:'finne teste stoppekran bolig', desc:'Stoppekranen er eneste måte å stenge vannet raskt ved en lekkasje. En kran som aldri er betjent kan sitte fast akkurat når du trenger den.', steps:['Finn stoppekranen – vanligvis under kjøkkenvasken, i bod eller kjeller.','Drei sakte til stengt posisjon (med urviseren).','Sjekk at vannet stanser: åpne en kran og se.','Drei tilbake til åpen posisjon.','Hard å dreie eller lekker: tilkall rørlegger for utskifting.'] },
  { id:112, interval:365, title:'Test trykkavlastningsventil på varmtvannsbereder',  cat:'ror',      icon:'ti-droplet', due:addDays(180), freq:'Én gang i året',             types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:{ ma:'rørlegger varmtvannsbereder ventil', g:'trykkavlastningsventil varmtvannsbereder test' }, yt:'test trykkventil varmtvannsbereder', desc:'Trykkavlastningsventilen er et sikkerhetsutstyr som hindrer berederen i å eksplodere ved overtrykk. De fleste vet ikke at den finnes eller at den bør testes.', steps:['Hold en bøtte under utløpsrøret på ventilen (sitter på siden eller toppen av berederen).','Løft opp ventilhåndtaket forsiktig i 2–3 sekunder.','Vann skal renne ut – dette er normalt og betyr at den fungerer.','Slipp håndtaket – vannet skal stoppe.','Ingen vann eller klikk: Ventilen er defekt. Ring rørlegger umiddelbart.'] },
  { id:113, interval:30,  title:'Spyl sjelden-brukte tappesteder (Legionella)',      cat:'ror',      icon:'ti-droplet', due:addDays(14),  freq:'Månedlig',                 types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null, yt:'legionella forebygging hjemme spyle rør', desc:'Stillestående vann i rør over 20 °C gir grobunn for Legionella-bakterier. Spyling er enkelt og tar bare noen minutter.', steps:['Åpne alle sjelden-brukte kraner: gjestebad, hyttebad, utekran.','La kaldt vann renne i minst 2 minutter.','Gjenta med varmtvannet i 1 minutt.','Spyl også dusj og badekar i sjelden-brukte rom.','Gjøres alltid etter lengre fraværsperioder (ferie, hytte som har stått tom).'] },
  { id:114, interval:90,  title:'Rens baderomsvifte og ventilasjonsrister',          cat:'apparater',icon:'ti-tool',    due:addDays(45),  freq:'Hvert 3. måned',           types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null, yt:'rense baderomsvifte støv guide', desc:'Støvbelagt baderomsvifte trekker dårlig, gir fukt og mugg, og kan overopphetes. En rask kvartalsvis rensing holder den effektiv og stille.', steps:['Slå av strøm til viften (bryter eller sikring).','Press inn og drei dekselet for å ta det av (eller løsne skruer).','Støvsug filteret og viftebladet grundig.','Tørk av dekselet med fuktig klut.','Sett på plass og gjenopprett strøm.','Sjekk at viften trekker ved å holde et toalettpapir foran – det skal suges til.'] },
  { id:115, interval:365, title:'Smør låser, hengsler og skyvedører',                cat:'utvendig', icon:'ti-building',due:addDays(180), freq:'Én gang i året',             types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null, yt:'smøre lås dør hengsel tips', desc:'Tørre hengsler knirker og slites raskere. Låser uten smøring kan fryse om vinteren eller sette seg fast. En enkel økt om høsten forebygger mye.', steps:['Spray silikonspray eller grafittpulver i alle ytterdørlåser og nøkkelhull.','Drypp litt olje (symaskinolje eller lett maskinfett) på alle ytterdørhengsler.','Test skyvedører og skyvevindu – de skal gli lett uten å henge.','Smør portlåser, garasjedøren, brevsprekke og adgangskontroll.','Unngå vanlig olje i lås om vinteren – bruk lås-spray (tørr type) som tåler frost.'] },
  { id:116, interval:365, title:'Vedlikehold garasjeport og -mekanisme',             cat:'utvendig', icon:'ti-building',due:addDays(180), freq:'Én gang i året',             types:['rekkehus','enebolig'], fagfolk:{ ma:'garasjeport service vedlikehold', g:'garasjeport fjær bytte vedlikehold' }, yt:'vedlikehold garasjeport mekanisme smøre', desc:'Garasjeportens fjær og skinne trenger jevnlig smøring. En defekt fjær kan gjøre porten ubrukelig og er farlig å skifte selv.', steps:['Spray silikonspray på skinner og ruller.','Smør fjærmekanismen med lett olje (ikke WD-40 – løser opp smøringen igjen).','Test nødstopp: hold en trebit i portens vei og slipp av-knappen – porten skal stoppe.','Sjekk at alle bolter og skruer sitter fast.','Knarrende lyd eller hard port: tilkall fagfolk – fjærene er under høyt trykk og er farlige å skifte uten utstyr.'] },
  { id:117, interval:365, title:'Sjekk isolasjon på rør i kalde rom',                cat:'ror',      icon:'ti-droplet', due:addDays(90),  freq:'Én gang i året (høst)',    types:['rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:{ ma:'rørisolasjon kald kjeller garasje', g:'isolere rør garasje kjeller frostbeskyttelse' }, yt:'isolere rør frostbeskyttelse bolig', desc:'Uisolerte rør i kalde garasjer og kjellere kan fryse og sprekke. Skaden kan gi massive vannlekkasjer og store kostnader.', steps:['Sjekk alle synlige rør i garasje, kald kjeller og kryprom.','Er rørisolasjonen sprukken, myk eller manglende: bytt med rørskumrør fra jernvarehandelen.','Steng og tøm utekraner og hageslangen om høsten.','For hytte: steng totalvannet og tøm alle rør – husk toalettsifong med frostvæske.','Installer frostsensor eller varmeband ved særlig utsatte rør.'] },
  { id:118, interval:30,  title:'Test alle røykvarslere',                            cat:'sikkerhet',icon:'ti-flame',   due:addDays(14),  freq:'Månedlig',                 types:['leilighet','rekkehus','enebolig','sommerhytte','vinterhytte'], fagfolk:null, yt:'teste røykvarsler sjekk', desc:'Batteriet kan sitte, men selve elektronikken kan svikte uten varsel. En rask test månedlig gir deg visshet om at de virker.', steps:['Finn alle røykvarslere i boligen.','Hold testknappen inne i 5 sekunder til alarmen lyder.','Ingen lyd? Sjekk batteriet – bytt med nytt.','Fortsatt ingen lyd med nytt batteri: Bytt hele enheten.','Husk også varslere i soverom, gang og eventuelt kjeller.'] },

  // ── RENHOLD & HYGIENE ──
