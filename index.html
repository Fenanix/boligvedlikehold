/* Survey location helpers */
async function surveySearchLocation() {
  var input = document.getElementById('survey-loc-input');
  var status = document.getElementById('survey-loc-status');
  var q = (input && input.value || '').trim();
  if (!q) { if (status) status.textContent = 'Skriv inn et stednavn først.'; return; }
  if (status) status.textContent = '🔍 Søker etter «' + q + '»…';
  var loc = await geocodeCity(q);
  if (loc) {
    SV.location = { lat: loc.lat, lon: loc.lon, name: loc.name };
    renderSurveyStep();
  } else {
    if (status) status.textContent = 'Fant ikke «' + q + '». Prøv et annet navn.';
  }
}

function surveyDetectGPS() {
  var status = document.getElementById('survey-loc-status');
  if (!navigator.geolocation) {
    if (status) status.textContent = 'GPS er ikke tilgjengelig i denne nettleseren.';
    return;
  }
  if (status) status.textContent = '📍 Henter GPS-posisjon…';
  navigator.geolocation.getCurrentPosition(
    async function(pos) {
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;
      if (status) status.textContent = '✓ Posisjon funnet – slår opp stednavn…';
      try {
        var r = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lon, {
          headers: { 'User-Agent': 'Boligvedlikehold/0.0.003.a' }
        });
        var j = await r.json();
        var name = (j.address && (j.address.city || j.address.town || j.address.village)) || (lat.toFixed(2) + ', ' + lon.toFixed(2));
        SV.location = { lat: lat, lon: lon, name: name };
        renderSurveyStep();
      } catch(e) {
        SV.location = { lat: lat, lon: lon, name: lat.toFixed(3) + ', ' + lon.toFixed(3) };
        renderSurveyStep();
      }
    },
    function(err) {
      if (status) status.textContent = 'Kunne ikke hente posisjon: ' + err.message;
    }
  );
}

  const total = SURVEY_STEPS.length - 2; // exclude intro+done from count
  const step = SURVEY_STEPS[surveyStep];
  const progressPct = surveyStep === 0 ? 0
    : surveyStep >= SURVEY_STEPS.length - 1 ? 100
    : Math.round(((surveyStep - 1) / total) * 100);

  document.getElementById('survey-progress-fill').style.width = progressPct + '%';
  document.getElementById('survey-back').style.display = surveyStep === 0 ? 'none' : '';
  const nextBtn = document.getElementById('survey-next');

  }
  else if (step.type === 'single') {

            </div>

          </button>`).join('')}
      </div>`;
  }
  else if (step.type === 'multi') {
    const qNum = surveyStep;
    nextBtn.innerHTML = 'Neste <i class="ti ti-arrow-right"></i>';
    nextBtn.disabled = false; // multi is optional
    const selected = SV[step.key] || [];
    html = `
      <div class="survey-step-num">Spørsmål ${qNum} av ${total}</div>
      <div class="survey-question">${step.question}</div>
      <div class="survey-hint">${step.hint}</div>
      <div class="survey-options grid">
        ${step.options.map(o => `
          <button class="survey-option${selected.includes(o.val)?' selected':''}"
            onclick="toggleMulti('${step.key}','${o.val}')">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;width:100%;gap:6px;">
              <i class="ti ${o.icon} so-icon" style="font-size:20px;margin-top:2px;"></i>
              <div class="so-check" style="margin-left:auto;flex-shrink:0;"><i class="ti ti-check"></i></div>
            </div>
            <div class="so-label" style="margin-top:4px;">${o.label}</div>
            ${o.sub ? '<div class="so-sub">' + o.sub + '</div>' : ''}
          </button>`).join('')}
      </div>`;
  }
  else if (step.type === 'done') {
    nextBtn.innerHTML = 'Start appen <i class="ti ti-rocket"></i>';
    nextBtn.disabled = false;
    const profile = buildProfile();
    const taskCount = computeTasksForProfile(profile).length;
    const boligNavn = {leilighet:'Leilighet',rekkehus:'Rekkehus',enebolig:'Enebolig',sommerhytte:'Sommerhytte',vinterhytte:'Vinterhytte'};
    const alderNavn = {ny:'Under 10 år',middel:'10–30 år',gammel:'30–60 år',eldst:'Over 60 år'};
    const erfaringNavn = {nybegynner:'Nybegynner',middels:'Litt erfaring',erfaren:'Erfaren',proff:'Fagperson'};
    html = `
      <div class="survey-done">
        <div class="survey-done-icon"><i class="ti ti-check"></i></div>
        <h2>Alt klart${profile.name ? ', ' + profile.name : ''}!</h2>
        <p>Her er din personlige vedlikeholdsplan basert på svarene dine.</p>
        <div class="task-count-badge">
          <i class="ti ti-list-check"></i>
          ${taskCount} vedlikeholdsoppgaver tilpasset deg
        </div>
        <div class="profile-summary">
          ${profile.name ? '<div class="profile-row"><i class="ti ti-user"></i><span><strong>' + profile.name + '</strong></span></div>' : ''}
          <div class="profile-row"><i class="ti ti-home"></i><span>${boligNavn[profile.boligtype] || '–'}</span></div>
          <div class="profile-row"><i class="ti ti-calendar"></i><span>${alderNavn[profile.alder] || '–'}</span></div>
          <div class="profile-row"><i class="ti ti-tool"></i><span>${erfaringNavn[profile.erfaring] || '–'}</span></div>
          ${profile.location && profile.location.name ? '<div class="profile-row"><i class="ti ti-map-pin"></i><span>' + profile.location.name + '</span></div>' : ''}
          ${(profile.features||[]).length > 0 ? '<div class="profile-row"><i class="ti ti-checklist"></i><span>' + formatFeatures(profile.features) + '</span></div>' : ''}
        </div>
        <p style="font-size:12px;color:var(--ink3);">Du kan endre profilen din når som helst under <strong>Innstillinger → Profil</strong>.</p>
      </div>`;
  }

  document.getElementById('survey-step-area').innerHTML = html;
  document.getElementById('survey-overlay').scrollTop = 0;
}

function selectSingle(key, val) {
  SV[key] = val;
  document.getElementById('survey-next').disabled = false;
  // Re-render options only (toggle selected class)
  const step = SURVEY_STEPS[surveyStep];
  document.querySelectorAll('.survey-option').forEach((btn, i) => {
    const isSelected = step.options[i].val === val;
    btn.classList.toggle('selected', isSelected);
  });
  // Auto-advance — but NOT if the next step is 'done' (let user see done screen by clicking)
  const nextStep = SURVEY_STEPS[surveyStep + 1];
  if (nextStep && nextStep.type !== 'done') {
    setTimeout(() => surveyNext(), 280);
  }
}

function toggleMulti(key, val) {
  if (!SV[key]) SV[key] = [];
  const idx = SV[key].indexOf(val);
  if (idx === -1) SV[key].push(val);
  else SV[key].splice(idx, 1);
  // Re-render buttons
  const step = SURVEY_STEPS[surveyStep];
  document.querySelectorAll('.survey-option').forEach((btn, i) => {
    btn.classList.toggle('selected', SV[key].includes(step.options[i].val));
  });
}

function surveyNext() {
  const step = SURVEY_STEPS[surveyStep];

  // Validate
  if (step.type === 'text' && step.key === 'name') {
    // Name is optional — allow empty
  }
  if (step.type === 'single' && !SV[step.key]) {
    const area = document.getElementById('survey-step-area');
    area.classList.remove('survey-shake');
    void area.offsetWidth;
    area.classList.add('survey-shake');
    return;
  }

  if (step.type === 'done') {
    // Finish survey — save profile, create address entry, show hjem
    var profile = buildProfile();
    saveProfile(profile);
    APP.profile = profile;
    // Create address for this profile — include location if provided
    var addrName = profile.name || 'Hjemme';
    var newAddr = addAddress(addrName, profile.boligtype, profile);
    // Attach weather location if user entered one
    if (profile.location && profile.location.lat) {
      newAddr.lat      = profile.location.lat;
      newAddr.lon      = profile.location.lon;
      newAddr.cityName = profile.location.name;
      saveAddresses(APP.addresses);
    }
    APP.addresses = loadAddresses();
    switchAddress(newAddr.id);
    navigate('hjem');
    closeSurvey();
    showToast(t('welcome') + (profile.name ? ', ' + profile.name : '') + '! ' + APP.tasks.length + ' ' + t('tasksReady'));
    // Trigger weather load immediately
    if (newAddr.lat) loadWeatherForCurrentAddr();
    return;
  }

  surveyStep = Math.min(surveyStep + 1, SURVEY_STEPS.length - 1);
  renderSurveyStep();
}

function surveyBack() {
  if (surveyStep === 0) return;
  surveyStep--;
  renderSurveyStep();
}

function buildProfile() {
  return {
    name:        SV.name        || '',
    boligtype:   SV.boligtype   || 'enebolig',
    alder:       SV.alder       || 'middel',
    features:    [...(SV.features || []), ...(SV.ekstra || [])],
    etasjer:     SV.etasjer     || '2',
    hvitevarer:  SV.hvitevarer  || [],
    erfaring:    SV.erfaring    || 'middels',
    paaminelse:  SV.paaminelse  || 'normal',
    location:    SV.location    || null,
    completedAt: new Date().toISOString(),
  };
}

function computeTasksForProfile(profile) {
  const type = profile.boligtype || 'enebolig';
  const features = profile.features || [];
  const hvitevarer = profile.hvitevarer || [];

  return ALL_TASKS.filter(t => {
    if (!t.types.includes(type)) return false;

    // Feature-gated categories
    if (t.cat === 'frukt'    && !features.includes('frukt'))     return false;
    if (t.cat === 'uteareal') {
      const hasAny = features.some(f => ['asfalt','grus','stein'].includes(f));
      if (!hasAny) return false;
      // Asfalt-specific tasks
      if ([90,91,97].includes(t.id) && !features.includes('asfalt')) return false;
      // Grus-specific
      if (t.id === 93 && !features.includes('grus'))               return false;
      // Belegningsstein
      if (t.id === 94 && !features.includes('stein'))              return false;
    }
    if (t.cat === 'hage' && !features.includes('hage'))           return false;

    // Brygge
    if (t.id === 74 && !features.includes('brygge'))              return false;

    // Vedovn / pipe
    if (t.id === 20 && !features.includes('vedovn'))              return false;
    if (t.id === 75 && !features.includes('vedovn'))              return false;

    // Varmepumpe
    if (t.id === 14 && !features.includes('varmepumpe'))          return false;

    // Snøfreser
    if (t.id === 53 && !features.includes('snøfreser'))           return false;

    // Motorsag
    if (t.id === 51 && !features.includes('motorsag'))            return false;

    // Garasje
    if (t.id === 34  && !features.includes('garasje'))            return false;

    // Ekstra opt-in oppgaver
    if (t.cat === 'renhold'  && !features.includes('renhold'))     return false;
    if (t.id === 111 && !features.includes('stoppekran'))          return false;
    if (t.id === 112 && !features.includes('stoppekran'))          return false;
    if (t.id === 113 && !features.includes('legionella'))          return false;
    if (t.id === 114 && !features.includes('inneklima'))           return false;
    if (t.id === 115 && !features.includes('mekanisk'))            return false;
    if (t.id === 116 && !features.includes('garasje'))             return false;
    if (t.id === 117 && !features.includes('frostvern'))           return false;
    if (t.id === 118 && !features.includes('royktest'))            return false;

    // Hvitevarer filtering
    if (t.id === 61 && !hvitevarer.includes('oppvask'))           return false;
    if (t.id === 62 && !hvitevarer.includes('vaskemaskin'))        return false;
    if (t.id === 66 && !hvitevarer.includes('tørketrommel'))       return false;
    if (t.id === 63 && !hvitevarer.includes('kaffemaskin'))        return false;
    if (t.id === 60 && !hvitevarer.includes('fryser'))             return false;
    if (t.id === 11 && !hvitevarer.includes('ventilasjon'))        return false;

    return true;
  });
}

function setTypeFromProfile(profile) {
  APP.profile = profile;
  APP.boligtype = profile.boligtype;
  APP.filter = 'all';
  APP.expandedId = null;
  const history = loadHistory();
  APP.tasks = computeTasksForProfile(profile).map(t => {
    const h = history[t.id];
    if (h && h.lastDone) {
      const next = nextDueDate(t.interval, h.lastDone);
      return { ...t, due: next, done: false, lastDone: h.lastDone, doneCount: h.count || 1 };
    }
    return { ...t, done: false, lastDone: null, doneCount: 0 };
  });
  saveAppSettings();
}

function confirmDeleteAddr(id, name) {

    var h = loadHistory();

    saveHistory(h);
    deleteAddress(id);
    renderPage();
    if (APP.page === 'innstillinger') renderInnstillinger();
    showToast('"' + name + '" ' + t('addrDeleted'));
  }

function saveAddrModal() {
  var name       = (document.getElementById('addr-name-input').value    || '').trim();
  var street     = (document.getElementById('addr-street-input') ? document.getElementById('addr-street-input').value || '' : '').trim();
  var postalCode = (document.getElementById('addr-postal-input')  ? document.getElementById('addr-postal-input').value  || '' : '').trim();
  var postalPlace= (document.getElementById('addr-postal-place')  ? document.getElementById('addr-postal-place').textContent || '' : '').trim();
  var cityInput  = (document.getElementById('addr-city-input').value || '').trim();

  /* Auto-derive name from street if label left blank */
  if (!name && street) name = street;
  if (!name) { document.getElementById('addr-name-input').focus(); return; }

  async function doSave(lat, lon, cityName) {
    if (_addrEditId) {
      var addr = APP.addresses.find(function(a) { return a.id === _addrEditId; });
      if (addr) {
        addr.name = name;
        addr.street = street;
        addr.postalCode = postalCode;
        addr.postalPlace = postalPlace;
        addr.boligtype = _addrModalType;
        if (lat) { addr.lat = lat; addr.lon = lon; addr.cityName = cityName; }
        saveAddresses(APP.addresses);
        if (_addrEditId === APP.activeAddr) {
          APP.boligtype = _addrModalType;
          switchAddress(_addrEditId);
        }
      }
    } else {
      var newAddr = addAddress(name, _addrModalType, null);
      newAddr.street = street;
      newAddr.postalCode = postalCode;
      newAddr.postalPlace = postalPlace;
      if (lat) { newAddr.lat = lat; newAddr.lon = lon; newAddr.cityName = cityName; }
      saveAddresses(APP.addresses);
      switchAddress(newAddr.id);
    }
    closeAddrModal();
    renderPage();
    if (APP.page === 'innstillinger') renderInnstillinger();
    showToast(_addrEditId ? t('addrUpdated') : '"' + name + '" ' + t('addrAdded'));
    // Trigger weather load
    loadWeatherForCurrentAddr();
  }

  // Try to get location: GPS detected > city input > no location
  if (_detectedLoc) {
    doSave(_detectedLoc.lat, _detectedLoc.lon, _detectedLoc.name);
    _detectedLoc = null;
  } else if (cityInput) {
    var statusEl = document.getElementById('loc-status');
    if (statusEl) statusEl.textContent = 'Søker etter ' + cityInput + '…';
    geocodeCity(cityInput).then(function(loc) {
      if (loc) doSave(loc.lat, loc.lon, loc.name);
      else doSave(null, null, null);
    });
  } else {
    doSave(null, null, null);
  }
}

/* ════════════════════════════════════════
   CLOUD SYNC  (JSONBin.io free tier)
   Each address with sharing enabled gets
   a bin. Members read/write via master key.
════════════════════════════════════════ */
const JSONBIN_BASE = 'https://api.jsonbin.io/v3';
const JSONBIN_KEY  = '$2a$10$bvFreePublicKeyPlaceholder'; // replaced per-bin

var _syncTimer = null;
var _syncState = 'idle'; // idle | syncing | ok | err

function getSyncMeta() {
  try { return JSON.parse(localStorage.getItem('bv_sync_' + APP.activeAddr) || 'null'); }
  catch { return null; }
}
function saveSyncMeta(meta) {
  try { localStorage.setItem('bv_sync_' + APP.activeAddr, JSON.stringify(meta)); } catch {}
}

// Build the cloud payload for the current address
function buildCloudPayload() {
  var h = loadHistory();
  var addrHistory = {};
  Object.keys(h).forEach(function(k) {
    if (k.startsWith(APP.activeAddr + '_')) addrHistory[k] = h[k];
  });
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  return {
    addrId:    APP.activeAddr,
    members:   (addr && addr.members) || [],
    assignments: (addr && addr.assignments) || {},
    history:   addrHistory,
    updatedAt: new Date().toISOString(),
  };
}

// Merge incoming cloud data into local state
function mergeCloudPayload(payload) {
  if (!payload || !payload.addrId) return;
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  if (!addr) return;

  // Merge members
  addr.members = payload.members || [];
  addr.assignments = payload.assignments || {};
  saveAddresses(APP.addresses);

  // Merge history (take latest lastDone per key)
  var h = loadHistory();
  var incoming = payload.history || {};
  Object.keys(incoming).forEach(function(k) {
    if (!h[k] || new Date(incoming[k].lastDone) > new Date((h[k]||{}).lastDone||0)) {
      h[k] = incoming[k];
    }
  });
  saveHistory(h);
}

async function pushToCloud() {
  var meta = getSyncMeta();
  if (!meta || !meta.binId || !meta.apiKey) return false;
  _syncState = 'syncing';
  updateSyncUI();
  try {
    var payload = buildCloudPayload();
    var r = await fetch(JSONBIN_BASE + '/b/' + meta.binId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': meta.apiKey },
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    _syncState = 'ok';
    updateSyncUI();
    return true;
  } catch(e) {
    _syncState = 'err';
    updateSyncUI();
    return false;
  }
}

async function pullFromCloud() {
  var meta = getSyncMeta();
  if (!meta || !meta.binId || !meta.apiKey) return false;
  _syncState = 'syncing';
  updateSyncUI();
  try {
    var r = await fetch(JSONBIN_BASE + '/b/' + meta.binId + '/latest', {
      headers: { 'X-Master-Key': meta.apiKey },
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var data = await r.json();
    mergeCloudPayload(data.record);
    // Reload tasks with fresh history
    switchAddress(APP.activeAddr);
    _syncState = 'ok';
    updateSyncUI();
    renderPage();
    return true;
  } catch(e) {
    _syncState = 'err';
    updateSyncUI();
    return false;
  }
}

async function createBin(apiKey) {
  var r = await fetch(JSONBIN_BASE + '/b', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey, 'X-Bin-Private': 'false' },
    body: JSON.stringify({ addrId: APP.activeAddr, members: [], assignments: {}, history: {} }),
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  var data = await r.json();
  return data.metadata.id;
}

// Generate a short human-friendly room code from bin ID
function binToCode(binId) {
  // Take last 6 chars uppercase
  return binId.slice(-6).toUpperCase();
}
function codeToBinSearch(code) {
  return code.toLowerCase();
}

function updateSyncUI() {
  var dots = document.querySelectorAll('.sync-dot');
  var labels = document.querySelectorAll('.sync-label');
  var cls = _syncState === 'ok' ? 'ok' : _syncState === 'err' ? 'err' : _syncState === 'syncing' ? 'syncing' : 'idle';
  var lbl = _syncState === 'ok' ? 'Synkronisert' : _syncState === 'err' ? 'Synkfeil – sjekk nett' : _syncState === 'syncing' ? 'Synkroniserer…' : 'Ikke synkronisert';
  dots.forEach(function(d) { d.className = 'sync-dot ' + cls; });
  labels.forEach(function(l) { l.textContent = lbl; });
}

/* ── Bolig-deling: export & import ── */
function exportBoligdata() {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  if (!addr) return;
  var hist = loadHistory();
  var addrHist = {};
  Object.keys(hist).forEach(function(k) {
    if (k.startsWith(APP.activeAddr + '_')) addrHist[k] = hist[k];
  });
  var projects = [];
  try { projects = JSON.parse(localStorage.getItem('bv_projects_v1_' + APP.activeAddr) || '[]'); } catch {}
  var data = { bvExport:true, version:APP.version, exportedAt:new Date().toISOString(), addr:addr, history:addrHist, projects:projects };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = 'boligvedlikehold-' + (addr.name || 'data').replace(/\s+/g,'-').toLowerCase() + '-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Boligdata eksportert!');
}

function importBoligdata(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.bvExport) throw new Error('invalid');
      if (data.history) {
        var h = loadHistory(); Object.assign(h, data.history); saveHistory(h);
      }
      if (data.projects && data.projects.length) {
        localStorage.setItem('bv_projects_v1_' + APP.activeAddr, JSON.stringify(data.projects));
      }
      if (data.addr && data.addr.members && data.addr.members.length) {
        var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
        if (addr) {
          if (!addr.members) addr.members = [];
          data.addr.members.forEach(function(m) {
            if (!addr.members.find(function(x) { return x.id === m.id; })) addr.members.push(m);
          });
          saveAddresses(APP.addresses);
        }
      }
      showToast('✓ Data importert!'); closeShareModal(); renderPage();
    } catch { showToast('Ugyldig fil. Prøv en annen.', false); }
  };
  reader.readAsText(file);
}

var MEMBER_COLORS = ['#2A6E3F','#1A4F8A','#8A2A4A','#C96A00','#5A3F9A','#1A7A7A','#8A5A1A','#4A42A8'];

function getMembers() {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  return (addr && addr.members) || [];
}

function getAssignments() {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  return (addr && addr.assignments) || {};
}

function addMember(name) {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  if (!addr) return;
  if (!addr.members) addr.members = [];
  var color = MEMBER_COLORS[addr.members.length % MEMBER_COLORS.length];
  var member = { id: genId(), name: name, color: color, isMe: addr.members.length === 0 };
  addr.members.push(member);
  saveAddresses(APP.addresses);
  schedulePush();
  return member;
}

function removeMember(memberId) {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  if (!addr || !addr.members) return;
  addr.members = addr.members.filter(function(m) { return m.id !== memberId; });
  // Unassign tasks assigned to this member
  if (addr.assignments) {
    Object.keys(addr.assignments).forEach(function(k) {
      if (addr.assignments[k] === memberId) delete addr.assignments[k];
    });
  }
  saveAddresses(APP.addresses);
  schedulePush();
}

function assignTask(taskId, memberId) {
  var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
  if (!addr) return;
  if (!addr.assignments) addr.assignments = {};
  if (memberId) addr.assignments[taskId] = memberId;
  else delete addr.assignments[taskId];
  saveAddresses(APP.addresses);
  schedulePush();
  renderPage();
}

function memberInitials(name) {

}

async function doCreateRoom() {
  var apiKey = (document.getElementById('jb-key-input').value || '').trim();
  var myName = (document.getElementById('jb-name-input').value || '').trim();
  if (!apiKey || !myName) { showToast(t('shareFillFields'), false); return; }
  showToast(t('shareCreating'));
  try {
    var binId = await createBin(apiKey);
    saveSyncMeta({ binId: binId, apiKey: apiKey });
    // Add self as first member
    addMember(myName);
    // Mark first member as "me"
    var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
    if (addr && addr.members && addr.members[0]) addr.members[0].isMe = true;
    saveAddresses(APP.addresses);
    await pushToCloud();
    _shareStep = 'created';
    renderShareModal();
    showToast(t('shareCreated'));
  } catch(e) {
    showToast(t('shareError') + ' ' + e.message + ' ' + t('shareKeyError'), false);
  }
}

async function doJoinRoom() {
  var code   = (document.getElementById('jb-code-input').value || '').trim().toUpperCase();
  var apiKey = (document.getElementById('jb-key-input').value || '').trim();
  var myName = (document.getElementById('jb-name-input').value || '').trim();
  if (!code || !apiKey || !myName) { showToast(t('shareFillAll'), false); return; }

  showToast(t('shareConnecting'));
  try {
    // Search for a bin matching the code suffix
    // JSONBin free: we store binId = last 6 chars is the code
    // User must enter full binId or we search — simplest: ask user to enter binId directly
    // We treat the 6-char code as the last 6 chars of the binId
    // Fetch bins list
    var r = await fetch(JSONBIN_BASE + '/b', { headers: { 'X-Master-Key': apiKey } });
    if (!r.ok) throw new Error('HTTP ' + r.status + ' – sjekk API-nøkkelen');
    var data = await r.json();
    var bins = data || [];
    var match = bins.find(function(b) { return b.id && b.id.toUpperCase().endsWith(code); });
    if (!match) throw new Error('Fant ikke rom med kode ' + code);
    saveSyncMeta({ binId: match.id, apiKey: apiKey });
    // Pull data from cloud
    await pullFromCloud();
    // Add self as member
    addMember(myName);
    var addr = APP.addresses.find(function(a) { return a.id === APP.activeAddr; });
    var newMember = addr && addr.members && addr.members[addr.members.length - 1];
    if (newMember) newMember.isMe = true;
    saveAddresses(APP.addresses);
    await pushToCloud();
    _shareStep = 'menu';
    renderShareModal();
    showToast(t('shareConnected') + ' ' + code + '!');
  } catch(e) {
    showToast('Feil: ' + e.message, false);
  }
}

function addMemberFromInput() {
  var input = document.getElementById('new-member-input');
  if (!input) return;
  var name = (input.value || '').trim();
  if (!name) return;
  addMember(name);

}

  picker.style.left = rect.left + 'px';

var _weatherOpen  = {};     // { addrId: bool }

// WMO weather code → emoji + label (subset of met.no symbol codes)
var WMO_ICONS = {
  clearsky_day:'☀️', clearsky_night:'🌙', clearsky_polartwilight:'🌅',
  fair_day:'🌤', fair_night:'🌙', fair_polartwilight:'🌤',
  partlycloudy_day:'⛅', partlycloudy_night:'☁️', partlycloudy_polartwilight:'⛅',
  cloudy:'☁️',
  lightrainshowers_day:'🌦', lightrainshowers_night:'🌧', lightrainshowers_polartwilight:'🌦',
  rainshowers_day:'🌧', rainshowers_night:'🌧',
  heavyrainshowers_day:'⛈', heavyrainshowers_night:'⛈',
  lightrain:'🌦', rain:'🌧', heavyrain:'⛈',
  lightsleet:'🌨', sleet:'🌨', heavysleet:'❄️',
  lightsnow:'🌨', snow:'❄️', heavysnow:'❄️',
  snowshowers_day:'🌨', snowshowers_night:'🌨',
  fog:'🌫',
  thunder:'⛈', thundershowers_day:'⛈', thundershowers_night:'⛈',
};

function weatherIcon(symbolCode) {
  return WMO_ICONS[symbolCode] || '🌡';
}

// Outdoor-relevant tasks categories
var OUTDOOR_CATS = ['utvendig', 'hage', 'maling', 'uteareal', 'frukt', 'hytte'];

async function fetchWeatherForAddr(addr) {
  if (!addr || !addr.lat || !addr.lon) return null;
  var cacheKey = addr.id;
  var cached = _weatherCache[cacheKey];
  // Use cached data if less than 1 hour old
  if (cached && (Date.now() - cached.fetchedAt) < 3600000) return cached.data;

  try {
    var url = 'https://api.met.no/weatherapi/locationforecast/2.0/compact' +
      '?lat=' + addr.lat.toFixed(4) + '&lon=' + addr.lon.toFixed(4);
    var r = await fetch(url, {
      headers: { 'User-Agent': 'Boligvedlikehold/0.0.002.a (contact@boligvedlikehold.no)' }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var json = await r.json();
    _weatherCache[cacheKey] = { data: json, fetchedAt: Date.now() };
    return json;
  } catch(e) {
    console.warn('Weather fetch failed:', e.message);
    return null;
  }
}

function parseDailyForecast(weatherJson) {
  if (!weatherJson || !weatherJson.properties) return [];
  var timeseries = weatherJson.properties.timeseries;
  var days = {};

  timeseries.forEach(function(ts) {
    var date = ts.time.slice(0, 10);
    var hour = parseInt(ts.time.slice(11, 13));
    if (!days[date]) days[date] = { date: date, temps: [], rain: 0, symbol: null };
    var instant = ts.data.instant.details;
    days[date].temps.push(instant.air_temperature);
    if (ts.data.next_6_hours) {
      var details = ts.data.next_6_hours.details;
      days[date].rain += (details.precipitation_amount || 0);
      if (hour === 12 && ts.data.next_6_hours.summary) {
        days[date].symbol = ts.data.next_6_hours.summary.symbol_code;
      }
    }
    if (!days[date].symbol && ts.data.next_1_hours && ts.data.next_1_hours.summary) {
      days[date].symbol = ts.data.next_1_hours.summary.symbol_code;
    }
  });

  return Object.values(days).slice(0, 7).map(function(d) {
    return {
      date:   d.date,
      min:    Math.round(Math.min.apply(null, d.temps)),
      max:    Math.round(Math.max.apply(null, d.temps)),
      rain:   Math.round(d.rain * 10) / 10,
      symbol: d.symbol || 'cloudy',
    };
  });
}

  var lang = (APP.locale && APP.locale.lang) || 'no';
  var TR = {
    no: {

      goodOutdoor:  '🌤 <strong>Bra uke for utearbeid.</strong> Pent vær de fleste dagene – god tid for hagearbeid, husvasking og utvendige oppgaver.',
      rainWash:     '🌧 <strong>Vaske huset?</strong> Overskyet og regnfull uke – la regnet ta den grove vasken, men unngå maling og beis.',
      avoidPaint:   '🚫 <strong>Unngå maling og beis.</strong> For kaldt (under 10 °C) eller regnvær gjør at malingen ikke tørker riktig.',
      frostWarns:   '❄️ <strong>Frostnatt!</strong> Temperaturer under 0 °C – steng utvendige vannuttak og beskytt sårbare planter.',

      stormy:       '💨 <strong>Unngå høyt arbeid denne uken.</strong> Sterk vind gjør stiger og takarbeid farlig.',
    },
    sv: {
      perfectPaint: '☀️ <strong>Perfekt målarvecka!</strong> Torrt och mildt 5+ dagar – idealiskt för målning av fasad, terrass och fönster.',
      goodOutdoor:  '🌤 <strong>Bra vecka för utomhusarbete.</strong> Fint väder de flesta dagarna – bra tid för trädgårdsarbete och utvändiga uppgifter.',
      rainWash:     '🌧 <strong>Tvätta huset?</strong> Mulet och regnig vecka – låt regnet ta den grova tvätten, men undvik målning.',
      avoidPaint:   '🚫 <strong>Undvik målning och betsning.</strong> För kallt (under 10°C) eller regn gör att färgen inte torkar ordentligt.',
      frostWarns:   '❄️ <strong>Frostrisk!</strong> Temperaturer under 0°C – stäng av utomhuskranar och skydda känsliga växter.',
      mowGood:      '✂️ <strong>Bra vecka för gräsklippning.</strong> Torrt och mildt – gräset är klart för klippning.',
      stormy:       '💨 <strong>Undvik höga arbeten denna veckan.</strong> Hård vind gör stegar och takarbete farligt.',
    },
    en: {
      perfectPaint: '☀️ <strong>Perfect painting week!</strong> Dry and mild for 5+ days – ideal for painting facades, decking and windows.',
      goodOutdoor:  '🌤 <strong>Good week for outdoor work.</strong> Nice weather most days – great time for gardening, house washing and exterior tasks.',
      rainWash:     '🌧 <strong>Washing the house?</strong> Overcast and rainy week – let the rain do the rough cleaning, but avoid painting and staining.',
      avoidPaint:   '🚫 <strong>Avoid painting and staining.</strong> Too cold (below 10°C) or rain means the paint will not dry properly.',
      frostWarns:   '❄️ <strong>Frost warning!</strong> Temperatures below 0°C – shut off outdoor taps and protect vulnerable plants.',
      mowGood:      '✂️ <strong>Good week for mowing.</strong> Dry and mild – the lawn is ready for cutting.',
      stormy:       '💨 <strong>Avoid working at height this week.</strong> Strong winds make ladders and roof work dangerous.',
    },
  };
  var M = TR[lang] || TR.no;

  var hasOutdoorTasks = tasks && tasks.some(function(t) {
    return OUTDOOR_CATS.includes(t.cat) && !t.done;
  });
  if (!hasOutdoorTasks || days.length === 0) return [];

  // Analyse week
  var dryDays    = days.filter(function(d) { return d.rain < 1; }).length;
  var coldDays   = days.filter(function(d) { return d.max < 10; }).length;
  var frostNights= days.filter(function(d) { return d.min < 0; }).length;
  var rainyDays  = days.filter(function(d) { return d.rain > 5; }).length;
  var windyDays  = days.filter(function(d) { return (d.symbol||'').includes('thunder') || (d.symbol||'').includes('heavy'); }).length;
  var avgMax     = Math.round(days.reduce(function(s,d) { return s + d.max; }, 0) / days.length);

  // Perfect painting window
  if (dryDays >= 5 && coldDays === 0) {
    tips.push({ type:'good', icon:'ti-paint', text: M.perfectPaint });
  } else if (dryDays >= 3 && coldDays === 0) {
    tips.push({ type:'good', icon:'ti-sun', text: M.goodOutdoor });
  }

  // Rainy — good for house washing, bad for painting
  if (rainyDays >= 3 && coldDays < 3) {
    tips.push({ type:'info', icon:'ti-droplet', text: M.rainWash });
  }

  // Too cold or rainy for painting
  if ((coldDays >= 4 || rainyDays >= 4) && dryDays < 3) {
    tips.push({ type:'warn', icon:'ti-paint-off', text: M.avoidPaint });
  }

  // Frost warning
  if (frostNights >= 2) {
    tips.push({ type:'bad', icon:'ti-snowflake', text: M.frostWarns });
  }

  // Good mowing week
  var hasMowing = tasks && tasks.some(function(t) { return t.id === 40 && !t.done; });
  if (hasMowing && dryDays >= 4 && avgMax >= 12) {
    tips.push({ type:'good', icon:'ti-cut', text: M.mowGood });
  }

  // Stormy / dangerous for height work
  if (windyDays >= 2) {
    tips.push({ type:'warn', icon:'ti-ladder', text: M.stormy });
  }

  return tips.slice(0, 3);
}

function dayLabel(dateStr, idx, lang) {
  var labels = {
    no: ['Man','Tir','Ons','Tor','Fre','Lør','Søn'],
    sv: ['Mån','Tis','Ons','Tor','Fre','Lör','Sön'],
    da: ['Man','Tir','Ons','Tor','Fre','Lør','Søn'],
    en: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
    de: ['Mo','Di','Mi','Do','Fr','Sa','So'],
    nl: ['Ma','Di','Wo','Do','Vr','Za','Zo'],
  };
  var todayWord = { no:'I dag', sv:'I dag', da:'I dag', en:'Today', de:'Heute', nl:'Vandaag' };
  if (idx === 0) return todayWord[lang] || 'I dag';
  var d = new Date(dateStr + 'T12:00:00');
  return (labels[lang] || labels.no)[d.getDay()];
}

async function loadWeatherForCurrentAddr() {

  if (!addr || !addr.lat || !addr.lon) return null;
  var data = await fetchWeatherForAddr(addr);
  if (!data) return null;
  var days = parseDailyForecast(data);
  var tips = generateWeatherTips(days, APP.tasks);
  // Re-render so weather appears
  renderPage();
  return { days: days, tips: tips };
}

// Geocode city name using Nominatim (free, no key needed)
/* ── Norwegian postal code → poststed + kommune (Bring API) ── */
async function lookupPostalCode(pnr) {
  try {
    var r = await fetch(
      'https://api.bring.com/shippingguide/api/postalCode.json?clientUrl=boligvedlikehold&country=NO&pnr=' + encodeURIComponent(pnr)
    );
    if (!r.ok) return null;
    var d = await r.json();
    if (!d.valid) return null;
    return { postalPlace: d.result }; // e.g. "OSLO"
  } catch { return null; }
}

function onPostalInput(val) {
  var statusEl = document.getElementById('addr-postal-status');
  var placeEl  = document.getElementById('addr-postal-place');
  var cityEl   = document.getElementById('addr-city-input');
  if (!statusEl || !placeEl) return;

  var country = (APP.locale && APP.locale.country) || 'NO';
  if (country !== 'NO' || val.length !== 4 || !/^\d{4}$/.test(val)) {
    placeEl.textContent = '';
    statusEl.textContent = '';
    return;
  }
  statusEl.textContent = 'Slår opp…';
  placeEl.textContent = '';
  lookupPostalCode(val).then(function(res) {
    if (!res) { statusEl.textContent = 'Ukjent postnummer.'; return; }
    var place = res.postalPlace.charAt(0) + res.postalPlace.slice(1).toLowerCase();
    placeEl.textContent = place;
    statusEl.textContent = '';
    if (cityEl && !cityEl.dataset.manuallyEdited) cityEl.value = place;
  });
}

async function geocodeCity(cityName) {
  try {
    var r = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' +
      encodeURIComponent(cityName) + '&limit=1', {
      headers: { 'User-Agent': 'Boligvedlikehold/0.0.002.a' }
    });
    if (!r.ok) return null;
    var results = await r.json();
    if (!results.length) return null;
    return { lat: parseFloat(results[0].lat), lon: parseFloat(results[0].lon), name: results[0].display_name.split(',')[0] };
  } catch(e) { return null; }
}

function detectLocation() {
  var status = document.getElementById('loc-status');
  if (!navigator.geolocation) {
    if (status) status.textContent = 'GPS ikke tilgjengelig i denne nettleseren.';
    return;
  }
  if (status) status.textContent = '📍 Henter posisjon…';
  navigator.geolocation.getCurrentPosition(
    async function(pos) {
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;
      // Reverse geocode
      try {
        var r = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lon, {
          headers: { 'User-Agent': 'Boligvedlikehold/0.0.002.a' }
        });
        var j = await r.json();
        var name = (j.address && (j.address.city || j.address.town || j.address.village)) || lat.toFixed(2) + ',' + lon.toFixed(2);
        _detectedLoc = { lat: lat, lon: lon, name: name };
        var inp = document.getElementById('addr-city-input');
        if (inp) inp.value = name;
        if (status) status.textContent = '✓ Posisjon funnet: ' + name;
      } catch(e) {
        _detectedLoc = { lat: lat, lon: lon, name: 'Min posisjon' };
        if (status) status.textContent = '✓ GPS-posisjon hentet.';
      }
    },
    function(err) {
      if (status) status.textContent = 'Kunne ikke hente posisjon: ' + err.message;
    }
  );
}

const PROJ_COLORS = [
  '#2A6E3F','#1A4F8A','#8A2A4A','#C96A00',
  '#5A3F9A','#1A7A7A','#8A1A1A','#3A5A9A',

    { key:'kjokken',  label:t('catKjokken'), icon:'ti-chef-hat' },
    { key:'bad',      label:t('catBad'),      icon:'ti-droplet' },

}
function getProjStatus() {
  return [
    { key:'planned', label:t('projPlanned'), cls:'status-planned' },
    { key:'active',  label:t('projActive'),  cls:'status-active' },
    { key:'paused',  label:t('projPaused'),  cls:'status-paused' },

  ];
}

var _projEditId    = null;
var _projFilter    = 'all';
var _projExpandId  = null;
var _newTaskInput  = {};   // { projId: inputValue }

function loadProjects() {
  try {
    // Projects are per-address
    var key = PROJ_KEY + '_' + (APP.activeAddr || 'default');
    return JSON.parse(localStorage.getItem(key) || '[]');
  } catch { return []; }
}
function saveProjects(list) {
  try {
    var key = PROJ_KEY + '_' + (APP.activeAddr || 'default');
    localStorage.setItem(key, JSON.stringify(list));
  } catch {}
}

function createProject(fields) {
  var list = loadProjects();
  var proj = {
    id:          genId(),
    name:        fields.name        || t('projDefaultName'),
    category:    fields.category    || 'annet',
    status:      fields.status      || 'planned',
    color:       fields.color       || PROJ_COLORS[list.length % PROJ_COLORS.length],
    desc:        fields.desc        || '',
    budget:      fields.budget      || '',
    contractor:  fields.contractor  || '',
    deadline:    fields.deadline    || '',
    tasks:       [],
    createdAt:   new Date().toISOString(),
  };
  list.push(proj);
  saveProjects(list);
  return proj;
}

function updateProject(id, fields) {
  var list = loadProjects();
  var proj = list.find(function(p) { return p.id === id; });
  if (!proj) return;
  Object.assign(proj, fields);
  saveProjects(list);
}

function confirmDeleteProject(id) {
  var proj = loadProjects().find(function(p) { return p.id === id; });
  var name = proj ? proj.name : 'prosjektet';
  if (confirm(t('projDeleteConfirm').replace('{name}', name))) {
    deleteProject(id);
    renderRenovering();
    updateRenoveringDot();
  }
}
function deleteProject(id) {
  var list = loadProjects().filter(function(p) { return p.id !== id; });
  saveProjects(list);
}

function addProjectTask(projId, label) {
  var list = loadProjects();
  var proj = list.find(function(p) { return p.id === projId; });
  if (!proj) return;
  proj.tasks.push({ id: genId(), label: label, done: false });
  saveProjects(list);
}

function toggleProjectTask(projId, taskId) {
  var list = loadProjects();
  var proj = list.find(function(p) { return p.id === projId; });
  if (!proj) return;
  var task = proj.tasks.find(function(t) { return t.id === taskId; });
  if (task) {
    task.done = !task.done;
    // Auto-set project to done if all tasks checked
    if (proj.tasks.length > 0 && proj.tasks.every(function(t) { return t.done; })) {
      proj.status = 'done';
    } else if (proj.status === 'done' && !proj.tasks.every(function(t) { return t.done; })) {
      proj.status = 'active';
    }
    saveProjects(list);
  }
}

function deleteProjectTask(projId, taskId) {
  var list = loadProjects();
  var proj = list.find(function(p) { return p.id === projId; });
  if (!proj) return;
  proj.tasks = proj.tasks.filter(function(t) { return t.id !== taskId; });
  saveProjects(list);
}

function setProjectStatus(projId, status) {
  updateProject(projId, { status: status });
  renderRenovering();
}

function updateRenoveringDot() {
  var dot = document.getElementById('dot-renovering');
  if (!dot) return;
  var projs = loadProjects();
  var active = projs.filter(function(p) { return p.status === 'active'; }).length;
  dot.classList.toggle('show', active > 0);
}

function toggleProjExpand(id) {

/* ── Main render ── */
function renderRenovering() {
  var projects = loadProjects();

  /* Filter by status or category */
  var filtered;
  if (_projFilter === 'all')          filtered = projects.slice();
  else if (_projFilter === 'active')  filtered = projects.filter(function(p) { return p.status === 'active'; });
  else if (_projFilter === 'planned') filtered = projects.filter(function(p) { return p.status === 'planned'; });
  else if (_projFilter === 'done')    filtered = projects.filter(function(p) { return p.status === 'done'; });
  else if (_projFilter.startsWith('cat:')) {
    var _catKey = _projFilter.slice(4);
    filtered = projects.filter(function(p) { return p.category === _catKey; });
  } else { filtered = projects.slice(); }

  /* Sort: done projects always sink to the bottom */
  filtered.sort(function(a, b) {
    var aD = a.status === 'done' ? 1 : 0;
    var bD = b.status === 'done' ? 1 : 0;
    return aD - bD;
  });

  var active  = projects.filter(function(p) { return p.status === 'active'; }).length;
  var planned = projects.filter(function(p) { return p.status === 'planned'; }).length;
  var done    = projects.filter(function(p) { return p.status === 'done'; }).length;

  /* Status filter pills */
  var statusPills = [
    { key:'all',     label:t('allTasks') + ' (' + projects.length + ')' },
    { key:'active',  label:t('projActive') },
    { key:'planned', label:t('projPlanned') },
    { key:'done',    label:t('done') },
  ].map(function(f) {
    return '<button class="pill' + (_projFilter===f.key?' active':'') + '" onclick="_projFilter=this.dataset.f;renderRenovering()" data-f="' + f.key + '">' + f.label + '</button>';
  }).join('');

  /* Category filter pills — only show categories that exist */
  var existingCatKeys = projects.reduce(function(acc, p) {
    if (p.category && acc.indexOf(p.category) === -1) acc.push(p.category);
    return acc;
  }, []);
  var catPills = existingCatKeys.length > 1
    ? existingCatKeys.map(function(key) {
        var info = getProjCats().find(function(c) { return c.key === key; });
        if (!info) return '';
        var fKey = 'cat:' + key;
        return '<button class="pill' + (_projFilter===fKey?' active':'') + '" onclick="_projFilter=this.dataset.f;renderRenovering()" data-f="' + fKey + '">' +
          '<i class="ti ' + info.icon + '"></i> ' + info.label + '</button>';
      }).join('')
    : '';

  var filterPills = statusPills + catPills;

  var projectCards = filtered.length === 0
    ? '<div class="ren-empty">' +
        '<div class="ren-empty-icon"><i class="ti ti-hammer"></i></div>' +
        '<h3>' + (projects.length === 0 ? t('projEmptyTitle') : t('projEmptyTitleFilter')) + '</h3>' +
        '<p>' + (projects.length === 0 ? t('projEmptyDesc') : t('projEmptyFilterDesc')) + '</p>' +
        (projects.length === 0 ? '<button class="btn-primary" style="margin:0 auto;display:flex;" onclick="openProjModal()"><i class="ti ti-plus"></i> ' + t('projEmptyBtn') + '</button>' : '') +
      '</div>'
    : filtered.map(function(proj) {
        return renderProjectCard(proj);
      }).join('');

  document.getElementById('page-renovering').innerHTML =
    '<div class="ren-header">' +
      '<h2>' + t('projects') + '</h2>' +
      '<div style="display:flex;gap:6px;">' +
        '<button class="btn-secondary" style="font-size:13px;padding:8px 12px;" onclick="openScanModal()" title="' + t('scanReport') + '"><i class="ti ti-file-search"></i> ' + t('scanReport') + '</button>' +
        '<button class="btn-primary"   style="font-size:13px;padding:8px 14px;" onclick="openProjModal()"><i class="ti ti-plus"></i> ' + t('projNew') + '</button>' +
      '</div>' +
    '</div>' +
    '<div class="ren-stat-strip">' +
      '<div class="ren-stat"><div class="ren-stat-num" style="color:var(--blue)">' + active + '</div><div class="ren-stat-lbl">' + t('projActive') + '</div></div>' +
      '<div class="ren-stat"><div class="ren-stat-num" style="color:var(--purple)">' + planned + '</div><div class="ren-stat-lbl">' + t('projPlanned') + '</div></div>' +
      '<div class="ren-stat"><div class="ren-stat-num" style="color:var(--green)">' + done + '</div><div class="ren-stat-lbl">' + t('done') + '</div></div>' +
    '</div>' +
    '<div class="ren-filter-row filter-bar" style="padding:6px 16px 8px;">' + filterPills + '</div>' +
    '<div class="project-list">' + projectCards + '</div>';

  if (_projExpandId) setTimeout(function() {
    loadProjImgs(_projExpandId);
    loadEntityDocs(_projExpandId, 'proj-docs-' + _projExpandId);
  }, 0);
}

function renderProjectCard(proj) {
  var isOpen = _projExpandId === proj.id;
  var cats = getProjCats();
  var cat = cats.find(function(c) { return c.key === proj.category; }) || cats[cats.length-1];
  var statuses = getProjStatus();
  var statusInfo = statuses.find(function(s) { return s.key === proj.status; }) || statuses[0];

  var doneTasks  = proj.tasks.filter(function(t) { return t.done; }).length;

  var taskItems = proj.tasks.map(function(task) {
    return '<div class="task-check-item' + (task.done?' checked':'') + '" onclick="toggleProjectTask(this.dataset.proj,this.dataset.task);renderRenovering()" data-proj="' + proj.id + '" data-task="' + task.id + '">' +

  var progressHtml = totalTasks > 0
    ? '<div class="project-progress-wrap">' +
        '<div class="project-progress-label"><span>' + doneTasks + ' ' + t('projOf') + ' ' + totalTasks + ' ' + t('projTasksWord') + '</span><span>' + pct + '%</span></div>' +
        '<div class="project-progress-bar"><div class="project-progress-fill" style="width:' + pct + '%;background:' + proj.color + '"></div></div>' +
      '</div>'
    : '';

  var country = (APP.locale && APP.locale.country) || 'NO';
  var metaRows = '';
  if (proj.deadline)   metaRows += '<div class="project-detail-row"><i class="ti ti-calendar"></i> ' + t('projDeadline') + ': ' + fmtDate(new Date(proj.deadline)) + '</div>';
  if (proj.budget)     metaRows += '<div class="project-detail-row"><i class="ti ti-currency-krone"></i> ' + t('projBudget') + ': ' + proj.budget + '</div>';
  if (proj.contractor) metaRows += '<div class="project-detail-row"><i class="ti ti-user-check"></i> ' + proj.contractor + '</div>';
  if (country === 'NO') metaRows += '<div class="project-detail-row"><i class="ti ti-folder-share" style="color:var(--blue)"></i><a href="https://www.boligmappen.no" target="_blank" onclick="event.stopPropagation()">Boligmappen.no</a><span> – kvitteringer og dokumenter</span></div>';

  var statusBtns = getProjStatus().map(function(s, sidx) {
    return '<button class="cat-pick-btn' + (s.key===proj.status?' sel':'') + '" style="font-size:11px;padding:4px 9px;" onclick="setProjectStatus(this.dataset.proj,this.dataset.status)" data-proj="' + proj.id + '" data-status="' + s.key + '">' + s.label + '</button>';
  }).join('');

  return '<div class="project-card' + (proj.status==='done'?' done-project':'') + '">' +
    '<div class="project-header" onclick="toggleProjExpand(this.dataset.proj)" data-proj="' + proj.id + '">' +
      '<div class="project-color-bar" style="background:' + proj.color + '"></div>' +
      '<div class="project-icon" style="background:' + proj.color + '18">' +
        '<i class="ti ' + cat.icon + '" style="color:' + proj.color + '"></i>' +
      '</div>' +
      '<div class="project-meta">' +
        '<div class="project-name">' + proj.name + '</div>' +
        '<div class="project-chips">' +

var _scanState    = 'idle';
var _scanData     = null;
var _scanSelected = null;
var _pdfjs        = null;

function loadPdfJs() {
  if (_pdfjs) return Promise.resolve(_pdfjs);
  return new Promise(function(resolve, reject) {
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      _pdfjs = window.pdfjsLib; resolve(_pdfjs); return;
    }
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = function() {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      _pdfjs = window.pdfjsLib; resolve(_pdfjs);
    };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function extractPdfText(file) {
  var lib = await loadPdfJs();
  var buf = await file.arrayBuffer();
  var pdf = await lib.getDocument({ data: buf }).promise;
  var pages = Math.min(pdf.numPages, 120);
  var lines = [];
  for (var i = 1; i <= pages; i++) {
    var page    = await pdf.getPage(i);
    var content = await page.getTextContent();
    lines.push(content.items.map(function(x) { return x.str; }).join(' '));
  }
  return lines.join('\n');
}

/* ── Shared prompt builder ── */
function buildReportPrompt(text) {
  var clean = text
    .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, ' ')
    .replace(/ {3,}/g, '  ')
    .slice(0, 45000);
  return 'Du er ekspert på norske tilstandsrapporter (NS 3600). ' +
    'Finn alle bygningsdeler med tilstandsgrad TG 2 eller TG 3 (ignorer TG 0, TG 1 og IU/TGI). ' +
    'For hvert funn: ta med prisanslag hvis det er oppgitt i rapporten (f.eks. "kr 50 000–80 000" eller "ca. 120 000 kr"). ' +
    'Svar UTELUKKENDE med en JSON-array – ingen markdown, ingen annen tekst:\n' +
    '[\n  {\n' +
    '    "tittel": "Bygningsdel – kort problembeskrivelse (maks 55 tegn)",\n' +
    '    "tg": 2,\n' +
    '    "rom": "utvendig|bad|kjokken|loft|stue|soverom|annet",\n' +
    '    "beskrivelse": "Sammendrag av avviket (maks 130 tegn)",\n' +
    '    "pris": "Prisanslag fra rapporten, eller null hvis ikke oppgitt"\n' +
    '  }\n]\n\nRAPPORT:\n' + clean;
}

function parseJsonFromModel(raw) {
  var cleaned = raw.trim()
    .replace(/^```(?:json)?\s*/i, '')
    .replace(/\s*```$/, '');

  /* Try a straight parse first */
  try { return JSON.parse(cleaned); } catch(e) {
    /* If JSON is truncated (model hit token limit), salvage complete objects */
    if (cleaned.startsWith('[')) {
      var last = cleaned.lastIndexOf('}');
      if (last !== -1) {
        try { return JSON.parse(cleaned.slice(0, last + 1) + ']'); } catch(_) {}
      }
    }
    throw e; /* re-throw original error if nothing worked */
  }
}

/* ── Gemini: auto-detect best available model ── */
var _geminiModel = null;

async function resolveGeminiModel(key) {
  if (_geminiModel) return _geminiModel;

  var res = await fetch('https://generativelanguage.googleapis.com/v1/models?key=' + key);
  if (!res.ok) {
    var eb = await res.json().catch(function() { return {}; });
    var e3 = new Error('api'); e3.code = 'api'; e3.status = res.status;
    e3.detail = (eb.error && eb.error.message) || 'Could not list Gemini models'; throw e3;
  }
  var data = await res.json();

  /* Keep only models that support generateContent */
  var available = (data.models || [])
    .filter(function(m) { return (m.supportedGenerationMethods || []).indexOf('generateContent') !== -1; })
    .map(function(m) { return m.name.replace('models/', ''); });

  /* Prefer free flash models, then pro as fallback */
  var preferred = [
    'gemini-1.5-flash', 'gemini-1.5-flash-latest',
    'gemini-1.5-flash-001', 'gemini-1.5-flash-002',
    'gemini-1.5-flash-8b', 'gemini-1.5-flash-8b-latest',
    'gemini-1.5-pro', 'gemini-1.5-pro-latest',
    'gemini-1.0-pro', 'gemini-pro',
  ];
  for (var i = 0; i < preferred.length; i++) {
    var p = preferred[i];
    var hit = available.find(function(m) { return m === p || m.startsWith(p + '-'); });
    if (hit) { _geminiModel = hit; return _geminiModel; }
  }

  /* Last resort: first model in the list */
  if (available.length) { _geminiModel = available[0]; return _geminiModel; }

  var e4 = new Error('api'); e4.code = 'api'; e4.status = 404;
  e4.detail = 'No compatible Gemini models found for this API key. Available: ' + JSON.stringify(data.models && data.models.map(function(m){return m.name;}));
  throw e4;
}

async function callGeminiForReport(text) {
  var key = APP.geminiApiKey;
  if (!key) { var e = new Error('no_key'); e.code = 'no_key'; throw e; }

  var model = await resolveGeminiModel(key);

  var res = await fetch(
    'https://generativelanguage.googleapis.com/v1/models/' + model + ':generateContent?key=' + key,
    {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: buildReportPrompt(text) }] }],
        generationConfig: { temperature: 0.1, maxOutputTokens: 8192 },
      }),
    }
  );
  if (!res.ok) {
    _geminiModel = null; // reset so next attempt re-detects
    var errBody = await res.json().catch(function() { return {}; });
    var detail  = (errBody.error && errBody.error.message) || JSON.stringify(errBody);
    var e2 = new Error('api'); e2.code = 'api'; e2.status = res.status; e2.detail = detail;
    throw e2;
  }
  var data = await res.json();
  var raw  = (((data.candidates || [])[0] || {}).content || {});
  raw = ((raw.parts || [])[0] || {}).text || '';
  return parseJsonFromModel(raw);
}

/* ── Claude ── */
async function callClaudeForReport(text) {
  var key = APP.claudeApiKey;
  if (!key) { var e = new Error('no_key'); e.code = 'no_key'; throw e; }

  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json',
    },
    body: JSON.stringify({
      model: 'claude-3-5-haiku-20241022',
      max_tokens: 4096,
      messages: [{ role: 'user', content: buildReportPrompt(text) }],
    }),
  });

  if (!res.ok) {
    var errBody = await res.json().catch(function() { return {}; });
    var detail  = (errBody.error && errBody.error.message) || JSON.stringify(errBody);
    var e2 = new Error('api'); e2.code = 'api'; e2.status = res.status; e2.detail = detail;
    throw e2;
  }
  var data = await res.json();
  return parseJsonFromModel(((data.content[0] || {}).text || ''));
}

/* ── Pick provider and call ── */
function resolveProvider() {
  var p = APP.aiProvider;
  if (p === 'gemini') return 'gemini';
  if (p === 'claude') return 'claude';
  // auto: prefer Claude if both set, else whichever is set
  if (APP.claudeApiKey && APP.geminiApiKey) return 'claude';
  if (APP.geminiApiKey) return 'gemini';
  return 'claude';
}
function hasAnyKey() { return !!(APP.claudeApiKey || APP.geminiApiKey); }
async function callReportApi(text) {
  return resolveProvider() === 'gemini'
    ? callGeminiForReport(text)
    : callClaudeForReport(text);
}

/* ── Shared analysis runner (text → findings) ── */
async function runScanAnalysis(text) {
  _scanState = 'analysing'; renderScanModal();
  try {
    var findings = await callReportApi(text);
    _scanState = 'results'; _scanData = { findings: findings }; _scanSelected = null;
  } catch(err) {
    _scanState = 'error';
    if (err.code === 'no_key')      _scanData = { error: t('scanErrNoKey') };
    else if (err.code === 'api')    _scanData = { error: 'HTTP ' + err.status + (err.detail ? ': ' + err.detail : '') };
    else                             _scanData = { error: t('scanErrParse') + (err.message ? ': ' + err.message : '') };
  }
  renderScanModal();
}

/* ── Scan from file input ── */

  if (!file) return;
  _scanState = 'reading'; renderScanModal();
  var text;
  try   { text = await extractPdfText(file); }
  catch { _scanState = 'error'; _scanData = { error: t('scanErrPdf') }; renderScanModal(); return; }
  await runScanAnalysis(text);
}

/* ── Scan from a stored Boligdokument (by IndexedDB id) ── */
async function startReportScanFromDoc(docId) {
  _scanState = 'reading'; renderScanModal();
  try {
    var db  = await openDocDB();
    var doc = await new Promise(function(resolve, reject) {
      var req = db.transaction('docs', 'readonly').objectStore('docs').get(Number(docId));
      req.onsuccess = function() { resolve(req.result); };
      req.onerror   = function(e) { reject(e.target.error); };
    });
    if (!doc || !doc.dataUrl) throw new Error('not_found');

    /* Convert base64 data URL to ArrayBuffer for PDF.js */
    var lib    = await loadPdfJs();
    var base64 = doc.dataUrl.split(',')[1];
    var binary = atob(base64);
    var buf    = new ArrayBuffer(binary.length);
    var view   = new Uint8Array(buf);
    for (var i = 0; i < binary.length; i++) view[i] = binary.charCodeAt(i);

    var pdf    = await lib.getDocument({ data: buf }).promise;
    var pages  = Math.min(pdf.numPages, 120);
    var lines  = [];
    for (var p = 1; p <= pages; p++) {
      var page    = await pdf.getPage(p);
      var content = await page.getTextContent();
      lines.push(content.items.map(function(x) { return x.str; }).join(' '));
    }
    await runScanAnalysis(lines.join('\n'));
  } catch {
    _scanState = 'error'; _scanData = { error: t('scanErrPdf') }; renderScanModal();
  }
}

/* ── Load PDF docs from the active address into the scan modal ── */
function loadScanAddressDocs() {
  var container = document.getElementById('scan-docs-list');
  if (!container || !APP.activeAddr) return;
  getDocs(APP.activeAddr).then(function(docs) {
    var pdfs = docs.filter(function(d) {

        '<div style="flex:1;height:1px;background:var(--paper3);"></div>' +
        '<span style="font-size:12px;color:var(--ink4);">eller velg fra Boligdokumenter</span>' +
        '<div style="flex:1;height:1px;background:var(--paper3);"></div>' +
      '</div>' +
      '<div class="doc-list">' + pdfs.map(function(doc) {
        return '<div class="doc-item" onclick="startReportScanFromDoc(' + doc.id + ')" style="cursor:pointer;">' +
          '<div class="doc-icon-box"><i class="ti ti-file-type-pdf" style="color:var(--red);"></i></div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div class="doc-name">' + (doc.name || 'Dokument') + '</div>' +
            '<div class="doc-meta">' + fmtDate(new Date(doc.at)) + '</div>' +
          '</div>' +
          '<i class="ti ti-chevron-right" style="color:var(--ink4);font-size:15px;flex-shrink:0;"></i>' +
        '</div>';

}

function importScanFindings() {
  var findings = _scanData && _scanData.findings;
  if (!findings || !_scanSelected || !_scanSelected.size) return;
  var TG_COLOR  = { 2:'#C96A00', 3:'#C0392B' };
  var TG_STATUS = { 2:'planned', 3:'active'  };
  var ROM_CAT   = { bad:'bad', kjokken:'kjokken', utvendig:'utvendig', loft:'loft', stue:'stue', soverom:'soverom', annet:'annet' };
  var count = 0;
  findings.forEach(function(f, i) {
    if (!_scanSelected.has(i)) return;
    createProject({
      name:       f.tittel || t('projDefaultName'),
      category:   ROM_CAT[f.rom] || 'annet',
      status:     TG_STATUS[f.tg] || 'planned',
      color:      TG_COLOR[f.tg]  || PROJ_COLORS[0],
      desc:       'TG ' + f.tg + ' – ' + (f.beskrivelse || ''),
      budget:     (f.pris && f.pris !== 'null') ? f.pris : '',
      contractor:'', deadline:'',
    });
    count++;
  });
  _scanState = 'done'; _scanData = { count: count };
  renderScanModal(); updateRenoveringDot();
}

/* ════════════════════════════════════════
   PROJECT IMAGE STORAGE  (IndexedDB)
════════════════════════════════════════ */
var _imgDB = null;
function openImgDB() {
  if (_imgDB) return Promise.resolve(_imgDB);
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open('bv_img_v1', 1);
    req.onupgradeneeded = function(e) {
      var store = e.target.result.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
      store.createIndex('projId', 'projId', { unique: false });
    };
    req.onsuccess  = function(e) { _imgDB = e.target.result; resolve(_imgDB); };
    req.onerror    = function(e) { reject(e.target.error); };
  });
}
function saveImg(projId, dataUrl, name) {
  return openImgDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction('images', 'readwrite');
      tx.objectStore('images').add({ projId: projId, dataUrl: dataUrl, name: name, at: new Date().toISOString() });
      tx.oncomplete = resolve;
      tx.onerror = function(e) { reject(e.target.error); };
    });
  });
}
function getImgs(projId) {
  return openImgDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx  = db.transaction('images', 'readonly');
      var req = tx.objectStore('images').index('projId').getAll(projId);
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror   = function(e) { reject(e.target.error); };
    });
  });
}
function delImg(id) {
  return openImgDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction('images', 'readwrite');
      tx.objectStore('images').delete(id);
      tx.oncomplete = resolve;
      tx.onerror = function(e) { reject(e.target.error); };
    });
  });
}

/* ── Compress image via canvas before storing ── */
function compressImg(file) {
  var MAX = 1600, Q = 0.82;
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var scale = Math.min(1, MAX / Math.max(img.width, img.height));
        var c = document.createElement('canvas');
        c.width  = Math.round(img.width  * scale);
        c.height = Math.round(img.height * scale);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', Q));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ── Handle file picker selection ── */
function handleImgUpload(input, projId) {
  var files = Array.from(input.files || []);
  input.value = '';
  if (!files.length) return;
  Promise.all(files.map(function(f) {
    return compressImg(f).then(function(dataUrl) { return saveImg(projId, dataUrl, f.name); });
  })).then(function() { loadProjImgs(projId); });
}

/* ── Render image grid into placeholder div ── */
function loadProjImgs(projId) {
  var grid = document.getElementById('proj-imgs-' + projId);
  if (!grid) return;
  getImgs(projId).then(function(imgs) {
    var thumbs = imgs.map(function(img) {
      return '<div class="proj-img-thumb" onclick="openImgViewer(' + img.id + ')">' +
        '<img src="' + img.dataUrl + '" loading="lazy" alt=""/>' +
        '<button class="proj-img-del" onclick="event.stopPropagation();deleteProjectImg(' + img.id + ',\'' + projId + '\')" title="' + t('projDelete') + '"><i class="ti ti-x"></i></button>' +
      '</div>';
    }).join('');
    grid.innerHTML =
      thumbs +
      '<button class="proj-img-add" onclick="document.getElementById(\'img-inp-' + projId + '\').click()">' +
        '<i class="ti ti-camera-plus"></i>' +
        '<span>' + t('projAddPhoto') + '</span>' +
      '</button>';
  });
}

function deleteProjectImg(id, projId) {
  delImg(id).then(function() { loadProjImgs(projId); });
}

/* ── Full-screen image viewer ── */
function openImgViewer(imgId) {
  openImgDB().then(function(db) {
    var req = db.transaction('images', 'readonly').objectStore('images').get(Number(imgId));
    req.onsuccess = function() {
      if (!req.result) return;
      var el    = document.getElementById('img-viewer');
      var imgEl = document.getElementById('img-viewer-img');
      if (el && imgEl) { imgEl.src = req.result.dataUrl; el.classList.add('open'); }
    };
  });
}
function closeImgViewer() {
  var el = document.getElementById('img-viewer');
  if (el) el.classList.remove('open');
  setTimeout(function() {
    var imgEl = document.getElementById('img-viewer-img');
    if (imgEl) imgEl.src = '';
  }, 200);
}

/* ════════════════════════════════════════
   DOCUMENT STORAGE  (IndexedDB: bv_docs_v1)
════════════════════════════════════════ */
var _docDB = null;
function openDocDB() {
  if (_docDB) return Promise.resolve(_docDB);
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open('bv_docs_v1', 1);
    req.onupgradeneeded = function(e) {
      var store = e.target.result.createObjectStore('docs', { keyPath: 'id', autoIncrement: true });
      store.createIndex('entityId', 'entityId', { unique: false });
    };
    req.onsuccess = function(e) { _docDB = e.target.result; resolve(_docDB); };
    req.onerror   = function(e) { reject(e.target.error); };
  });
}
function saveDoc(entityId, name, dataUrl, mimeType) {
  return openDocDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction('docs', 'readwrite');
      tx.objectStore('docs').add({ entityId: entityId, name: name, dataUrl: dataUrl, mimeType: mimeType, at: new Date().toISOString() });
      tx.oncomplete = resolve;
      tx.onerror = function(e) { reject(e.target.error); };
    });
  });
}
function getDocs(entityId) {
  return openDocDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var req = db.transaction('docs', 'readonly').objectStore('docs').index('entityId').getAll(entityId);
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror   = function(e) { reject(e.target.error); };
    });
  });
}
function delDoc(id) {
  return openDocDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction('docs', 'readwrite');
      tx.objectStore('docs').delete(Number(id));
      tx.oncomplete = resolve;
      tx.onerror = function(e) { reject(e.target.error); };
    });
  });
}

function handleDocUpload(input, entityId, containerId) {
  var files = Array.from(input.files || []);
  input.value = '';
  if (!files.length) return;
  Promise.all(files.map(function(f) {
    if (f.type.startsWith('image/')) {
      return compressImg(f).then(function(dataUrl) { return saveDoc(entityId, f.name, dataUrl, f.type); });
    }
    return new Promise(function(resolve) {
      var reader = new FileReader();
      reader.onload = function(e) { saveDoc(entityId, f.name, e.target.result, f.type).then(resolve); };
      reader.readAsDataURL(f);
    });
  })).then(function() { loadEntityDocs(entityId, containerId); });
}

function loadEntityDocs(entityId, containerId) {
  var container = document.getElementById(containerId);
  if (!container) return;
  getDocs(entityId).then(function(docs) {
    if (!docs.length) { container.innerHTML = ''; return; }
    var items = docs.map(function(doc) {
      var isImg = doc.mimeType && doc.mimeType.startsWith('image/');
      var icon  = doc.mimeType === 'application/pdf' ? 'ti-file-type-pdf' : isImg ? 'ti-photo' : 'ti-paperclip';
      return '<div class="doc-item">' +
        (isImg
          ? '<div class="doc-thumb" onclick="openDocViewer(' + doc.id + ')"><img src="' + doc.dataUrl + '" style="width:100%;height:100%;object-fit:cover;" /></div>'
          : '<div class="doc-icon-box"><i class="ti ' + icon + '"></i></div>'
        ) +
        '<div style="flex:1;min-width:0;">' +
          '<div class="doc-name">' + (doc.name || 'Dokument') + '</div>' +
          '<div class="doc-meta">' + fmtDate(new Date(doc.at)) + '</div>' +
        '</div>' +
        '<div style="display:flex;gap:4px;">' +
          (!isImg ? '<button class="act-btn" style="font-size:11px;padding:5px 8px;" onclick="downloadDoc(' + doc.id + ')"><i class="ti ti-download"></i></button>' : '') +
          '<button class="act-btn" style="font-size:11px;padding:5px 8px;color:var(--red);" onclick="deleteEntityDoc(' + doc.id + ',\'' + entityId + '\',\'' + containerId + '\')"><i class="ti ti-trash"></i></button>' +
        '</div>' +
      '</div>';
    }).join('');
    container.innerHTML = '<div class="doc-list">' + items + '</div>';
  });
}

function deleteEntityDoc(id, entityId, containerId) {
  delDoc(id).then(function() { loadEntityDocs(entityId, containerId); });
}

function downloadDoc(id) {
  openDocDB().then(function(db) {
    var req = db.transaction('docs', 'readonly').objectStore('docs').get(Number(id));
    req.onsuccess = function() {
      if (!req.result) return;
      var a = document.createElement('a');
      a.href     = req.result.dataUrl;
      a.download = req.result.name || 'dokument';
      a.click();
    };
  });
}

function openDocViewer(id) {
  openDocDB().then(function(db) {
    var req = db.transaction('docs', 'readonly').objectStore('docs').get(Number(id));
    req.onsuccess = function() {
      if (!req.result) return;
      var el    = document.getElementById('img-viewer');
      var imgEl = document.getElementById('img-viewer-img');
      if (el && imgEl) { imgEl.src = req.result.dataUrl; el.classList.add('open'); }
    };
  });
}

/* ════════════════════════════════════════
   IOS VIEWPORT & KEYBOARD
════════════════════════════════════════ */
(function setupIOS() {
  /* Fix the 100vh bug: iOS Safari reports 100vh as the height WITHOUT the
     browser chrome, so the app overflows. We track the real inner height and
     expose it as --app-height so CSS can use it instead of 100vh. */
  function syncAppHeight() {
    document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
  }
  syncAppHeight();
  window.addEventListener('resize', syncAppHeight);

  /* When the soft keyboard appears on iOS the visualViewport shrinks while
     window.innerHeight stays the same. We use this to scroll the focused
     input into view so it isn't hidden behind the keyboard. */
  if (window.visualViewport) {
    var lastKeyboardHeight = 0;
    window.visualViewport.addEventListener('resize', function() {
      var kbHeight = Math.max(0, window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop);
      var keyboardOpened = kbHeight > 100 && lastKeyboardHeight <= 100;
      lastKeyboardHeight = kbHeight;
      if (keyboardOpened) {
        var el = document.activeElement;
        if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT')) {
          setTimeout(function() { el.scrollIntoView({ block: 'center', behavior: 'smooth' }); }, 80);
        }
      }
    });
  }
})();

(function boot() {
  const saved = loadSettings();
  if (saved.haUrl)        APP.haUrl        = saved.haUrl;
  if (saved.haToken)      APP.haToken      = saved.haToken;
  if (saved.claudeApiKey) APP.claudeApiKey = saved.claudeApiKey;
  if (saved.geminiApiKey) APP.geminiApiKey = saved.geminiApiKey;
  if (saved.aiProvider)   APP.aiProvider   = saved.aiProvider;

  // Restore theme first so the picker looks right
  const savedTheme = saved.theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(savedTheme);

  // Restore locale (or keep default English)
  if (saved.locale) APP.locale = saved.locale;
  updateNavLabels();

  function bootPhase2() {
    // Load addresses
    APP.addresses = loadAddresses();

    const profile = loadProfile();

    // Migrate old profile → address
    if (profile && APP.addresses.length === 0) {
      var migratedAddr = addAddress(profile.name || 'Hjemme', profile.boligtype || 'enebolig', profile);
      APP.addresses = loadAddresses();
      try { localStorage.setItem('bv_active_addr', migratedAddr.id); } catch {}
    }

    // Restore active address
    var lastActive = null;
    try { lastActive = localStorage.getItem('bv_active_addr'); } catch {}
    if (APP.addresses.length > 0) {
      var toActivate = APP.addresses.find(function(a) { return a.id === lastActive; }) || APP.addresses[0];
      switchAddress(toActivate.id);
      navigate('hjem');
      updateNavLabels();
      updateRenoveringDot();
      loadWeatherForCurrentAddr();
      setTimeout(maybeNotifyOverdue, 2000);
      if (getSyncMeta()) {
        setTimeout(function() { pullFromCloud(); }, 1000);
        setInterval(function() { if (getSyncMeta()) pullFromCloud(); }, 60000);
      }
    } else {
      setType(saved.boligtype || 'leilighet');
      navigate('hjem');
      updateNavLabels();
      if (!profile) openSurvey();
    }
  }

  // First launch: no saved locale → show language picker
  if (!saved.locale) {
    openLangPicker(bootPhase2);
  } else {
    bootPhase2();
  }
})();
</script>
